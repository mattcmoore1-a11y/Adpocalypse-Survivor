    <style>
    :root { color-scheme: dark; }
    html, body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
    #app { height:100%; width:100%; display:flex; }
    #gameWrap { flex:1; display:flex; align-items:center; justify-content:center; background:#000; }
    canvas { display:block; image-rendering: pixelated; }

    /* Dev panel (F1) */
    #devPanel {
      width: 272px;
      background: rgba(0,0,0,0.78);
      border-left: 1px solid rgba(255,255,255,0.14);
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      padding: 12px;
      box-sizing: border-box;
      overflow-y: auto;
    }
    #devPanel.hidden { display:none; }
    #devPanel h2 { margin: 0 0 10px 0; font-size: 14px; letter-spacing: 0.5px; }
    #devPanel .row { margin: 10px 0; }
    #devPanel .label { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; color: rgba(255,255,255,0.82); }
    #devPanel .muted { color: rgba(255,255,255,0.60); }
    #devPanel input[type="range"] { width:100%; }
    #devPanel select, #devPanel button {
      width: 100%;
      margin-top: 6px;
      background: rgba(41,141,218,0.28);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 12px;
    }
    #devPanel button:hover { background: rgba(41,141,218,0.40); }
    #devPanel .btnRow { display:flex; gap:8px; }
    #devPanel .btnRow button { width: 50%; }
    #devPanel .check { display:flex; gap:8px; align-items:center; }
    #devPanel .check input { transform: translateY(1px); }
    #devPanel .hint { margin-top: 10px; font-size: 11px; color: rgba(255,255,255,0.60); line-height: 1.35; }
  </style>
</head>
<body>
<div id="app">
  <div id="gameWrap">
    <canvas id="game"></canvas>
  </div>

  <aside id="devPanel" class="hidden" aria-label="Developer tools">
    <h2>DEV TOOLS (F1)</h2>

    <div class="row">
      <div class="label"><span>Build</span><span id="devBuild" class="muted">v0.42</span></div>
      <div class="label"><span>Player level</span><span id="devLevel" class="muted">—</span></div>
    </div>

    <div class="row">
      <div class="label"><span>Timescale</span><span id="devTimescaleLabel" class="muted">1.0×</span></div>
      <input id="devTimescale" type="range" min="0.25" max="8" step="0.25" value="1" />
      <div class="hint">Use higher timescale to fast-forward. Consider enabling invulnerability.</div>
    </div>

    <div class="row">
      <div class="check">
        <input id="devInvuln" type="checkbox" />
        <label for="devInvuln">Invulnerability</label>
      </div>
    </div>

    <div class="row">
      <div class="label"><span>Spawn boss</span><span class="muted">near screen edge</span></div>
      <select id="devBossSelect">
        <option value="boss">Boss</option>
      </select>
      <button id="devSpawnBossBtn">Spawn Boss</button>
    </div>

    <div class="row">
      <div class="label"><span>Spawn drop</span><span class="muted">at player</span></div>
      <select id="devDropSelect">
        <option value="coin_small">Coin (1)</option>

        <option value="chest">Treasure chest</option>
        <option value="powerup_heal">Powerup: Heal</option>
        <option value="powerup_magnet">Powerup: Coin Magnet</option>
        <option value="powerup_shield">Powerup: Shield</option>
        <option value="powerup_barrage">Powerup: Barrage</option>
      </select>
      <button id="devSpawnDropBtn">Spawn Drop</button>
    </div>

    <div class="row">
      <div class="btnRow">
        <button id="devForceLevelUpBtn">Force Level Up</button>
        <button id="devClearEnemiesBtn">Clear Enemies</button>
      </div>
    </div>

    <div class="row">
      <div class="btnRow">
        <button id="devTestBoss1Btn">Test Boss 1</button>
        <button id="devTestBoss2Btn">Test Boss 2</button>
        <button id="devTestBoss3Btn">Test Boss 3</button>
      </div>
      <div class="hint">Instantly jump to the selected boss fight for fast testing.</div>
    </div>

    <div class="row">
      <button id="devJumpBossBtn">Jump to Next Boss</button>
      <div class="hint">Sets timer to just before the next scheduled boss spawn.</div>
    </div>
  </aside>
</div>

  const pointSegDist2=(px,py,ax,ay,bx,by)=>{ const abx=bx-ax, aby=by-ay; const apx=px-ax, apy=py-ay; const ab2=abx*abx+aby*aby||1; let t=(apx*abx+apy*aby)/ab2; t=clamp(t,0,1); const cx=ax+abx*t, cy=ay+aby*t; return dist2(px,py,cx,cy); };

  const getEnemyCrowdTuning = (enemy) => {
    const typeId = enemy?.enemyTypeId;
    if (typeId === "banner") return CFG.enemies.banner || {};
    if (typeId === "banner_elite") return CFG.enemies.banner?.miniboss || {};
    if (typeId === "popup") return CFG.enemies.popup || {};
    if (typeId === "boss1") return CFG.enemies.boss || {};
    return (CFG.enemies.types && CFG.enemies.types[typeId]) ? CFG.enemies.types[typeId] : {};
  };

  const getEnemyCrowdRadius = (enemy) => {
    const globalRadius = numOr(CFG.enemyCrowding.globalRadius, numOr(CFG.enemyCrowding.separationRadiusMult, 1));
    const tuning = getEnemyCrowdTuning(enemy);
    const typeMult = numOr(tuning.separationRadiusMult, 1);
    if (enemy instanceof BannerEnemy) return Math.max(enemy.w, enemy.h) * 0.55 * globalRadius * typeMult;
    if (enemy instanceof PopupEnemy) return enemy.r * 1.15 * globalRadius * typeMult;
    if (enemy instanceof BossEnemy) return enemy.r * 0.9 * globalRadius * typeMult;
    if (enemy instanceof RetargeterEnemy) return enemy.r * 1.12 * globalRadius * typeMult;
    if (enemy instanceof GatekeeperEnemy || enemy instanceof BlackBoxEnemy || enemy instanceof WalledGardenerEnemy || enemy instanceof DooOpolyBoss) return enemy.r * 1.0 * globalRadius * typeMult;
    return 10 * globalRadius * typeMult;
  };

  function applyEnemySeparation(enemy, game, dt) {
    const c = CFG.enemyCrowding;
    if (!c.enabled || enemy.dead) return;

    const baseR = getEnemyCrowdRadius(enemy);
    if (!(baseR > 0)) return;

    let pushX = 0, pushY = 0, neighbors = 0;

    for (let i = 0; i < game.enemies.length; i++) {
      const other = game.enemies[i];
      if (other === enemy || !other || other.dead) continue;

      const dx = other.x - enemy.x;
      const dy = other.y - enemy.y;
      const d2 = dx*dx + dy*dy;
      if (d2 < 0.0001) continue;

      const otherR = getEnemyCrowdRadius(other);
      const desired = Math.max(baseR, otherR);
      if (d2 >= desired * desired) continue;

      const d = Math.sqrt(d2);
      const overlap = (desired - d) / desired;
      pushX -= (dx / d) * overlap;
      pushY -= (dy / d) * overlap;

      neighbors++;
      if (neighbors >= c.maxNeighborsConsidered) break;
    }

    if (neighbors > 0) {
      const tuning = getEnemyCrowdTuning(enemy);
      const globalStrength = numOr(c.globalStrength, numOr(c.separationStrength, 0.22));
      const typeMult = numOr(tuning.separationStrengthMult, 1);
      const strength = globalStrength * typeMult;
      enemy.x += (pushX / neighbors) * enemy.speed * strength * dt;
      enemy.y += (pushY / neighbors) * enemy.speed * strength * dt;
    }

    if (c.jitter > 0) {
      const t = game.time;
      const jx = Math.sin((enemy.x * 0.037) + (enemy.y * 0.021) + t * 3.7);
      const jy = Math.cos((enemy.x * 0.019) - (enemy.y * 0.031) + t * 3.1);
      enemy.x += jx * enemy.speed * c.jitter * dt;
      enemy.y += jy * enemy.speed * c.jitter * dt;
    }
  }

  // ========= Theme / Modes =========
  const THEME_KEY = "adpocalypse_theme_mode";
  const ThemeMode = { DARK:"dark", LIGHT:"light" };

  function loadThemeMode() {
    const v = (localStorage.getItem(THEME_KEY) || "").toLowerCase();
    return (v === ThemeMode.LIGHT) ? ThemeMode.LIGHT : ThemeMode.DARK;
  }
  function saveThemeMode(mode) { localStorage.setItem(THEME_KEY, mode); }

  function makeTheme(mode) {
    const grid = (mode === ThemeMode.DARK) ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.08)";

    const text2= (mode === ThemeMode.DARK) ? "rgba(255,255,255,0.70)" : "rgba(0,0,0,0.65)";
    const panel= (mode === ThemeMode.DARK) ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.05)";
    const border=(mode === ThemeMode.DARK) ? "rgba(255,255,255,0.18)" : "rgba(0,0,0,0.16)";
    const btn  = (mode === ThemeMode.DARK) ? "rgba(41,141,218,0.38)" : "rgba(41,141,218,0.26)";
    const btnH = (mode === ThemeMode.DARK) ? "rgba(41,141,218,0.55)" : "rgba(41,141,218,0.36)";
    const hudTrack = (mode === ThemeMode.DARK) ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.10)";
    const xpFill = (mode === ThemeMode.DARK) ? "rgba(252,204,56,0.55)" : "rgba(41,141,218,0.50)";
    const nodeB = (mode === ThemeMode.DARK) ? "rgba(41,141,218,0.20)" : "rgba(41,141,218,0.12)";
    const nodeP = (mode === ThemeMode.DARK) ? "rgba(133,84,171,0.14)" : "rgba(133,84,171,0.10)";
    const nodeK = (mode === ThemeMode.DARK) ? "rgba(235,9,135,0.10)" : "rgba(235,9,135,0.08)";

    const sparkle = (mode === ThemeMode.DARK)

      : { a:"rgba(247,115,0,0.34)", b:"rgba(235,9,135,0.28)", c:"rgba(0,0,0,0.22)", d:"rgba(41,141,218,0.10)" };

    return { mode, base, grid, text, text2, panel, border, btn, btnH, hudTrack, xpFill, nodeB, nodeP, nodeK, sparkle };

  // ========= Surface =========
  class Surface {
    constructor(canvas, container) {
      this.container = container || document.body;
      this.canvas = canvas;
      this.ctx = canvas.getContext("2d", { alpha:false });
      this.ctx.imageSmoothingEnabled = false;

      this.back = document.createElement("canvas");
      this.back.width = CFG.logicalW;
      this.back.height = CFG.logicalH;
      this.g = this.back.getContext("2d", { alpha:false });
      this.g.imageSmoothingEnabled = false;

      this.scale = 1;
      this.resize();
      window.addEventListener("resize", ()=>this.resize());
    }
    resize() {
      const w = this.container.clientWidth || window.innerWidth;
      const h = this.container.clientHeight || window.innerHeight;
      const sx = Math.floor(w/CFG.logicalW);
      const sy = Math.floor(h/CFG.logicalH);
      this.scale = Math.max(CFG.pixelScaleMin, Math.min(sx,sy)) || CFG.pixelScaleMin;
      this.canvas.width = CFG.logicalW * this.scale;
      this.canvas.height = CFG.logicalH * this.scale;
      this.canvas.style.width = `${this.canvas.width}px`;
      this.canvas.style.height = `${this.canvas.height}px`;
      this.ctx.imageSmoothingEnabled = false;
      this.g.imageSmoothingEnabled = false;
    }
    clear(color="#000") { this.g.fillStyle = color; this.g.fillRect(0,0,CFG.logicalW,CFG.logicalH); }
    present() { this.ctx.drawImage(this.back, 0,0, this.canvas.width, this.canvas.height); }
    mouseToLogical(input) {
      const r = this.canvas.getBoundingClientRect();
      return { x: (input.mouse.x - r.left)/this.scale, y: (input.mouse.y - r.top)/this.scale };
    }
  }

  // ========= Input =========
  class Input {
    constructor() {
      this.keys = new Set();
      this.mouse = { x:0, y:0, down:false, clicked:false };
      window.addEventListener("keydown",(e)=>this.keys.add(e.key.toLowerCase()));
      window.addEventListener("keyup",(e)=>this.keys.delete(e.key.toLowerCase()));
      window.addEventListener("blur",()=>this.keys.clear());
      window.addEventListener("mousedown",()=>{ this.mouse.down=true; this.mouse.clicked=true; });
      window.addEventListener("mouseup",()=>{ this.mouse.down=false; });
      window.addEventListener("mousemove",(e)=>{ this.mouse.x=e.clientX; this.mouse.y=e.clientY; });
    }
    beginFrame(){ this.mouse.clicked=false; }
    down(k){ return this.keys.has(k); }
    axis() {
      const l=this.down("a")||this.down("arrowleft");
      const r=this.down("d")||this.down("arrowright");
      const u=this.down("w")||this.down("arrowup");
      const d=this.down("s")||this.down("arrowdown");
      let x=(r?1:0)-(l?1:0), y=(d?1:0)-(u?1:0);
      const m=Math.hypot(x,y);
      if(m>0){ x/=m; y/=m; }
      return {x,y};
    }
    pressedOnce(key, latchObj) {
      if (!latchObj._l) latchObj._l = {};
      const k = key.toLowerCase();
      const isDown = this.down(k);
      const wasDown = !!latchObj._l[k];
      latchObj._l[k] = isDown;
      return isDown && !wasDown;
    }
  }

  // ========= Camera =========
  class Camera {
    constructor(){ this.x=0; this.y=0; }
    update(dt, tx, ty) {
      const f=0.18;
      const t=1-Math.pow(1-f, dt*60);
      this.x=lerp(this.x,tx,t);
      this.y=lerp(this.y,ty,t);
    }
    w2s(wx,wy){ return { x: wx-this.x+CFG.logicalW/2, y: wy-this.y+CFG.logicalH/2 }; }
    s2w(sx,sy){ return { x: sx+this.x-CFG.logicalW/2, y: sy+this.y-CFG.logicalH/2 }; }
  }

  // ========= Audio (SFX) =========
  class SFX {
    constructor() {
      this.ctx = null;
      this.master = null;
      this.enabled = CFG.sfx.enabledByDefault;
      this.userEnabled = this.enabled;
      this.mutedByPause = false;
      this.mixMode = "pregame";
    }
    currentMasterGain() {
      return this.mixMode === "pregame" ? (CFG.sfx.masterPreGame ?? CFG.sfx.master) : (CFG.sfx.masterInGame ?? CFG.sfx.master);
    }
    ensure() {
      if (this.ctx) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = this.enabled ? this.currentMasterGain() : 0.0;
      this.master.connect(this.ctx.destination);
    }
    setMixMode(mode) {
      this.mixMode = mode === "gameplay" ? "gameplay" : "pregame";
      if (this.master) this.master.gain.value = this.enabled ? this.currentMasterGain() : 0.0;
    }
    setEnabled(on) {
      this.userEnabled = !!on;
      this.enabled = this.userEnabled && !this.mutedByPause;
      if (this.ctx && this.ctx.state === "suspended" && this.enabled) this.ctx.resume().catch(()=>{});
      if (this.master) this.master.gain.value = this.enabled ? this.currentMasterGain() : 0.0;
    }
    setPausedMuted(isPaused) {
      this.mutedByPause = !!isPaused;
      this.enabled = this.userEnabled && !this.mutedByPause;
      if (this.master) this.master.gain.value = this.enabled ? this.currentMasterGain() : 0.0;
    }
    blip(freq, dur, type="square", gain=0.12, delay=0) {
      if (!this.enabled) return;
      this.ensure();
      const t = this.ctx.currentTime + Math.max(0, delay);
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(gain, t+0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      o.connect(g); g.connect(this.master);
      o.start(t); o.stop(t+dur+0.02);
    }
    noise(dur=0.06, gain=0.10, hpHz=1200) {
      if (!this.enabled) return;
      this.ensure();
      const t = this.ctx.currentTime;
      const n = Math.max(1, Math.floor(this.ctx.sampleRate * dur));
      const buf = this.ctx.createBuffer(1,n,this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*0.8;
      const src=this.ctx.createBufferSource(); src.buffer=buf;
      const hp=this.ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.setValueAtTime(hpHz,t);
      const g=this.ctx.createGain();
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(gain,t+0.005);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      src.connect(hp); hp.connect(g); g.connect(this.master);
      src.start(t); src.stop(t+dur+0.02);
    }
    coin(){ this.blip(CFG.sfx.coinHz, CFG.sfx.coinDur, "square", 0.10); }
    hit(){ this.blip(220, CFG.sfx.hitDur, "triangle", 0.10); }
    death(){ this.noise(CFG.sfx.deathDur, 0.10, 2600); }
    ui(){ this.blip(520, CFG.sfx.uiClickDur, "square", 0.08); }
    popup(){
      this.blip(CFG.sfx.popupHz || 430, CFG.sfx.popupDur || 0.07, "square", 0.07);
      this.blip((CFG.sfx.popupHz || 430) * 1.32, (CFG.sfx.popupDur || 0.07) * 0.82, "triangle", 0.04, 0.012);
    }
    levelUp() {
      const root = CFG.sfx.levelUpHz;
      this.blip(root * 0.92, 0.07, "triangle", 0.06, 0.00);
      this.blip(root * 1.16, 0.08, "square", 0.08, 0.04);
      this.blip(root * 1.46, 0.10, "triangle", 0.10, 0.09);
    }
    chest() {
      this.blip(660, 0.06, "square", 0.10);
      this.blip(880, 0.06, "square", 0.08);
    }
    powerup() {
      this.blip(520, 0.06, "triangle", 0.06, 0.00);
      this.blip(780, 0.08, "square", 0.08, 0.04);
    }
    shieldBlock() {
      this.blip(320, 0.05, "square", 0.05, 0.00);
      this.blip(460, 0.08, "triangle", 0.06, 0.01);
    }
  }

      this.gDrum = this.ctx.createGain(); this.gDrum.gain.value = this.gains.drum;

      this.gBass.connect(this.master);
      this.gArp.connect(this.master);
      this.gLead.connect(this.master);
      this.gDrum.connect(this.master);
    }

    currentMasterGain() {
      return this.mixMode === "gameplay" ? (CFG.music.masterInGame ?? this.gains.master) : (CFG.music.masterPreGame ?? this.gains.master);
    }

    setMixMode(mode) {
      const nextMode = mode === "gameplay" ? "gameplay" : "pregame";
      if (this.mixMode !== nextMode && nextMode === "gameplay") {
        this.gameplayLoopCount = 0;
        this.drumsArmed = false;
      }
      this.mixMode = nextMode;
      this.gains.master = this.currentMasterGain();
      if (this.master) this.master.gain.value = this.enabled ? this.gains.master : 0.0;
      if (this.gDrum) {
        if (this.mixMode === "pregame") this.gDrum.gain.value = 0.0;
        else if (!this.drumsArmed) this.gDrum.gain.value = CFG.music.drumsStartGain;
      }
    }

    setEnabled(on) {
      this.userEnabled = !!on;
      if (!this.userEnabled) this.stop();
      else this.start();
    }

    setPaused(paused) {
      if (!this.master) return;
      this.master.gain.value = paused ? 0.0 : this.currentMasterGain();
    }

    start() {
      this.ensure();
      this.enabled = true;
      if (this.ctx.state === "suspended") this.ctx.resume().catch(()=>{});

      this.step = 0;
      this.loopCount = 0;
      this.gameplayLoopCount = 0;
      this.drumsArmed = false;
      this.bpm = CFG.music.defaultBpm;
      this.targetBpm = this.bpm;

      this.master.gain.value = this.gains.master;
      this.gBass.gain.value  = this.gains.bass;
      this.gArp.gain.value   = this.gains.arp;
      this.gLead.gain.value  = this.gains.lead;
      this.gDrum.gain.value  = (this.mixMode === "gameplay") ? CFG.music.drumsStartGain : 0.0;

      this.nextAt = this.ctx.currentTime + 0.05;
      if (this.timer) clearInterval(this.timer);
      this.timer = setInterval(()=>this._tick(), 25);
    }

    stop() {
      this.enabled = false;
      if (this.timer) { clearInterval(this.timer); this.timer = null; }
      if (this.master) this.master.gain.value = 0.0;
    }

    update(dt) {
      const maxDelta = CFG.music.bpmSlewPerSec * dt;
      const delta = clamp(this.targetBpm - this.bpm, -maxDelta, maxDelta);
      this.bpm = clamp(this.bpm + delta, CFG.music.defaultBpm, CFG.music.maxBpm);
    }

    setTargetBpm(bpm) { this.targetBpm = clamp(bpm, CFG.music.defaultBpm, CFG.music.maxBpm); }

    fadeDrumsTo(targetGain, sec=0.35) {
      if (!this.enabled || !this.gDrum) return;
      const t = this.ctx.currentTime;
      this.gDrum.gain.cancelScheduledValues(t);
      this.gDrum.gain.setValueAtTime(this.gDrum.gain.value, t);
      this.gDrum.gain.linearRampToValueAtTime(targetGain, t + Math.max(0.01, sec));
    }
    onLullStart() { this.fadeDrumsTo(0.0, CFG.music.lullFadeSec); }
    onBossStart() { if (this.drumsArmed) this.fadeDrumsTo(CFG.music.drumsGainWhenOn, CFG.music.bossKickSec); }

    _hz(semiFromA4) { return 440 * Math.pow(2, semiFromA4 / 12); }

    _osc(at, hz, dur, type, gain, outGain, cutoffHz=null) {
      const ctx = this.ctx;
      const o = ctx.createOscillator();
      const a = ctx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(hz, at);

      a.gain.setValueAtTime(0.0001, at);
      a.gain.exponentialRampToValueAtTime(gain, at + 0.008);
      a.gain.exponentialRampToValueAtTime(0.0001, at + dur);

      let node = o;
      if (cutoffHz) {
        const f = ctx.createBiquadFilter();
        f.type = "lowpass";
        f.frequency.setValueAtTime(cutoffHz, at);
        node.connect(f);
        node = f;
      }
      node.connect(a);
      a.connect(outGain);

      o.start(at);
      o.stop(at + dur + 0.02);
    }

    _noise(at, dur, gain, outGain, hpHz=3500) {
      const ctx = this.ctx;
      const n = Math.max(1, Math.floor(ctx.sampleRate * dur));
      const buf = ctx.createBuffer(1, n, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0;i<n;i++) d[i] = (Math.random()*2-1)*0.8;

      const src = ctx.createBufferSource();
      src.buffer = buf;

      const hp = ctx.createBiquadFilter();
      hp.type = "highpass";
      hp.frequency.setValueAtTime(hpHz, at);

      const a = ctx.createGain();
      a.gain.setValueAtTime(0.0001, at);
      a.gain.exponentialRampToValueAtTime(gain, at + 0.005);
      a.gain.exponentialRampToValueAtTime(0.0001, at + dur);

      src.connect(hp);
      hp.connect(a);
      a.connect(outGain);

      src.start(at);
      src.stop(at + dur + 0.02);
    }

    _tick() {
      if (!this.enabled) return;

      const spb = 60 / this.bpm;
      const stepDur = spb / 4; // 16ths
      const horizon = this.ctx.currentTime + this.lookahead;

      while (this.nextAt < horizon) {
        this._scheduleStep(this.nextAt, this.step, stepDur);
        this.nextAt += stepDur;
        this.step = (this.step + 1) % 64;

        if (this.step === 0) {
          this.loopCount++;
          if (this.mixMode === "gameplay") {
            this.gameplayLoopCount++;
            if (!this.drumsArmed && this.gameplayLoopCount >= CFG.music.drumsEnableAfterLoops) {
              this.drumsArmed = true;
              this.fadeDrumsTo(CFG.music.drumsGainWhenOn, 0.18);
            }
          }
        }
      }
    }

    _scheduleStep(at, step, stepDur) {
      const bar = Math.floor(step / 16);
      const beat16 = step % 16;
      const beat4 = Math.floor(beat16 / 4);

      const prog = this.PROGRESSIONS[this.sel.progression];
      const chord = prog.bars[bar % prog.bars.length];

      const bassPat = this.BASS_PATTERNS[this.sel.bass].p;
      const arpPat  = this.ARP_PATTERNS[this.sel.arp].p;
      const leadPat = this.LEAD_PATTERNS[this.sel.lead].p;
      const drums   = this.DRUM_PATTERNS[this.sel.drum];
      const pack    = this.SOUND_PACKS[this.sel.pack];

      const cut = this.cutoffHz;

      // breathing bass
      const bassAllowed = (bar % 4 !== 3) || (beat16 >= 12);
      if (bassAllowed && bassPat[beat16 % bassPat.length]) {
        const rootSemi = chord.root - 12;
        const hz = this._hz(rootSemi);
        this._osc(at, hz*1.4, 0.10, pack.bassType, 0.10, this.gBass, pack.bassCut);
        this._osc(at, hz,     0.12, pack.bassType, 0.07, this.gBass, pack.bassCut - 150);
      }

      // arp
      const arpIdx = arpPat[(step % 4)]|0;
      const tone = chord.tones[clamp(arpIdx, 0, chord.tones.length-1)];
      const arpSemi = chord.root + tone + 0;
      this._osc(at, this._hz(arpSemi), stepDur*0.95, pack.arpType, 0.035, this.gArp, cut);

      // lead every other bar
      const leadBarOk = (bar % 2 === 1);
      if (leadBarOk && leadPat[beat16 % leadPat.length]) {
        const leadTone = chord.tones[(beat4===3?2:1) % chord.tones.length];
        const leadSemi = chord.root + leadTone + 12;
        this._osc(at, this._hz(leadSemi), 0.16, pack.leadType, 0.05, this.gLead, cut+900);
        this._osc(at, this._hz(leadSemi+12), 0.09, "square", 0.018, this.gLead, cut+1400);
      }

      // drums
      if (drums.kick[beat16]) {
        this._osc(at, 140, 0.10, "sine", 0.16, this.gDrum, 700);
        this._osc(at, 70,  0.12, "sine", 0.10, this.gDrum, 450);
      }
      if (drums.snare[beat16]) {
        this._noise(at, 0.09, 0.11, this.gDrum, 900);
        this._osc(at, 220, 0.07, "triangle", 0.04, this.gDrum, 1600);
      }
      if (drums.hat === "8th") {
        if (beat16 % 2 === 0) this._noise(at, 0.03, 0.030, this.gDrum, 5200);
      } else {
        this._noise(at, 0.02, 0.022, this.gDrum, 5200);
      }
    }
  }

  // ========= Entities =========
  class Player {
    constructor(x,y, hero) {
      this.x=x; this.y=y;
      this.vx=0; this.vy=0;
      this.r=CFG.player.r;

      this.hero=hero;
      this.maxBudget=hero.maxBudget;
      this.budget=hero.maxBudget;

      this.iFrame=0;

      this.stats = {
        dmgMult: 1.0,      // Boost Payouts
        speed: 1.0,        // Increase Agility
        tracking: 1.0,     // Improve Tracking

        perfFire: 1.0,
        perfShotSpeed: 1.0,
        perfRange: 1.0,

        creatorFreq: 1.0,
        creatorRadius: 1.0,
        creatorPulseFreq: 1.0,

        advocateSpin: 1.0,
        advocateOrbitR: 1.0,
        advocateSize: 1.0,

        recruit: 0,
      };

      this.weapons = [];
      this.weaponUpgradeTiers = { performance: 0, creator: 0, advocate: 0 };
      this.shieldHits = 0;
      this.magnetTimer = 0;
      this.facingX = 1;
      this.facingY = 0;
    }
    applyDamage(n) {
      if(this.invuln) return false;
      if(this.iFrame>0) return false;
      if (this.shieldHits > 0) {
        this.shieldHits = Math.max(0, this.shieldHits - 1);
        this.iFrame = Math.max(this.iFrame, CFG.player.iFrame * 0.65);
        return false;
      }
      this.budget = clamp(this.budget-n,0,this.maxBudget);
      this.iFrame = CFG.player.iFrame;
      return true;
    }
    update(dt, input) {
      const a=input.axis();
      const spd = CFG.player.baseSpeed * this.hero.speedMult * this.stats.speed;
      this.vx=a.x*spd; this.vy=a.y*spd;
      this.x += this.vx*dt;
      this.y += this.vy*dt;
      if (Math.abs(this.vx) > 0.001 || Math.abs(this.vy) > 0.001) {
        const d = Math.hypot(this.vx, this.vy) || 1;
        this.facingX = this.vx / d;
        this.facingY = this.vy / d;
      }
      if(this.iFrame>0) this.iFrame=Math.max(0,this.iFrame-dt);
      if(this.magnetTimer>0) this.magnetTimer=Math.max(0,this.magnetTimer-dt);
    }
    draw(g, cam, theme) {
      const s=cam.w2s(this.x,this.y);
      if (this.shieldHits > 0) {
        g.strokeStyle = theme.mode===ThemeMode.DARK ? 'rgba(120,205,255,0.92)' : 'rgba(44,106,214,0.92)';
        g.lineWidth = 2;
        g.beginPath(); g.arc(s.x, s.y-3, this.r + 6 + Math.sin(performance.now()*0.012)*1.2, 0, Math.PI*2); g.stroke();
      }
      g.fillStyle = (this.iFrame>0) ? "#2f6fff" : theme.text;
      g.fillRect((s.x-5)|0, (s.y-6)|0, 10, 12);
      g.fillStyle = (theme.mode===ThemeMode.DARK) ? "#FFD7B3" : "#D6A583";
      g.fillRect((s.x-3)|0, (s.y-10)|0, 6, 5);
      g.fillStyle = IMPACT.pink;
      g.fillRect((s.x-1)|0, (s.y-2)|0, 2, 5);
    }
  }

  class Bullet {
    constructor(x,y,vx,vy,dmg,life,opts={}) {
      this.x=x; this.y=y;
      this.vx=vx; this.vy=vy;
      this.dmg=dmg;
      this.life=life;
      this.r=3;
      this.renderScale = Math.max(0.6, Number(opts.renderScale) || 1);
      this.trailScale = Math.max(0, Number(opts.trailScale) || this.renderScale);
      this.color = opts.color || "#2f6fff";
      this.glow = opts.glow || "rgba(47,111,255,0.22)";

      this.pierce = Math.max(0, opts.pierce || 0);                  // remaining extra enemies this shot can pass through
      this.ricochet = Math.max(0, opts.ricochet || 0);              // remaining bounces
      this.ricochetSearchRadius = opts.ricochetSearchRadius || 110;
      this.ricochetDamageMult = (typeof opts.ricochetDamageMult === "number") ? opts.ricochetDamageMult : 1.0;
      this.splitOnFirstHit = !!opts.splitOnFirstHit;
      this.splitDone = false;

      this.hitSet = new Set();                                      // enemies already hit by this bullet
    }
    update(dt){ this.x+=this.vx*dt; this.y+=this.vy*dt; this.life-=dt; }
    draw(g,cam){
      const s=cam.w2s(this.x,this.y);
      const rr = Math.max(2, Math.round(2 * this.renderScale));
      const trailL = Math.max(3, Math.round(5 * this.trailScale));
      const ang = Math.atan2(this.vy, this.vx);
      const tx = Math.cos(ang) * trailL;
      const ty = Math.sin(ang) * trailL;
      g.strokeStyle = this.glow;
      g.lineWidth = Math.max(2, rr * 1.35);
      g.beginPath();
      g.moveTo(s.x - tx, s.y - ty);
      g.lineTo(s.x, s.y);
      g.stroke();
      g.fillStyle=this.color;
      g.beginPath(); g.arc(s.x, s.y, rr, 0, Math.PI*2); g.fill();
      g.fillStyle="rgba(255,255,255,0.48)";
      g.fillRect((s.x-rr/2)|0, (s.y-rr/2)|0, Math.max(1, Math.floor(rr*0.7)), Math.max(1, Math.floor(rr*0.7)));
    }
  }

  class EnemyProjectile {
    constructor(x,y,vx,vy,dmg,life,opts={}) {
      this.x=x; this.y=y;
      this.vx=vx; this.vy=vy;
      this.dmg=dmg;
      this.life=life;
      this.r=opts.r || 4;
      this.color=opts.color || "rgba(255,70,70,0.95)";
      this.glow=opts.glow || "rgba(255,70,70,0.35)";
      this.speed = Number(opts.speed) || Math.hypot(vx, vy) || 0;
      this.homingTurnRate = Math.max(0, Number(opts.homingTurnRate) || 0);
      this.homingDistance = Math.max(0, Number(opts.homingDistance) || 0);
      this.traveled = 0;
    }
    update(dt, game){
      if (game && this.homingTurnRate > 0 && this.traveled < this.homingDistance) {
        const p = game.player;
        if (p) {
          const dx = p.x - this.x, dy = p.y - this.y;
          const d = Math.hypot(dx, dy) || 1;
          const tx = dx / d, ty = dy / d;
          const vmag = this.speed || Math.hypot(this.vx, this.vy) || 1;
          let vx = this.vx / vmag, vy = this.vy / vmag;
          const blend = clamp(this.homingTurnRate * dt, 0, 1);
          vx = lerp(vx, tx, blend);
          vy = lerp(vy, ty, blend);
          const nd = Math.hypot(vx, vy) || 1;
          this.vx = (vx / nd) * vmag;
          this.vy = (vy / nd) * vmag;
        }
      }
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      this.traveled += (this.speed || Math.hypot(this.vx, this.vy) || 0) * dt;
      this.life -= dt;
    }
    draw(g,cam){
      const s=cam.w2s(this.x,this.y);
      g.fillStyle=this.glow;
      g.fillRect((s.x-this.r-2)|0,(s.y-this.r-2)|0,(this.r+2)*2,(this.r+2)*2);
      g.fillStyle=this.color;
      g.fillRect((s.x-this.r)|0,(s.y-this.r)|0,this.r*2,this.r*2);
    }
  }

  class EnemyMarker {
    constructor(x,y,r,delay,dmg,opts={}) {
      this.x=x; this.y=y; this.r=r; this.delay=delay; this.dmg=dmg;
      this.color=opts.color || "rgba(255,70,70,0.78)";
      this.fill=opts.fill || "rgba(255,70,70,0.12)";
      this.life=delay; this.maxLife=delay; this.dead=false; this.didBurst=false;
    }
    update(dt, game){
      if(this.dead) return;
      this.life -= dt;
      if(this.life <= 0 && !this.didBurst){
        this.didBurst = true;
        const p = game.player;
        if (p && dist2(this.x,this.y,p.x,p.y) <= (this.r + p.r)*(this.r + p.r)) {
          p.applyDamage(this.dmg);
          game.sfx.hit();
        }
        game.fieldBursts.push({ x:this.x, y:this.y, color:"warn", life:0.24, maxLife:0.24, radius:this.r + 10 });
        this.dead = true;
      }
    }
    draw(g,cam){
      if(this.dead) return;
      const s=cam.w2s(this.x,this.y);
      const t = this.maxLife > 0 ? clamp(this.life / this.maxLife, 0, 1) : 0;
      const pulse = 0.72 + 0.28*Math.sin((1-t)*20);
      g.fillStyle=this.fill;
      g.beginPath(); g.arc(s.x, s.y, this.r * pulse, 0, Math.PI*2); g.fill();
      g.strokeStyle=this.color;
      g.lineWidth=2;
      g.beginPath(); g.arc(s.x, s.y, this.r * pulse, 0, Math.PI*2); g.stroke();
    }
  }

  class SparkleField {
    constructor(x,y,r,dmg,life,opts={}) {
      this.x=x; this.y=y;
      this.r=r;
      this.dmg=dmg;
      this.life=life;
      this.seed = Math.random()*1000;

      this.opts = opts || {};
      this.kind = this.opts.kind || "creator";
      this.followPlayer = !!this.opts.followPlayer;
      this.moveTowardPlayerSpeed = Number(this.opts.moveTowardPlayerSpeed) || 0;
      this.burnDps = Number(this.opts.burnDps) || 0;
      this.burnSec = Number(this.opts.burnSec) || 0;
      this.chainChance = Number(this.opts.chainChance) || 0;
      this.chainDepth = Number(this.opts.chainDepth) || 0;
      this.maxChainDepth = Number(this.opts.maxChainDepth) || 0;

      this.pulseInterval = Math.max(0.08, Number(this.opts.pulseInterval) || 1.0);
      this.pulseCd = this.pulseInterval;
      this.pulseFlashSec = Math.max(0.05, Number(this.opts.pulseFlashSec) || 0.18);
      this.pulseFlash = 0;
      this.didPulse = false;

      this.viralEmitInterval = Number(this.opts.viralEmitInterval) || 0;
      this.viralEmitCount = Number(this.opts.viralEmitCount) || 0;
      this.viralEmitCd = this.viralEmitInterval || 0;
      this.viralChildOpts = this.opts.viralChildOpts || null;
      this.potentialChildren = Math.max(0, Number(this.opts.potentialChildren) || 0);
      this.spawnedChildren = Math.max(0, Number(this.opts.spawnedChildren) || 0);
      this.maxChildrenPerField = Math.max(0, Number(this.opts.maxChildrenPerField) || 0);
      this.absoluteFieldCap = Math.max(0, Number(this.opts.absoluteFieldCap) || 0);
      this.childDistanceMult = Number(this.opts.childDistanceMult) || 1.0;
      this.rippleAngleJitter = Number(this.opts.rippleAngleJitter) || 0;
      this.rippleDriftSpeed = Number(this.opts.rippleDriftSpeed) || 0;
      this.isViral = !!this.opts.isViral;
      this.driftVx = Number(this.opts.driftVx) || 0;
      this.driftVy = Number(this.opts.driftVy) || 0;
      this.seekEnemySpeed = Number(this.opts.seekEnemySpeed) || 0;
      this.seekEnemyRadius = Number(this.opts.seekEnemyRadius) || 0;
      this.linkFromX = (this.opts.linkFromX === null || this.opts.linkFromX === undefined || this.opts.linkFromX === "") ? null : (Number.isFinite(Number(this.opts.linkFromX)) ? Number(this.opts.linkFromX) : null);
      this.linkFromY = (this.opts.linkFromY === null || this.opts.linkFromY === undefined || this.opts.linkFromY === "") ? null : (Number.isFinite(Number(this.opts.linkFromY)) ? Number(this.opts.linkFromY) : null);
      this.linkLife = Math.max(0, Number(this.opts.linkLife) || 0);
      this.linkLifeMax = Math.max(0, Number(this.opts.linkLifeMax) || this.linkLife || 0);

      this._pulse = 0;
    }
    update(dt, game){
      this._pulse += dt;
      this.didPulse = false;

      if (this.linkLife > 0) this.linkLife = Math.max(0, this.linkLife - dt);
      if (this.pulseFlash > 0) this.pulseFlash = Math.max(0, this.pulseFlash - dt);

      if (this.followPlayer && game?.player) {
        this.x = game.player.x;
        this.y = game.player.y;
      } else {
        if (this.driftVx || this.driftVy) {
          this.x += this.driftVx * dt;
          this.y += this.driftVy * dt;
        }
        if (this.moveTowardPlayerSpeed > 0 && game?.player) {
          const dx = game.player.x - this.x, dy = game.player.y - this.y;
          const d = Math.hypot(dx,dy) || 1;
          const sp = this.moveTowardPlayerSpeed;
          this.x += (dx/d) * sp * dt;
          this.y += (dy/d) * sp * dt;
        }
        if (this.seekEnemySpeed > 0 && game?.getNearestLiveEnemyNear) {
          const target = game.getNearestLiveEnemyNear(this.x, this.y, this.seekEnemyRadius || 120);
          if (target) {
            const dx = target.x - this.x, dy = target.y - this.y;
            const d = Math.hypot(dx,dy) || 1;
            const sp = this.seekEnemySpeed;
            this.x += (dx/d) * sp * dt;
            this.y += (dy/d) * sp * dt;
          }
        }
      }

      if (!this.followPlayer) this.life -= dt;

      this.pulseCd -= dt;
      while (this.pulseCd <= 0) {
        this.pulseCd += this.pulseInterval;
        this.didPulse = true;
        this.pulseFlash = this.pulseFlashSec;
      }

      if (this.viralEmitInterval > 0 && this.viralEmitCount > 0 && game) {
        this.viralEmitCd -= dt;
        while (this.viralEmitCd <= 0) {
          this.viralEmitCd += this.viralEmitInterval;
          const canSpawn = this.potentialChildren > 0 &&
            this.spawnedChildren < this.maxChildrenPerField &&
            (!this.absoluteFieldCap || game.countCreatorFields() < this.absoluteFieldCap);
          if (!canSpawn) break;

          const remaining = Math.max(0, this.maxChildrenPerField - this.spawnedChildren);
          const emitNow = Math.max(0, Math.min(this.viralEmitCount, remaining));
          if (emitNow <= 0) break;

          for (let i=0;i<emitNow;i++) {
            if (this.spawnedChildren >= this.maxChildrenPerField) break;
            if (this.absoluteFieldCap && game.countCreatorFields() >= this.absoluteFieldCap) break;

            const randomPhase = rand(0, Math.PI * 2);
            const baseAng = randomPhase + (i / emitNow) * Math.PI * 2 + rand(-0.45, 0.45);
            const ang = baseAng + rand(-this.rippleAngleJitter, this.rippleAngleJitter);
            const dist = Math.max(4, this.r * this.childDistanceMult * rand(0.88, 1.16));
            const sx = this.x + Math.cos(ang) * dist;
            const sy = this.y + Math.sin(ang) * dist;
            const drift = this.rippleDriftSpeed;
            const childOpts = { ...(this.viralChildOpts || {}) };
            childOpts.potentialChildren = Math.max(0, this.potentialChildren - 1);
            childOpts.spawnedChildren = 0;
            childOpts.maxChildrenPerField = this.maxChildrenPerField;
            childOpts.absoluteFieldCap = this.absoluteFieldCap;
            childOpts.childDistanceMult = this.childDistanceMult;
            childOpts.rippleAngleJitter = this.rippleAngleJitter;
            childOpts.rippleDriftSpeed = this.rippleDriftSpeed;
            childOpts.driftVx = Math.cos(ang) * drift;
            childOpts.driftVy = Math.sin(ang) * drift;
            childOpts.isViral = true;
            // No link flash for ripple children; only viral on-kill children should show it.
            game.spawnCreatorChildField(sx, sy, childOpts);
            this.spawnedChildren += 1;
          }
        }
      }
    }
    draw(g,cam, theme){
      const s=cam.w2s(this.x,this.y);
      const R=this.r|0;
      const spicy = !!this.burnDps;
      const loyal = !!this.followPlayer || this.moveTowardPlayerSpeed > 0;
      const viral = !!this.isViral;
      const sp = spicy
        ? { a:"rgba(245,51,63,0.42)", b:"rgba(247,115,0,0.32)", c:"rgba(255,210,120,0.78)", d:"rgba(245,51,63,0.12)" }
        : loyal
          ? { a:"rgba(252,204,56,0.48)", b:"rgba(255,255,255,0.22)", c:"rgba(255,255,255,0.82)", d:"rgba(252,204,56,0.12)" }
          : viral
            ? { a:"rgba(105,232,124,0.48)", b:"rgba(42,168,74,0.30)", c:"rgba(224,255,232,0.86)", d:"rgba(105,232,124,0.14)" }
            : theme.sparkle;

      let overlapLevel = 0;
      if (window.__adpocFieldSample && Array.isArray(window.__adpocFieldSample)) {
        for (const f of window.__adpocFieldSample) {
          if (f === this) continue;
          const rr = this.r + f.r;
          if (dist2(this.x,this.y,f.x,f.y) <= rr*rr*0.45) overlapLevel++;
        }
      }
      const resonance = 1 + overlapLevel * 0.22;

      if (this.linkLife > 0 && this.linkFromX !== null && this.linkFromY !== null) {
        const ps = cam.w2s(this.linkFromX, this.linkFromY);
        const t = this.linkLifeMax > 0 ? (this.linkLife / this.linkLifeMax) : 0;
        g.strokeStyle = viral ? `rgba(140,255,170,${0.35 + 0.55*t})` : `rgba(255,255,255,${0.18 + 0.42*t})`;
        g.lineWidth = viral ? 3 : 2;
        g.beginPath();
        g.moveTo(ps.x|0, ps.y|0);
        g.lineTo(s.x|0, s.y|0);
        g.stroke();
      }

      g.fillStyle = spicy ? `rgba(245,51,63,${0.10*resonance})` : sp.d;
      g.beginPath(); g.arc(s.x,s.y, R+6+(overlapLevel?2:0), 0, Math.PI*2); g.fill();

      if (overlapLevel > 0) {
        g.fillStyle = `rgba(255,255,255,${0.06 + overlapLevel*0.03})`;
        g.beginPath(); g.arc(s.x,s.y, R+2+Math.sin(this._pulse*6)*1.5, 0, Math.PI*2); g.fill();
      }

      if (this.pulseFlash > 0) {
        const t = this.pulseFlash / this.pulseFlashSec;
        const pulseR = Math.max(2, (R * 0.15) + (1 - t) * (R * 0.85));
        g.strokeStyle = spicy ? `rgba(255,170,70,${0.18 + t*0.36})` : loyal ? `rgba(252,204,56,${0.16 + t*0.34})` : viral ? `rgba(105,232,124,${0.18 + t*0.36})` : `rgba(255,255,255,${0.14 + t*0.28})`;
        g.lineWidth = 2;
        g.beginPath();
        g.arc(s.x, s.y, pulseR, 0, Math.PI * 2);
        g.stroke();
      }

      const t = this.seed + this._pulse*2.2;
      const drawTwinkle = (cx,cy,scale,bright) => {
        const k = Math.max(1, Math.round(scale));
        g.fillStyle = bright ? sp.c : sp.a;
        g.fillRect(cx-k, cy, 2*k+1, 1);
        g.fillRect(cx, cy-k, 1, 2*k+1);
        g.fillStyle = bright ? sp.a : sp.b;
        g.fillRect(cx-1, cy-1, 1, 1);
        g.fillRect(cx+1, cy-1, 1, 1);
        g.fillRect(cx-1, cy+1, 1, 1);
        g.fillRect(cx+1, cy+1, 1, 1);
      };

      const twinkleCount = spicy ? 16 : 18;
      for(let i=0;i<twinkleCount;i++) {
        const a = (i*0.83 + t*0.9) % (Math.PI*2);
        const rr = (R*0.12) + (i%6)*(R*0.12) + (Math.sin(i*7.1+t)*1.4);
        const px = (s.x + Math.cos(a)*rr + (i%3-1)*2.0)|0;
        const py = (s.y + Math.sin(a)*rr + ((i+1)%3-1)*2.0)|0;
        drawTwinkle(px,py, (i%5===0)?2:1, (i%7===0));
      }
      drawTwinkle((s.x|0),(s.y|0), 2 + (overlapLevel>0?1:0), true);
    }
  }

  // Advocate: star orbital projectile  // Advocate: star orbital projectile star orbital projectile
  class Orbital {
    constructor(angle, dmg, id=0) {
      this.a=angle;
      this.dmg=dmg;
      this.id=id;
    }
    pos(player, t, spin){
      const ang = this.a + t*spin;
      const shape = player?.advocateBuild?.shape || null;
      const shapeCfg = CFG.advocateMods?.shapes?.[shape] || {};
      const R = CFG.weapons.advocate.orbitR * player.stats.advocateOrbitR * (Number(shapeCfg.orbitRadiusMult)||1);
      return { x: player.x + Math.cos(ang)*R, y: player.y + Math.sin(ang)*R, ang, R };
    }
    segment(player,t,spin){
      const p=this.pos(player,t,spin);
      const shape = player?.advocateBuild?.shape || null;
      const shapeCfg = CFG.advocateMods?.shapes?.[shape] || {};
      const length = CFG.weapons.advocate.size * player.stats.advocateSize * (Number(shapeCfg.beamLengthMult)||1);
      const width = CFG.weapons.advocate.size * 0.55 * player.stats.advocateSize * (Number(shapeCfg.beamWidthMult)||1);
      const x1 = player.x + Math.cos(p.ang) * 4;
      const y1 = player.y + Math.sin(p.ang) * 4;
      const x2 = player.x + Math.cos(p.ang) * length;
      const y2 = player.y + Math.sin(p.ang) * length;
      return {x1,y1,x2,y2,width,ang:p.ang};
    }
    draw(g,cam, player, t, theme){
      const spin = CFG.weapons.advocate.spin * player.stats.advocateSpin;
      const shape = player?.advocateBuild?.shape || null;
      if (shape === "partner_discovery") {
        const seg=this.segment(player,t,spin);
        const s1=cam.w2s(seg.x1,seg.y1), s2=cam.w2s(seg.x2,seg.y2);
        g.save();
        g.strokeStyle = "rgba(252,204,56,0.95)";
        g.lineWidth = Math.max(2, seg.width);
        g.beginPath();
        g.moveTo(s1.x,s1.y);
        g.lineTo(s2.x,s2.y);
        g.stroke();
        g.strokeStyle = "rgba(255,255,255,0.35)";
        g.lineWidth = Math.max(1, seg.width*0.33);
        g.beginPath();
        g.moveTo(s1.x,s1.y);
        g.lineTo(s2.x,s2.y);
        g.stroke();
        g.restore();
        return;
      }
      const p=this.pos(player,t,spin);
      const s=cam.w2s(p.x,p.y);
      const size = CFG.weapons.advocate.size * player.stats.advocateSize * (Number((CFG.advocateMods?.shapes?.[shape]||{}).orbitSizeMult)||1);
      this.drawStar(g, (s.x|0), (s.y|0), size, theme);
    }
    drawStar(g, cx, cy, size, theme){
      const col1="#ffd24a", col2=IMPACT.orange, col3=(theme.mode===ThemeMode.DARK)?"rgba(255,255,255,0.55)":"rgba(0,0,0,0.20)";
      const s = Math.max(1, Math.round(size/15));
      const stamp=(dx,dy,w,h,fill)=>{ g.fillStyle=fill; g.fillRect(cx+dx*s, cy+dy*s, w*s, h*s); };
      stamp(-1,-6,2,3,col1); stamp(-1,3,2,3,col1);
      stamp(-6,-1,3,2,col1); stamp(3,-1,3,2,col1);
      stamp(-4,-4,2,2,col1); stamp(2,-4,2,2,col1);
      stamp(-4,2,2,2,col1);  stamp(2,2,2,2,col1);
      stamp(-2,-2,4,4,col2);
      stamp(1,-1,1,1,col3);
      stamp(-1,1,1,1,col3);
    }
  }

  class EnemyBase {
    constructor(x,y){ this.x=x; this.y=y; this.hp=1; this.maxHp=1; this.dead=false; this.deathT=0; this._dropped=false; this.burnTime=0; this.burnDps=0; this._burnFx=0; this.slowTimer=0; this.slowMult=1; this.hasteTimer=0; this.hasteMult=1; this.vulnTimer=0; this.vulnMult=1; this._surgeArcCd=0; }
    take(dmg){ const mult = Number(this.vulnMult)||1; this.hp-=(dmg*mult); if(this.hp<=0 && !this.dead){ this.dead=true; this.deathT=0; } }
    applyBurn(dps, sec){
      this.burnDps = Math.max(this.burnDps || 0, Number(dps) || 0);
      this.burnTime = Math.max(this.burnTime || 0, Number(sec) || 0);
    }
    updateStatus(dt){
      this._burnFx += dt;
      if (this.dead) return;

      this.slowTimer = Math.max(0, (this.slowTimer || 0) - dt);
      if (this.slowTimer <= 0) this.slowMult = 1;

      this.hasteTimer = Math.max(0, (this.hasteTimer || 0) - dt);
      if (this.hasteTimer <= 0) this.hasteMult = 1;

      this.vulnTimer = Math.max(0, (this.vulnTimer || 0) - dt);
      if (this.vulnTimer <= 0) this.vulnMult = 1;

      this._surgeArcCd = Math.max(0, (this._surgeArcCd || 0) - dt);

      if (this.burnTime > 0 && this.burnDps > 0) {
        this.burnTime = Math.max(0, this.burnTime - dt);
        this.take(this.burnDps * dt);
      } else {
        this.burnDps = 0;
      }
    }
    updateDeath(dt){ this.deathT += dt; }
    moveScale(){
      const slow = this.slowTimer > 0 ? (this.slowMult || 1) : 1;
      const haste = this.hasteTimer > 0 ? (this.hasteMult || 1) : 1;
      return slow * haste;
    }
    drawHpBar(g,cam,w,h,yOff=-14){
      if (this.dead || !this.maxHp || this.maxHp <= 1) return;
      const pct = clamp(this.hp / this.maxHp, 0, 1);
      const s = cam.w2s(this.x, this.y + yOff);
      const x = (s.x - w/2)|0;
      const y = s.y|0;
      g.fillStyle = "rgba(0,0,0,0.55)";
      g.fillRect(x, y, w, h);
      g.fillStyle = "rgba(90,230,130,0.95)";
      g.fillRect(x, y, Math.max(1, Math.floor(w*pct)), h);
      g.fillStyle = "rgba(255,255,255,0.25)";
      g.fillRect(x, y, w, 1);
    }
    drawBurnFx(g,cam){
      if (this.dead || !(this.burnTime > 0)) return;
      const s = cam.w2s(this.x, this.y);
      const rr = Math.max(6, this.r || Math.max(this.w || 0, this.h || 0) * 0.6 || 8);
      const a = 0.38 + 0.18 * Math.sin((this._burnFx || 0) * 16);
      g.fillStyle = `rgba(255,85,0,${a})`;
      g.beginPath();
      g.arc(s.x, s.y, rr + 5, 0, Math.PI * 2);
      g.fill();
      g.fillStyle = `rgba(255,200,90,${0.52 + a*0.28})`;
      for (let i = 0; i < 3; i++) {
        const ox = Math.sin((this._burnFx*9) + i*2.1) * (rr * 0.45);
        const oy = -((this._burnFx*22 + i*7) % Math.max(6, rr*1.6));
        g.fillRect((s.x + ox)|0, (s.y + oy)|0, i === 0 ? 3 : 2, i === 0 ? 3 : 2);
      }
    }
    drawDeath(g,cam, w,h){
      const s=cam.w2s(this.x,this.y);
      const t=this.deathT;
      const k = clamp(t/0.20, 0, 1);
      const hh = Math.max(1, Math.floor(h*(1-k)));
      const alpha = 1 - clamp((t-0.20)/0.18, 0, 1);
      const x = (s.x - w/2)|0;
      const ly = (s.y)|0;

      g.fillStyle = `rgba(255,255,255,${0.10*alpha})`;
      g.fillRect(x, (s.y - hh/2)|0, w, hh);

      g.fillStyle = `rgba(255,255,255,${0.85*alpha})`;
      g.fillRect(x, ly, w, 1);

      g.fillStyle = `rgba(41,141,218,${0.18*alpha})`;
      g.fillRect(x-1, ly-1, w+2, 3);
    }
  }

  class BannerEnemy extends EnemyBase {
    constructor(x,y,isMini=false,specOverride=null,typeId=null){
      super(x,y);
      const spec = specOverride || null;
      this.enemyTypeId = typeId || spec?.id || (isMini ? "banner_elite" : "banner");
      this.isMini = !!(spec?.elite || isMini);
      const sizeMult = spec ? 1.0 : (this.isMini ? CFG.enemies.banner.miniSizeMult : 1.0);

      this.w=Math.round((Number(spec?.w) || CFG.enemies.banner.w)*sizeMult);
      this.h=Math.round((Number(spec?.h) || CFG.enemies.banner.h)*sizeMult);
      const jitterMin = Number(spec?.speedJitterMin ?? 0.9);
      const jitterMax = Number(spec?.speedJitterMax ?? 1.15);
      const baseSpeed = Number(spec?.speed) || CFG.enemies.banner.speed;
      const speedMult = spec ? 1.0 : (this.isMini ? CFG.enemies.banner.miniSpeedMult : 1.0);
      this.speed=baseSpeed*rand(Math.min(jitterMin,jitterMax), Math.max(jitterMin,jitterMax))*speedMult;
      this.hp=(Number(spec?.hp) || CFG.enemies.banner.hp) * (spec ? 1 : (this.isMini ? CFG.enemies.banner.miniHpMult : 1));
      this.maxHp=this.hp;
      this.touch=(Number(spec?.touch) || CFG.enemies.banner.touch) + (spec ? 0 : (this.isMini ? (CFG.enemies.banner.miniTouchBonus||0) : 0));
      this.hitInterval=Number(spec?.hitInterval) || CFG.enemies.banner.hitInterval;
      this.hitCd=0;
      this.scoreOnKill = Number(spec?.scoreOnKill) || (this.isMini ? 25 : 10);
      this.coinXp = Number(spec?.coinXp) || CFG.xp.coinXp;
      this.bigCoinXp = Number(spec?.bigCoinXp) || (this.isMini ? CFG.enemies.banner.miniBigCoinXp : 5);

      const msgs=(Array.isArray(spec?.messagePool) && spec.messagePool.length) ? spec.messagePool : CFG.enemies.banner.msgPool;
      this.msg = msgs[randi(0,msgs.length-1)];

      const pal = spec?.palette || null;
      if (pal) {
        this.fillA = pal.fillA || "#ffd24a";
        this.fillB = pal.fillB || "rgba(0,0,0,0.10)";
        this.border = pal.border || "#0b1320";
        this.ribbon = pal.ribbon || IMPACT.orange;
      } else if (this.isMini) {
        this.fillA = IMPACT.orange;
        this.fillB = IMPACT.pink;
        this.border = "#0b1320";
        this.ribbon = "#e5484d";
      } else {
        this.fillA = "#ffd24a";
        this.fillB = "rgba(0,0,0,0.10)";
        this.border = "#0b1320";
        this.ribbon = [IMPACT.orange, "#2f6fff", "#7c4dff", IMPACT.pink][randi(0,3)];
      }
    }
    overlaps(p){
      const rx=this.x-this.w/2, ry=this.y-this.h/2;
      const cx=clamp(p.x, rx, rx+this.w), cy=clamp(p.y, ry, ry+this.h);
      return dist2(p.x,p.y,cx,cy) <= p.r*p.r;
    }
    update(dt, game){
      if(this.dead){ this.updateDeath(dt); return; }
      const p=game.player;
      const dx=p.x-this.x, dy=p.y-this.y;
      const d=Math.hypot(dx,dy)||1;
      const moveMult = this.moveScale();
      this.x += (dx/d)*this.speed*moveMult*dt;
      this.y += (dy/d)*this.speed*moveMult*dt;
      this.bannerCtaPulse += dt;
      if (this.enemyTypeId === "boss1") {
        this.bannerLineTimer -= dt;
        if (this.bannerLineTimer <= 0) {
          this.bannerLineTimer = rand(1.1, 2.0);
          this.bannerLineIndex = (this.bannerLineIndex + 1) % Math.max(1, this.bannerLines.length);
        }
      }
      applyEnemySeparation(this, game, dt);
      if(this.hitCd>0) this.hitCd=Math.max(0,this.hitCd-dt);
      if(this.overlaps(p) && this.hitCd<=0){
        p.applyDamage(this.touch);
        game.sfx.hit();
        this.hitCd=this.hitInterval;
      }
    }
    draw(g,cam){
      if(this.dead){ this.drawDeath(g,cam,this.w,this.h); return; }
      const s=cam.w2s(this.x,this.y);
      const x=(s.x-this.w/2)|0, y=(s.y-this.h/2)|0;

      this.drawBurnFx(g,cam);

      g.fillStyle=this.fillA; g.fillRect(x,y,this.w,this.h);
      if(this.isMini){
        g.fillStyle="rgba(255,255,255,0.12)";
        g.fillRect(x+1,y+1,this.w-2,this.h-2);
      }

      g.fillStyle=this.border;
      g.fillRect(x,y,this.w,1); g.fillRect(x,y+this.h-1,this.w,1);
      g.fillRect(x,y,1,this.h); g.fillRect(x+this.w-1,y,1,this.h);

      g.fillStyle=this.ribbon;
      g.fillRect(x+1,y+1,this.w-2,3);

      g.fillStyle="rgba(0,0,0,0.70)";
      g.fillRect(x+3,y+5,this.w-6,2);
      g.fillRect(x+3,y+8,this.w-10,2);

      g.fillRect(x+2,y+1, Math.min(this.w-4, this.msg.length*3), 1);
      if(this.isMini){
        g.fillStyle="rgba(0,0,0,0.85)";
        g.fillRect(x+2,y+this.h-4, this.w-4, 3);
        g.fillStyle="#f8fbff";
        g.font=CFG.ui.small;
        g.fillText(">:(", x+4, y+this.h-2);
      }

      g.fillStyle="rgba(0,0,0,0.35)";
      g.fillRect(x+4,y+this.h,2,3);
      g.fillRect(x+this.w-6,y+this.h,2,3);

      this.drawHpBar(g, cam, this.w, 3, -(this.h/2 + 8));
    }
  }

    }
    overlaps(p){ return dist2(this.x,this.y,p.x,p.y) <= (this.r+p.r)*(this.r+p.r); }
    update(dt, game){
      if(this.dead){ this.updateDeath(dt); return; }
      this.spawnedAt += dt;
      this.spawnFxLife = Math.max(0, this.spawnFxLife - dt);
      const p=game.player;

      if(this.spawnedAt < this.warn){
        if(this.overlaps(p) && this.hitCd<=0){
          p.applyDamage(this.touch);
          game.sfx.hit();
          this.hitCd=0.5;
        }
        if(this.hitCd>0) this.hitCd=Math.max(0,this.hitCd-dt);
        return;
      }

      const dx=p.x-this.x, dy=p.y-this.y;
      const d=Math.hypot(dx,dy)||1;
      const moveMult = this.moveScale();
      this.x += (dx/d)*this.speed*moveMult*dt;
      this.y += (dy/d)*this.speed*moveMult*dt;
      this.bannerCtaPulse += dt;
      if (this.enemyTypeId === "boss1") {
        this.bannerLineTimer -= dt;
        if (this.bannerLineTimer <= 0) {
          this.bannerLineTimer = rand(1.1, 2.0);
          this.bannerLineIndex = (this.bannerLineIndex + 1) % Math.max(1, this.bannerLines.length);
        }

      const pal = this.popupPalette || {};
      const fxT = this.spawnFxMax > 0 ? (this.spawnFxLife / this.spawnFxMax) : 0;
      const bounce = fxT > 0 ? (1 + 0.22*Math.sin((1 - fxT) * Math.PI) * fxT) : 1;
      const dw = Math.round(w * bounce), dh = Math.round(h * bounce);

      g.fillStyle=pal.border || "#0b1320"; g.fillRect(dx,dy,dw,1);
      g.fillStyle=pal.ribbon || IMPACT.pink; g.fillRect(dx+1,dy+1,dw-2,3);
      g.fillStyle=pal.border || "#0b1320"; g.fillRect(dx+dw-4,dy+1,2,2);
      g.fillStyle="rgba(0,0,0,0.18)";
      g.fillRect(dx+2,dy+6,dw-5,2);
      g.fillRect(dx+2,dy+9,Math.max(6,dw-8),2);

      this.drawHpBar(g, cam, 18, 3, -14);
    }
  }

      const nx=dx/d, ny=dy/d;
      const px=-ny, py=nx;
      const wobble=Math.sin(game.time*this.wobbleFreq + this.wobbleSeed);
      const moveMult = this.moveScale();
      this.x += (nx + px*0.28*wobble) * this.speed * moveMult * dt;
      this.y += (ny + py*0.28*wobble) * this.speed * moveMult * dt;
      applyEnemySeparation(this, game, dt);
      if(this.hitCd>0) this.hitCd=Math.max(0,this.hitCd-dt);
      if(this.overlaps(p) && this.hitCd<=0){ p.applyDamage(this.touch); game.sfx.hit(); this.hitCd=this.hitInterval; }
    }

      if(this.dead){ this.drawDeath(g,cam,this.w,this.h); return; }

      g.strokeStyle=pal.border || "#5b3a22"; g.lineWidth=2; g.stroke();
      g.fillStyle=pal.crumb || "rgba(255,245,220,0.45)";
      g.fillRect(x-r+2,y-r+4,3,2); g.fillRect(x+r-6,y-r+2,2,2); g.fillRect(x-r+5,y+r-5,2,2);
      g.fillStyle=pal.chip || "#5a321c";
      const chips=[[-4,-3],[3,-4],[-1,1],[5,3],[-5,4],[1,5]];
      for(const [ox,oy] of chips) g.fillRect(x+ox,y+oy,2,2);
      this.drawHpBar(g, cam, r*2, 3, -(r + 8));
    }
  }

    beginAim(game){

    }
    fire(game){

      applyEnemySeparation(this, game, dt);

      g.fillStyle=this.eyeColor; g.beginPath(); g.arc(s.x,s.y,this.r,0,Math.PI*2); g.fill();

      this.drawHpBar(g, cam, Math.max(18, this.r*2), 3, -(this.r + 8));

  class Coin {
    constructor(x,y,xp=1,isBig=false){
      this.x=x; this.y=y;
      this.xp=xp;
      this.dead=false;
      this.vac=false;
      this.isBig=!!isBig;
    }
    update(dt, game){
      if(this.dead) return;
      const p=game.player;
      const magnetMult = (p.magnetTimer > 0) ? (CFG.powerups?.magnet?.radiusMult ?? 1) : 1;
      const track = CFG.xp.coinAttractDefault * p.stats.tracking * magnetMult;

      const dx=p.x-this.x, dy=p.y-this.y;
      const d=Math.hypot(dx,dy)||1;

      const grabR = p.r + (this.isBig ? 4 : 2);
      if(d <= grabR){
        this.dead=true;
        game.addXp(this.xp);
        game.sfx.coin();
        return;
      }

      if(!this.vac && d <= track) this.vac=true;

      if(this.vac){
        const sp = CFG.xp.coinVacuumSpeed;
        this.x += (dx/d)*sp*dt;
        this.y += (dy/d)*sp*dt;
      }
    }
    draw(g,cam){
      if(this.dead) return;
      const s=cam.w2s(this.x,this.y);
      const size = this.isBig ? 9 : 6;
      const x=(s.x-size/2)|0, y=(s.y-size/2)|0;

      g.fillStyle=this.isBig ? "#ffd24a" : IMPACT.orange;
      g.fillRect(x,y,size,size);

      g.fillStyle="#0b1320";
      g.fillRect(x,y,size,1); g.fillRect(x,y+size-1,size,1);
      g.fillRect(x,y,1,size); g.fillRect(x+size-1,y,1,size);

      g.fillStyle="rgba(255,255,255,0.55)";
      g.fillRect(x+2,y+2,1,1);

      if(this.isBig){
        g.fillStyle="rgba(0,0,0,0.25)";
        g.fillRect(x+2,y+size-3,size-4,1);
      }
    }
  }

    recomputeXpNeed() {
      if (CFG.xp.useTable) {

      const startWeaponId = this.player?.hero?.startWeapon || this.player?.weapons?.[0]?.id || "performance";

      while (this.xp >= this.xpNeed) {

    phasePoolEntries(which, phaseTime=this.phaseTime) {

      const cameo = which === "ambient" ? (phase.cameo || []) : [];
      for (const group of [primary, cameo]) {
        for (const row of group) {
          if (!row || !row.type) continue;
          const startSec = Number(row.startSec ?? 0) || 0;
          const endSec = Number.isFinite(Number(row.endSec)) ? Number(row.endSec) : Infinity;
          if (phaseTime < startSec || phaseTime > endSec) continue;
          rows.push(row);
        }
      }
      return rows;

    pickWeightedSpawnEntry(entries) {
      if (!entries || !entries.length) return null;
      let total = 0;
      for (const e of entries) total += Math.max(0, Number(e.weight ?? 1) || 0);
      if (total <= 0) return entries[0] || null;
      let roll = Math.random() * total;
      for (const e of entries) {
        roll -= Math.max(0, Number(e.weight ?? 1) || 0);
        if (roll <= 0) return e;
      }
      return entries[entries.length - 1] || null;
    }

        if (!e || e.dead || e === enemy) continue;
        if (e instanceof RetargeterEnemy && e.aiming) active++;
      }
      return active < limit;

      if (!shouldShow) return;
      const side = (n % 2 === 0) ? 1 : -1;

    spawnEnemyType(typeId, opts={}) {

      const spawnMode = opts.spawnMode || (spec.archetype === "popup" ? "nearPlayer" : "offscreen");

          if(side===0){ sx=rand(-halfW-pad, halfW+pad); sy=-halfH-pad; }
          else if(side===1){ sx=halfW+pad; sy=rand(-halfH-pad, halfH+pad); }
          else if(side===2){ sx=rand(-halfW-pad, halfW+pad); sy=halfH+pad; }
          else { sx=-halfW-pad; sy=rand(-halfH-pad, halfH+pad); }

      else if (spec.archetype === "pixel_broker") enemy = new PixelBrokerBoss(x,y,spec,typeId);
      else if (spec.archetype === "gatekeeper") enemy = new GatekeeperEnemy(x,y,spec,typeId);

      const entry = this.pickWeightedSpawnEntry(entries);
      if (!entry) return false;
      return !!this.spawnEnemyType(entry.type);

      const phase = this.getCurrentPhaseDef();
      if (!phase || !Array.isArray(phase.elite)) return;
      for (let i = 0; i < phase.elite.length; i++) {
        const rule = phase.elite[i];
        const every = Math.max(0.01, Number(rule.everySec) || 9999);
        let nextAt = Number(this.phaseEliteNextAt?.[i]);
        if (!Number.isFinite(nextAt)) nextAt = Math.max(0, Number(rule.startSec ?? every) || 0);

          if (this.countAliveType(rule.type) < maxAlive) this.spawnEnemyType(rule.type);
          nextAt += every;
        }
        this.phaseEliteNextAt[i] = nextAt;
      }

      const typeId = phase?.boss?.type;
      if (!typeId || this.bossActive || !this.player) return false;
      if (typeId === "phase3_boss") {

        if (!spec) return false;
        const a1 = rand(0, Math.PI*2);
        const dist = 120;
        const b1 = new DooOpolyBoss(this.player.x + Math.cos(a1)*dist, this.player.y + Math.sin(a1)*dist, spec, typeId, null, 0);
        const shared = b1.sharedBoss;

          this.spawnEnemyType('phase3_swarm', { x: this.player.x + Math.cos(ang)*rr, y: this.player.y + Math.sin(ang)*rr, source:'bossGarden' });
        }
        this.bossActive = true;
        this.phaseBossSpawned = true;
        this.lull = false;
        this.lullUntil = 0;
        this.music.onBossStart();
        this.fireBossSpawnSurges();
        return true;
      }
      const enemy = this.spawnEnemyType(typeId, { spawnMode: "boss" });
      if (!enemy) return false;
      this.bossActive = true;
      this.phaseBossSpawned = true;
      this.lull = false;
      this.lullUntil = 0;
      this.music.onBossStart();
      this.fireBossSpawnSurges();

      return this.time >= (Number(CFG.surges?.startDelaySec) || 0);
    }

    getPlayerMoveDir() {
      const vx = Number(this.player?.vx) || 0;
      const vy = Number(this.player?.vy) || 0;
      const d = Math.hypot(vx, vy);
      if (d > 0.001) return { x: vx / d, y: vy / d };
      return { x: 0, y: -1 };
    }

    surgePointFromAngle(angle, distanceMult=1.0) {
      const halfW = CFG.logicalW / 2;
      const halfH = CFG.logicalH / 2;
      const pad = CFG.world.spawnPad + 16;
      const sx = Math.cos(angle) * (halfW + pad) * distanceMult;
      const sy = Math.sin(angle) * (halfH + pad) * distanceMult;
      return { x: this.player.x + sx, y: this.player.y + sy };
    }

    buildSurgeSpawnPoints(pattern, count) {
      const pts = [];
      const dir = this.getPlayerMoveDir();
      const base = Math.atan2(dir.y, dir.x);
      const total = Math.max(1, count|0);
      for (let i = 0; i < total; i++) {
        let ang = 0;
        switch (pattern) {
          case "rear_chase": {
            const t = total === 1 ? 0 : (i / (total - 1));
            ang = base + Math.PI + (-0.45 + t * 0.90) + rand(-0.10, 0.10);
            break;
          }
          case "flank_left_right": {
            const side = (i % 2 === 0) ? -1 : 1;
            const rank = Math.floor(i / 2);
            const spread = (-0.30 + ((rank + 0.5) / Math.max(1, Math.ceil(total / 2))) * 0.60);
            ang = base + side * (Math.PI / 2) + spread + rand(-0.06, 0.06);
            break;
          }
          case "front_arc": {
            const t = total === 1 ? 0.5 : (i / (total - 1));
            ang = base + (-0.55 + t * 1.10) + rand(-0.08, 0.08);
            break;
          }
          case "lane_drop": {
            const side = randi(0, 3);
            const halfW = CFG.logicalW / 2;
            const halfH = CFG.logicalH / 2;
            const pad = CFG.world.spawnPad + 16;
            const offs = -0.70 + ((i + 0.5) / total) * 1.40;
            let sx = 0, sy = 0;
            if (side === 0) { sx = offs * halfW; sy = -halfH - pad; }
            else if (side === 1) { sx = halfW + pad; sy = offs * halfH; }
            else if (side === 2) { sx = offs * halfW; sy = halfH + pad; }
            else { sx = -halfW - pad; sy = offs * halfH; }
            pts.push({ x: this.player.x + sx, y: this.player.y + sy });
            continue;
          }
          case "random_edge":
            ang = rand(0, Math.PI * 2);
            break;
          case "ring_edge":
          default:
            ang = (i / total) * Math.PI * 2 + rand(-0.08, 0.08);
            break;
        }
        pts.push(this.surgePointFromAngle(ang));
      }
      return pts;
    }

    fireSurgeSpawn(spawnDef, reason="general") {
      if (!spawnDef?.type) return 0;
      const count = Math.max(1, Number(spawnDef.count) || 1);
      const pattern = spawnDef.pattern || "ring_edge";
      const pts = this.buildSurgeSpawnPoints(pattern, count);
      const spawned = [];
      for (let i = 0; i < pts.length; i++) {
        const p = pts[i];
        const specOverrides = {};
        if (spawnDef.speedMult !== undefined) {
          const baseSpec = this.getEnemySpec(spawnDef.type);
          specOverrides.speed = (Number(baseSpec?.speed) || 0) * (Number(spawnDef.speedMult) || 1);
        }
        if (spawnDef.hpMult !== undefined) {
          const baseSpec = this.getEnemySpec(spawnDef.type);
          specOverrides.hp = (Number(baseSpec?.hp) || 0) * (Number(spawnDef.hpMult) || 1);
        }
        if (spawnDef.separationRadiusMult !== undefined) specOverrides.separationRadiusMult = spawnDef.separationRadiusMult;
        if (spawnDef.separationStrengthMult !== undefined) specOverrides.separationStrengthMult = spawnDef.separationStrengthMult;
        const e = this.spawnEnemyType(spawnDef.type, { x: p.x, y: p.y, specOverrides, source: `surge:${reason}` });
        if (e) spawned.push(e);
      }
      return spawned.length;
    }

    fireBossSpawnSurges() {
      const phase = this.getCurrentPhaseDef();
      const rows = phase?.surges?.onBossSpawn || [];
      if (!rows.length || !this.surgesAllowed("bossSpawn")) return;
      for (const row of rows) this.fireSurgeSpawn(row, "bossSpawn");
    }

    updateLowPopulationSurges(dt) {
      const phase = this.getCurrentPhaseDef();
      const rules = phase?.surges?.lowPopulationTriggers || [];
      if (!rules.length || !this.surgesAllowed("lowPop")) return;
      if (this.time < (Number(this.nextLowPopCheckAt) || 0)) return;
      this.nextLowPopCheckAt = this.time + Math.max(0.05, Number(CFG.surges?.lowPopCheckEverySec) || 0.5);
      const alive = this.countLivingNonBossEnemies();
      for (let i = 0; i < rules.length; i++) {
        const rule = rules[i];
        const threshold = Math.max(0, Number(rule.whenBelow) || 0);
        const sustainSec = Math.max(0, Number(rule.sustainSec ?? CFG.surges?.defaultSustainSec) || 0);
        const cooldownSec = Math.max(0, Number(rule.cooldownSec ?? CFG.surges?.defaultCooldownSec) || 0);
        if (this.time < (Number(this.phaseLowPopNextAllowedAt?.[i]) || 0)) {
          this.phaseLowPopUnderSince[i] = 0;
          continue;
        }
        if (alive < threshold) {
          if (!this.phaseLowPopUnderSince[i]) this.phaseLowPopUnderSince[i] = this.time;
          if (this.time - this.phaseLowPopUnderSince[i] >= sustainSec) {
            const did = this.fireSurgeSpawn(rule.spawn || rule, "lowPop");
            this.phaseLowPopNextAllowedAt[i] = this.time + cooldownSec;
            this.phaseLowPopUnderSince[i] = 0;
            if (did > 0) break;
          }
        } else {
          this.phaseLowPopUnderSince[i] = 0;
        }
      }
    }

    createSquareGarden(cx, cy, spec={}) {
      const halfSize = Number(spec.halfSize || spec.gardenStartRadius) || 220;
      const thickness = Number(spec.wallThickness || spec.gardenWallThickness) || 18;
      const garden = { cx, cy, halfSize, shrinkSpeed: Number(spec.gardenShrinkSpeed) || 0, wallThickness: thickness, breached:false, active:true, boss: !!spec.boss, durationSec: Number(spec.durationSec)||0, life: Number(spec.durationSec)||0 };
      const innerSize = Math.max(24, halfSize*2 - thickness*1.6);
      this.gardenPatches.push(new GardenPatch(cx, cy, halfSize, spec.boss ? 999 : Math.max(0.1, garden.life || 999), 1.0, { boss:!!spec.boss, flowers: spec.flowers||10, square:true, w:innerSize, h:innerSize }));
      const perSide = Math.max(3, Number(spec.wallsPerSide || spec.gardenSegmentsPerSide) || 6);
      const segLen = Math.max(20, (halfSize*2) / perSide + thickness * 0.85 + 4);
      const sides = ['top','right','bottom','left'];
      for (const side of sides) {
        for (let i=0;i<perSide;i++) {
          const t = perSide===1 ? 0.5 : (i/(perSide-1));
          const wall = new GardenWallEnemy(garden, side, t, { hp: Number(spec.wallHp || spec.gardenWallHp)||110, thickness, segmentLength: segLen });
          this.enemies.push(wall);
          this.gardenWalls.push(wall);
          if (spec.boss) this.bossGardenWalls.push(wall);
        }
      }
      return garden;
    }

    createBossGarden(cx, cy, spec) {
      return this.createSquareGarden(cx, cy, { halfSize: Number(spec.gardenStartRadius)||220, gardenShrinkSpeed: Number(spec.gardenShrinkSpeed)||7, wallThickness: Number(spec.gardenWallThickness)||18, wallHp: Number(spec.gardenWallHp)||110, gardenSegmentsPerSide: Number(spec.gardenSegmentsPerSide)||20, flowers: 12, boss:true });
    }

    resolveEntityWallCollision(entity, wall) {
      if (!entity || !wall || wall.dead || !wall.isWall) return;
      const left = wall.x - wall.w/2, right = wall.x + wall.w/2;
      const top = wall.y - wall.h/2, bottom = wall.y + wall.h/2;
      const cx = clamp(entity.x, left, right), cy = clamp(entity.y, top, bottom);
      let dx = entity.x - cx, dy = entity.y - cy;
      let d2 = dx*dx + dy*dy;
      const rr = (entity.r || 8);
      if (d2 < rr*rr) {
        if (d2 > 0.0001) {
          const d = Math.sqrt(d2);
          const push = rr - d + 0.5;
          entity.x += (dx/d) * push;
          entity.y += (dy/d) * push;
        } else {
          const penL = Math.abs(entity.x - left), penR = Math.abs(right - entity.x), penT = Math.abs(entity.y - top), penB = Math.abs(bottom - entity.y);
          const minPen = Math.min(penL, penR, penT, penB);
          if (minPen === penL) entity.x = left - rr - 0.5;
          else if (minPen === penR) entity.x = right + rr + 0.5;
          else if (minPen === penT) entity.y = top - rr - 0.5;
          else entity.y = bottom + rr + 0.5;
        }
      }
    }

    handlePlayerGardenInteractions(dt) {
      if (!this.player) return;
      for (const wall of this.gardenWalls) {
        if (!wall || wall.dead) continue;
        this.resolveEntityWallCollision(this.player, wall);
      }
    }

    updateDooOpolyTether(a, b, dt) {
      const group = a?.sharedBoss; if (!group || !this.player) return;
      const state = group.tetherState || 'off';
      if (state === 'off') return;
      if (state === 'active' && (group.tetherHitCd || 0) <= 0) {
        const px=this.player.x, py=this.player.y;
        const ax=a.x, ay=a.y, bx=b.x, by=b.y;
        const lab = dist2(ax,ay,bx,by) || 1;
        let t = ((px-ax)*(bx-ax)+(py-ay)*(by-ay))/lab;
        t = clamp(t,0,1);
        const cx = ax + (bx-ax)*t, cy = ay + (by-ay)*t;
        const width = Number(a.tetherWidth || 8) + this.player.r;
        if (dist2(px,py,cx,cy) <= width*width) {
          this.player.applyDamage(Number(a.tetherDamage)||8);
          group.tetherHitCd = Number(a.tetherHitInterval)||0.28;
        }
      }
    }

    startRun(hero) {
      this.time=0;
      this.enemies.length=0;
      this.bullets.length=0;
      this.enemyProjectiles.length=0;
      this.enemyMarkers.length=0;
      this.fields.length=0;
      this.fieldBursts.length=0;
      this.popupTexts.length=0;
      this.gardenPatches.length=0;
      this.bossGardenWalls.length=0;
      this.popupSpawnCount = 0;
      this.surgeArcs.length=0;
      this.dooBossGroups.length=0;
      this.orbitals.length=0;
      this.coins.length=0;
      this.chests.length=0;
      this.powerups.length=0;
      this._delayedShots.length=0;

      this.spawnAcc=0;
      this.popupAcc=0;

      this.xp=0;

        viralChainChanceMult: 1.0,

        spicyBurnDpsMult: 1.0,
      };
      // Advocate runtime state
      this.player.advocateBuild = { shape:null, effect:null };
      this.player.advocateTrails = [];
      this.player.advocateTimers = { trail: 0 };
      this.player.advocateTrailState = {};
      this.player.advocateHitCooldowns = {};
      this.player.advocateStats = {
        rangeChoices: 0,
        speedChoices: 0,
        orbitalUpgradeCount: 0,
      };
      this.player.stats.advocateOrbitals = this.player.stats.advocateOrbitals || 1;
      this._pickedStartingModifier = false;
      this._pickedSecondModifier = false;
      this.cam.x=this.player.x; this.cam.y=this.player.y;

      this.giveWeapon(hero.startWeapon);

      this.state=State.PLAY;
      this.updateAudioMix();
      this.setPaused(false);
    }

    giveWeapon(id) {
      const p=this.player;
      if(!p) return;
      const activeCount = p.weapons.filter(w=>w.kind==="active").length;
      if(p.weapons.some(w=>w.id===id)) return;
      if(activeCount>=3) return;

      if (!p.weaponUpgradeTiers) p.weaponUpgradeTiers = { performance: 0, creator: 0, advocate: 0 };
      if (!p.weaponCatchup) p.weaponCatchup = { performance: 0, creator: 0, advocate: 0 };
      if (!p.mods) p.mods = {};
      if(id==="performance") {
        p.weapons.push({ id, kind:"active", cd:0 });
        if (!Array.isArray(p.mods.performance)) p.mods.performance = [];
        p.weaponUpgradeTiers.performance = p.weaponUpgradeTiers.performance || 0;
        p.weaponCatchup.performance = 0;
      }
      else if(id==="creator") {
        p.weapons.push({ id, kind:"active", cd:0 });
        p.creatorBuild = p.creatorBuild || { strategy:null, behavior:null };
        p.weaponUpgradeTiers.creator = p.weaponUpgradeTiers.creator || 0;
        p.weaponCatchup.creator = 0;
      }
      else if(id==="advocate") {
        p.weapons.push({ id, kind:"active" });
        p.weaponUpgradeTiers.advocate = p.weaponUpgradeTiers.advocate || 0;
        p.weaponCatchup.advocate = 0;
        this.rebuildOrbitals();
      }
    }

    rebuildOrbitals() {
      const p=this.player;
      if(!p) return;
      if(!p.weapons.some(w=>w.id==="advocate")) { this.orbitals.length=0; return; }

      const count = Math.max(1, Math.round(p.stats.advocateOrbitals || 1));
      this.orbitals.length=0;
      for(let i=0;i<count;i++){
        const a=(i/count)*Math.PI*2;
        this.orbitals.push(new Orbital(a, CFG.weapons.advocate.dmg * p.stats.dmgMult, i));
      }
    }

    openLevelUp() {
      this.state=State.LEVEL;
      this.upgradeChoices = this.buildLevelUpChoices();
      this.overlayAnim = 0;
      this.sfx.levelUp();
    }

    openModifierPick(forceWeaponId=null, forceCreatorType=null) {
      const wid = forceWeaponId || this.player?.weapons?.[0]?.id || this.player?.hero?.startWeapon || "performance";
      this._modWeaponId = wid;

      if (wid === "advocate") {
        const hasShape = !!this.player?.advocateBuild?.shape;
        const hasEffect = !!this.player?.advocateBuild?.effect;

        if (forceCreatorType === "shape") {
          this.modChoices = this.rollAdvocateShapeChoices();
          if (!this.modChoices.length) { this.openLevelUp(); return; }
          this.state = State.MOD; this.overlayAnim = 0; this.sfx.levelUp(); return;
        }
        if (forceCreatorType === "effect") {
          if (hasEffect) { this.openLevelUp(); return; }
          this.modChoices = this.rollAdvocateEffectChoices();
          if (!this.modChoices.length) { this.openLevelUp(); return; }
          this.state = State.MOD; this.overlayAnim = 0; this.sfx.levelUp(); return;
        }
        if (!hasShape) {
          this.modChoices = this.rollAdvocateShapeChoices();
          if (!this.modChoices.length) { this.openLevelUp(); return; }
          this.state = State.MOD; this.overlayAnim = 0; this.sfx.levelUp(); return;
        }
        if (!hasEffect) {
          this.modChoices = this.rollAdvocateEffectChoices();
          if (!this.modChoices.length) { this.openLevelUp(); return; }
          this.state = State.MOD; this.overlayAnim = 0; this.sfx.levelUp(); return;
        }
        this.openLevelUp(); return;
      }

      if (wid === "creator") {
        const hasStrategy = !!this.player?.creatorBuild?.strategy;
        const hasBehavior = !!this.player?.creatorBuild?.behavior;

        if (forceCreatorType === "strategy") {
          this.modChoices = this.rollCreatorStrategyChoices();
          if (!this.modChoices.length) {
            this.openLevelUp();
            return;
          }
          this.state = State.MOD;
          this.overlayAnim = 0;
          this.sfx.levelUp();
          return;
        }

        if (forceCreatorType === "behavior") {
          if (hasBehavior) {
            this.openLevelUp();
            return;
          }
          this.modChoices = this.rollCreatorBehaviorChoices();
          if (!this.modChoices.length) {
            this.openLevelUp();
            return;
          }
          this.state = State.MOD;
          this.overlayAnim = 0;
          this.sfx.levelUp();
          return;
        }

        if (!hasStrategy) {
          this.modChoices = this.rollCreatorStrategyChoices();
          if (!this.modChoices.length) {
            this.openLevelUp();
            return;
          }
          this.state = State.MOD;
          this.overlayAnim = 0;
          this.sfx.levelUp();
          return;
        }

        if (!hasBehavior) {
          this.modChoices = this.rollCreatorBehaviorChoices();
          if (!this.modChoices.length) {
            this.openLevelUp();
            return;
          }
          this.state = State.MOD;
          this.overlayAnim = 0;
          this.sfx.levelUp();
          return;
        }

        this.openLevelUp();
        return;
      }

      this.modChoices = this.rollModifiers(wid, CFG.choiceCounts.modifiers);
      if (!this.modChoices.length) {
        this.openLevelUp();
        return;
      }
      this.state = State.MOD;
      this.overlayAnim = 0;
      this.sfx.levelUp();
    }

    rollCreatorStrategyChoices() {
      const defs = CFG.creatorMods?.strategies || {};
      return Object.values(defs).map(def => ({ ...def, kind:"creator_strategy" }));
    }

    rollCreatorBehaviorChoices() {
      const defs = CFG.creatorMods?.behaviors || {};
      return Object.values(defs).map(def => ({ ...def, kind:"creator_behavior" }));
    }

    rollAdvocateShapeChoices() {
      const defs = CFG.advocateMods?.shapes || {};
      return Object.values(defs).map(def => ({ ...def, kind:"advocate_shape" }));
    }

    rollAdvocateEffectChoices() {
      const defs = CFG.advocateMods?.effects || {};
      return Object.values(defs).map(def => ({ ...def, kind:"advocate_effect" }));
    }

    rollModifiers(weaponId, n) {
      const defs = CFG.modifiers.defs?.[weaponId] || {};
      const owned = new Set(Array.isArray(this.player?.mods?.[weaponId]) ? this.player.mods[weaponId] : []);
      const pool = Object.values(defs)
        .filter(m => !owned.has(m.id))
        .map(m => ({ ...m, kind:"modifier" }));
      const picks = [];
      const tmp = pool.slice();
      for (let i=0; i<n && tmp.length; i++) {
        let sum = 0; for (const m of tmp) sum += (m.weight || 1);
        let r = Math.random() * sum;
        let idx = 0;
        for (; idx<tmp.length; idx++) { r -= (tmp[idx].weight || 1); if (r <= 0) break; }
        picks.push(tmp.splice(Math.min(idx, tmp.length-1), 1)[0]);
      }
      return picks;
    }

    applyModifier(mod) {
      if (!this.player) { this.state = State.PLAY; return; }

      if (mod.kind === "creator_strategy") {
        if (!this.player.creatorBuild) this.player.creatorBuild = { strategy:null, behavior:null };
        this.player.creatorBuild.strategy = mod.id;
        this.state = State.PLAY;
        this.processPendingLevelRewards();
        return;
      }

      if (mod.kind === "creator_behavior") {
        if (!this.player.creatorBuild) this.player.creatorBuild = { strategy:null, behavior:null };
        this.player.creatorBuild.behavior = mod.id;
        if (!this.player.weaponUpgradeTiers) this.player.weaponUpgradeTiers = { performance: 0, creator: 0, advocate: 0 };
        this.player.weaponUpgradeTiers.creator = (this.player.weaponUpgradeTiers.creator || 0) + 1;
        this.state = State.PLAY;
        this.processPendingLevelRewards();
        return;
      }

      if (mod.kind === "advocate_shape") {
        if (!this.player.advocateBuild) this.player.advocateBuild = { shape:null, effect:null };
