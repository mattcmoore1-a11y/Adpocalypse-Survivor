        this.player.advocateBuild.shape = mod.id;
        const shapeCfg = CFG.advocateMods?.shapes?.[mod.id] || {};
        this.player.stats.advocateOrbitals = Number(shapeCfg.startOrbitals) || 1;
        this.rebuildOrbitals();
        this.state = State.PLAY;
        this.processPendingLevelRewards();
        return;
      }

      if (mod.kind === "advocate_effect") {
        if (!this.player.advocateBuild) this.player.advocateBuild = { shape:null, effect:null };
        this.player.advocateBuild.effect = mod.id;
        if (!this.player.weaponUpgradeTiers) this.player.weaponUpgradeTiers = { performance: 0, creator: 0, advocate: 0 };
        this.player.weaponUpgradeTiers.advocate = (this.player.weaponUpgradeTiers.advocate || 0) + 1;
        this.state = State.PLAY;
        this.processPendingLevelRewards();
        return;
      }

      const wid = this._modWeaponId || this.player.weapons?.[0]?.id;
      if (wid) {
        const arr = Array.isArray(this.player.mods[wid]) ? this.player.mods[wid] : [];
        if (!arr.includes(mod.id)) arr.push(mod.id);
        this.player.mods[wid] = arr;

        if (this._pendingModifierTrackAdvance === wid || mod.advanceTrackOnPick) {
          if (!this.player.weaponUpgradeTiers) this.player.weaponUpgradeTiers = { performance: 0, creator: 0, advocate: 0 };
          this.player.weaponUpgradeTiers[wid] = (this.player.weaponUpgradeTiers[wid] || 0) + 1;
          this._pendingModifierTrackAdvance = null;
        }
      }
      this.state = State.PLAY;
      this.processPendingLevelRewards();
    }

    updateMod(dt) {
      this.updateTopRightButtons();
      this.overlayAnim = Math.min(1, this.overlayAnim + dt*7);

      const m=this.surf.mouseToLogical(this.input);
      if(this.input.mouse.clicked){
        const rects=this.choiceRects(this.modChoices.length, 86);
        for(let i=0;i<rects.length;i++){
          const r=rects[i];
          if(m.x>=r.x&&m.x<=r.x+r.w&&m.y>=r.y&&m.y<=r.y+r.h){
            this.applyModifier(this.modChoices[i]);
            this.sfx.ui();
            return;
          }
        }
      }
    }

    openChest() {
      this.state = State.CHEST;
      this.chestChoices = this.rollChestChoices();
      if (!Array.isArray(this.chestChoices) || this.chestChoices.length === 0) {
        this.chestChoices = this.buildLevelUpChoices();
      }
      if (!Array.isArray(this.chestChoices) || this.chestChoices.length === 0) {
        this.state = State.PLAY;
        return;
      }
      this.overlayAnim = 0;
      this.sfx.levelUp();
    }

    rollChestChoices() {
      const p=this.player;
      const have = new Set(p.weapons.map(w=>w.id));
      const all = ["performance","creator","advocate"];
      const missing = all.filter(w=>!have.has(w));

      if (missing.length === 0) {
        return this.buildLevelUpChoices();
      }

      const picks=[];
      const tmp=missing.slice();
      const want = Math.min(CFG.choiceCounts.weapons, tmp.length);
      for(let i=0;i<want;i++){
        const idx=randi(0,tmp.length-1);
        const id=tmp.splice(idx,1)[0];
        picks.push({ kind:"weapon", id, name:this.weaponName(id), desc:`Add the ${this.weaponName(id)} weapon to your loadout.` });
      }
      return picks;
    }

    weaponName(id){
      if(id==="performance") return "Performance";
      if(id==="creator") return "Creator";
      if(id==="advocate") return "Advocate";
      return id;
    }

    buildLevelUpChoices() {
      const globalCount = Math.max(0, Number(BALANCE.UPGRADE_OFFERS?.globalChoices) || 1);
      const weaponCount = Math.max(0, Number(BALANCE.UPGRADE_OFFERS?.weaponChoices) || 1);
      const weaponOffers = weaponCount > 0 ? this.rollWeaponUpgradeChoices(weaponCount) : [];

      for (const c of weaponOffers) {
        if (c?.kind === "modifier_offer") {
          const picks = this.rollModifiers(c.weaponId, CFG.choiceCounts.modifiers).map(m => ({ ...m, weaponId:c.weaponId, advanceTrackOnPick:true }));
          if (picks.length) return picks;
        }
        if (c?.kind === "creator_behavior_offer") {
          const picks = this.rollCreatorBehaviorChoices().map(m => ({ ...m, weaponId:"creator", advanceTrackOnPick:true }));
          if (picks.length) return picks;
        }
        if (c?.kind === "advocate_effect_offer") {
          const picks = this.rollAdvocateEffectChoices().map(m => ({ ...m, weaponId:"advocate", advanceTrackOnPick:true }));
          if (picks.length) return picks;
        }
      }

      const out = [];
      if (globalCount > 0) out.push(...this.rollGlobalUpgrades(globalCount));
      out.push(...weaponOffers);

      const flat = [];
      for (const c of out) {
        if (!c) continue;
        if (c.kind === "advocate_stat_offer" && Array.isArray(c.variants)) {
          for (const v of c.variants) flat.push({ ...c, kind:"advocate_stat_choice", name:v.name, desc:v.desc, flavor:v.flavor, statChoice:v.statChoice });
        } else if (c.kind === "modifier_offer") {
          const picks = this.rollModifiers(c.weaponId, CFG.choiceCounts.modifiers).map(m => ({ ...m, weaponId:c.weaponId, advanceTrackOnPick:true }));
          if (picks.length) flat.push(...picks);
        } else if (c.kind === "creator_behavior_offer") {
          const picks = this.rollCreatorBehaviorChoices().map(m => ({ ...m, weaponId:"creator", advanceTrackOnPick:true }));
          if (picks.length) flat.push(...picks);
        } else if (c.kind === "advocate_effect_offer") {
          const picks = this.rollAdvocateEffectChoices().map(m => ({ ...m, weaponId:"advocate", advanceTrackOnPick:true }));
          if (picks.length) flat.push(...picks);
        } else {
          flat.push(c);
        }
      }
      if (!flat.length) {
        return this.rollUpgrades(Math.max(1, CFG.upgrades.choices)).map(u => ({ ...u, kind:"upgrade" }));
      }
      return flat;
    }

    rollGlobalUpgrades(n) {
      const p = this.player;
      const defs = BALANCE.UPGRADES.defs || {};
      const globalIds = ["payouts", "agility", "tracking"];
      const pool = [];

      for (const key of globalIds) {
        const def = defs[key];
        if (!def) continue;
        const w = (typeof def.weight === "number") ? def.weight : 1.0;
        const copy = this._upgradeCopy_(def, p);
        pool.push({ kind:"upgrade", id:def.id, name:copy.title, desc:copy.desc, flavor:copy.flavor, w });
      }

      const picks = [];
      const tmp = pool.slice();
      for (let i = 0; i < n && tmp.length; i++) {
        let sum = 0;
        for (const it of tmp) sum += it.w;
        let r = Math.random() * sum;
        let idx = 0;
        for (; idx < tmp.length; idx++) { r -= tmp[idx].w; if (r <= 0) break; }
        picks.push(tmp.splice(Math.min(idx, tmp.length - 1), 1)[0]);
      }
      return picks;
    }

    rollWeaponUpgradeChoices(n) {
      const p = this.player;
      const weightsCfg = BALANCE.WEAPON_PROGRESS_WEIGHTS || {};
      const slotW = [numOr(weightsCfg.slot1, 1.0), numOr(weightsCfg.slot2, 1.25), numOr(weightsCfg.slot3, 1.5)];
      const catchupBonus = numOr(weightsCfg.catchupBonus, 1.5);
      const catchupUntil = Math.max(0, Math.floor(numOr(weightsCfg.catchupUntilStep, 3)));
      const candidates = [];

      const owned = Array.isArray(p.weapons) ? p.weapons.filter(w => w && w.kind === "active") : [];
      for (let i = 0; i < owned.length; i++) {
        const weaponId = owned[i].id;
        let choice = null;

        if (weaponId === "creator") {
          const hasStrategy = !!p.creatorBuild?.strategy;
          if (!hasStrategy) {
            choice = {
              kind: "creator_strategy_offer",
              weaponId: "creator",
              id: "creator_strategy_offer",
              name: "Choose Creator Strategy",
              desc: "Choose Macro or Micro for Creator.",
              flavor: "Shape how your content behaves."
            };
          } else {
            const trackCfg = BALANCE.WEAPON_UPGRADE_TRACKS?.creator || {};
            const track = trackCfg.steps || [];
            const repeat = trackCfg.repeat || [];
            const tier = p.weaponUpgradeTiers?.creator || 0;
            let step = track[tier];
            if (!step && repeat.length) {
              const idx = (tier - track.length) % repeat.length;
              step = repeat[(idx + repeat.length) % repeat.length];
            }
            if (step) choice = this._makeCreatorTrackChoice(step, tier);
          }
        } else if (weaponId === "performance") {
          const mods = Array.isArray(p.mods?.performance) ? p.mods.performance : [];
          if (mods.length === 0) {
            choice = {
              kind: "modifier_offer",
              weaponId: "performance",
              id: "performance_modifier_offer",
              name: "Choose Performance Modifier",
              desc: "Pick the first modifier for Performance.",
              flavor: "Start shaping the channel."
            };
          } else {
            const trackCfg = BALANCE.WEAPON_UPGRADE_TRACKS?.performance || {};
            const track = trackCfg.steps || [];
            const repeat = trackCfg.repeat || [];
            const tier = p.weaponUpgradeTiers?.performance || 0;
            let step = track[tier];
            if (!step && repeat.length) {
              const idx = (tier - track.length) % repeat.length;
              step = repeat[(idx + repeat.length) % repeat.length];
            }
            if (step) choice = this._makePerformanceTrackChoice(step, tier);
          }
        } else if (weaponId === "advocate") {
          const hasShape = !!p.advocateBuild?.shape;
          if (!hasShape) {
            choice = {
              kind: "advocate_shape_offer",
              weaponId: "advocate",
              id: "advocate_shape_offer",
              name: "Choose Advocate Modifier",
              label: "Modifier",
              desc: "Choose Referral Engine or Partner Discovery.",
              flavor: "Set the orbit style."
            };
          } else {
            const trackCfg = BALANCE.WEAPON_UPGRADE_TRACKS?.advocate || {};
            const track = trackCfg.steps || [];
            const repeat = trackCfg.repeat || [];
            const tier = p.weaponUpgradeTiers?.advocate || 0;
            let step = track[tier];
            if (!step && repeat.length) {
              const idx = (tier - track.length) % repeat.length;
              step = repeat[(idx + repeat.length) % repeat.length];
            }
            if (step) choice = this._makeAdvocateTrackChoice(step, tier);
          }
        }

        if (choice) {
          let w = slotW[i] ?? 1.0;
          const tier = p.weaponUpgradeTiers?.[weaponId] || 0;
          if (tier < catchupUntil) w *= catchupBonus;
          choice.w = w;
          candidates.push(choice);
        }
      }

      const picks = [];
      const tmp = candidates.slice();
      for (let i = 0; i < n && tmp.length; i++) {
        let sum = 0;
        for (const it of tmp) sum += (it.w || 1);
        let r = Math.random() * Math.max(0.0001, sum);
        let idx = 0;
        for (; idx < tmp.length; idx++) { r -= (tmp[idx].w || 1); if (r <= 0) break; }
        picks.push(tmp.splice(Math.min(idx, tmp.length - 1), 1)[0]);
      }

      if (!picks.length) {
        const defs = BALANCE.UPGRADES.defs || {};
        const legacyIds = ["automate", "reach", "recruit"];
        const pool = [];
        for (const key of legacyIds) {
          const def = defs[key];
          if (!def) continue;
          const w = (typeof def.weight === "number") ? def.weight : 1.0;
          const copy = this._upgradeCopy_(def, p);
          pool.push({ kind:"upgrade", id:def.id, name:copy.title, desc:copy.desc, flavor:copy.flavor, w });
        }
        const tmp2 = pool.slice();
        for (let i = 0; i < n && tmp2.length; i++) {
          let sum = 0;
          for (const it of tmp2) sum += it.w;
          let r = Math.random() * Math.max(0.0001, sum);
          let idx = 0;
          for (; idx < tmp2.length; idx++) { r -= tmp2[idx].w; if (r <= 0) break; }
          picks.push(tmp2.splice(Math.min(idx, tmp2.length - 1), 1)[0]);
        }
      }

      return picks.slice(0, n);
    }

    _makePerformanceTrackChoice(step, tier) {
      const mods = Array.isArray(this.player?.mods?.performance) ? this.player.mods.performance : [];
      if (step.kind === "modifier2") {
        return {
          kind: "modifier_offer",
          weaponId: "performance",
          id: `performance_modifier2_offer_${tier + 1}`,
          name: step.title || "Choose Performance Modifier",
          desc: step.desc || "Choose a second modifier for Performance.",
          flavor: step.flavor || "Add a new angle to the campaign.",
          advanceTrackOnPick: true,
        };
      }
      let desc = step.desc || "";
      if (step.kind === "modifier" && step.descByModifier) {
        const active = mods[mods.length - 1] || mods[0] || "perf_shotgun";
        desc = step.descByModifier[active] || Object.values(step.descByModifier)[0] || desc;
      }
      return {
        kind: "weapon_upgrade",
        weaponId: "performance",
        tierIndex: tier,
        step,
        id: `weapon_upgrade_performance_${tier + 1}`,
        name: step.title || BALANCE.WEAPON_UPGRADE_TRACKS?.performance?.title || "Upgrade Performance",
        desc,
        flavor: step.flavor || "",
      };
    }

    _makeCreatorTrackChoice(step, tier) {
      const behavior = this.player?.creatorBuild?.behavior || null;
      if (step.kind === "modifier2") {
        return {
          kind: "creator_behavior_offer",
          weaponId: "creator",
          id: `creator_behavior_offer_${tier + 1}`,
          name: step.title || "Choose Creator Behavior",
          desc: step.desc || "Choose Viral, Loyal, or Spicy for Creator.",
          flavor: step.flavor || "Now decide how it spreads.",
        };
      }
      let desc = step.desc || "";
      if (step.kind === "modifier" && step.descByBehavior) {
        desc = step.descByBehavior[behavior] || Object.values(step.descByBehavior)[0] || desc;
      }
      return {
        kind: "weapon_upgrade",
        weaponId: "creator",
        tierIndex: tier,
        step,
        id: `weapon_upgrade_creator_${tier + 1}`,
        name: step.title || BALANCE.WEAPON_UPGRADE_TRACKS?.creator?.title || "Upgrade Creator",
        desc,
        flavor: step.flavor || "",
      };
    }


    _makeAdvocateTrackChoice(step, tier) {
      const effect = this.player?.advocateBuild?.effect || null;
      if (step.kind === "modifier2") {
        return {
          kind: "advocate_effect_offer",
          weaponId: "advocate",
          id: `advocate_effect_offer_${tier + 1}`,
          name: step.title || "Choose Advocate Enhancement",
          label: "Enhancement",
          desc: step.desc || "Choose Cool Rewards, Fuel Tank, or Referral Surge.",
          flavor: step.flavor || "Decide what your advocates leave behind.",
        };
      }
      if (step.kind === "choice_stat") {
        const up = CFG.advocateMods?.upgrades || {};
        return {
          kind: "advocate_stat_offer",
          weaponId: "advocate",
          tierIndex: tier,
          step,
          id: `advocate_stat_offer_${tier + 1}`,
          name: step.title || "Upgrade Advocate",
          desc: step.desc || "Choose Range or Speed for Advocate.",
          flavor: step.flavor || "",
          variants: [
            { statChoice: "range", name: up.rangeName || "Expand Audience", desc: "Increase orbit reach.", flavor: "Expand your audience." },
            { statChoice: "speed", name: up.speedName || "Optimize Engagement", desc: "Increase orbit speed.", flavor: "Keep advocates moving." },
          ],
        };
      }
      let desc = step.desc || "";
      if (step.kind === "modifier" && step.descByBehavior) {
        desc = step.descByBehavior[effect] || Object.values(step.descByBehavior)[0] || desc;
      }
      if (step.kind === "special" && step.effect === "+orbitals") {
        const up = CFG.advocateMods?.upgrades || {};
        desc = step.desc || ((up.orbitalsName || "Recruit Advocates") + " into the orbit.");
        return {
          kind: "weapon_upgrade",
          weaponId: "advocate",
          tierIndex: tier,
          step,
          id: `weapon_upgrade_advocate_${tier + 1}`,
          name: up.orbitalsName || "Recruit Advocates",
          desc,
          flavor: step.flavor || "",
        };
      }
      return {
        kind: "weapon_upgrade",
        weaponId: "advocate",
        tierIndex: tier,
        step,
        id: `weapon_upgrade_advocate_${tier + 1}`,
        name: step.title || BALANCE.WEAPON_UPGRADE_TRACKS?.advocate?.title || "Upgrade Advocate",
        desc,
        flavor: step.flavor || "",
      };
    }

    applyWeaponUpgrade(choice) {
      const p = this.player;
      if (!p) return;
      const weaponId = choice.weaponId;
      const step = choice.step || {};
      if (!p.weaponUpgradeTiers) p.weaponUpgradeTiers = { performance: 0, creator: 0, advocate: 0 };

      if (weaponId === "performance") {
        if (step.kind === "stat") {
          if (step.stat === "perfFire") p.stats.perfFire *= Number(step.mult) || 1;
          else if (step.stat === "perfRange") p.stats.perfRange *= Number(step.mult) || 1;
        } else if (step.kind === "special" && step.effect === "+1_projectile") {
          p.stats.recruit += 1;
        } else if (step.kind === "modifier") {
          const mods = Array.isArray(p.mods?.performance) ? p.mods.performance : [];
          const active = mods[mods.length - 1] || mods[0] || "perf_shotgun";
          CFG.performanceMods = CFG.performanceMods || {};
          if (active === "perf_shotgun") {
            CFG.performanceMods.perf_shotgun = CFG.performanceMods.perf_shotgun || {};
            CFG.performanceMods.perf_shotgun.pellets = (CFG.performanceMods.perf_shotgun.pellets || 5) + 1;
          } else if (active === "perf_pierce") {
            CFG.performanceMods.perf_pierce = CFG.performanceMods.perf_pierce || {};
            CFG.performanceMods.perf_pierce.pierceCount = (CFG.performanceMods.perf_pierce.pierceCount || 1) + 1;
          } else if (active === "perf_ricochet") {
            CFG.performanceMods.perf_ricochet = CFG.performanceMods.perf_ricochet || {};
            CFG.performanceMods.perf_ricochet.bounceCount = (CFG.performanceMods.perf_ricochet.bounceCount || 1) + 1;
          } else if (active === "perf_burst") {
            CFG.performanceMods.perf_burst = CFG.performanceMods.perf_burst || {};
            CFG.performanceMods.perf_burst.shots = (CFG.performanceMods.perf_burst.shots || 3) + 1;
          }
        }
        p.weaponUpgradeTiers.performance = (p.weaponUpgradeTiers.performance || 0) + 1;
      } else if (weaponId === "creator") {
        if (!p.creatorTrackBonuses) {
          p.creatorTrackBonuses = { viralChainChanceMult:1.0, viralPotentialChildrenBonus:0, loyalPulseIntervalMult:1.0, spicyBurnDpsMult:1.0 };
        }
        if (step.kind === "stat") {
          if (step.stat === "creatorCooldown") {
            p.stats.creatorFreq *= Number(step.mult) || 1;
            p.stats.creatorPulseFreq *= Number(step.pulseMult) || 1;
          } else if (step.stat === "creatorRadius") {
            p.stats.creatorRadius *= Number(step.mult) || 1;
          }
        } else if (step.kind === "modifier") {
          const behaviorId = p.creatorBuild?.behavior || "creator_viral";
          if (behaviorId === "creator_viral") {
            p.creatorTrackBonuses.viralChainChanceMult *= 1.22;
            p.creatorTrackBonuses.viralPotentialChildrenBonus += 1;
          } else if (behaviorId === "creator_loyal") {
            p.creatorTrackBonuses.loyalPulseIntervalMult *= 0.84;
          } else if (behaviorId === "creator_spicy") {
            p.creatorTrackBonuses.spicyBurnDpsMult *= 1.35;
          }
        }
        p.weaponUpgradeTiers.creator = (p.weaponUpgradeTiers.creator || 0) + 1;
      } else if (weaponId === "advocate") {
        const shapeId = p.advocateBuild?.shape || "referral_engine";
        const effectId = p.advocateBuild?.effect || null;
        const shapeCfg = CFG.advocateMods?.shapes?.[shapeId] || {};
        if (choice.kind === "advocate_stat_choice" || step.kind === "choice_stat") {
          const statChoice = choice.statChoice || "range";
          if (statChoice === "range") {
            if (shapeId === "partner_discovery") {
              p.stats.advocateSize *= Number(shapeCfg.rangeUpgradeMult) || 1.10;
            } else {
              p.stats.advocateOrbitR *= Number(shapeCfg.rangeUpgradeMult) || 1.10;
            }
            p.stats.advocateRangeLevel = (p.stats.advocateRangeLevel || 0) + 1;
          } else {
            p.stats.advocateSpin *= Number(shapeCfg.speedUpgradeMult) || 1.12;
            p.stats.advocateSpeedLevel = (p.stats.advocateSpeedLevel || 0) + 1;
          }
        } else if (step.kind === "special" && step.effect === "+orbitals") {
          const add = Number(shapeCfg.orbitalUpgradeAmount) || 1;
          const maxO = Number(shapeCfg.maxOrbitals) || 8;
          p.stats.advocateOrbitals = clamp((p.stats.advocateOrbitals || 1) + add, 1, maxO);
          this.rebuildOrbitals();
        } else if (step.kind === "modifier") {
          p.advocateTrackBonuses = p.advocateTrackBonuses || { icePower:1, firePower:1, electricPower:1 };
          if (effectId === "cool_rewards") p.advocateTrackBonuses.icePower *= 1.25;
          else if (effectId === "fuel_tank") p.advocateTrackBonuses.firePower *= 1.35;
          else if (effectId === "referral_surge") p.advocateTrackBonuses.electricPower *= 1.25;
        }
        p.weaponUpgradeTiers.advocate = (p.weaponUpgradeTiers.advocate || 0) + 1;
      }

      this.state = State.PLAY;
      this.processPendingLevelRewards();
    }

    rollUpgrades(n) {

      const p = this.player;

      const defs = BALANCE.UPGRADES.defs;
      const pool = [];

      for (const key of Object.keys(defs)) {
        const def = defs[key];
        const w = (typeof def.weight === "number") ? def.weight : 1.0;
        const copy = this._upgradeCopy_(def, p);
        pool.push({ id: def.id, name: copy.title, desc: copy.desc, flavor: copy.flavor, w });
      }

      // Weighted pick without replacement
      const picks = [];
      const tmp = pool.slice();
      for (let i = 0; i < n && tmp.length; i++) {
        let sum = 0;
        for (const it of tmp) sum += it.w;
        let r = Math.random() * sum;
        let idx = 0;
        for (; idx < tmp.length; idx++) { r -= tmp[idx].w; if (r <= 0) break; }
        picks.push(tmp.splice(Math.min(idx, tmp.length - 1), 1)[0]);
      }
      return picks;
    }

    _upgradeCopy_(def, player) {
      // Title
      const title = def.title || def.name || def.id;

      // Description
      let desc = def.desc || "";
      if (!desc && def.descByWeapon) desc = this._weaponizedDesc_(def.descByWeapon, player);
      if (typeof def.desc === "function") desc = def.desc(player) || "";

      // Flavor
      const flavor = def.flavor || "";

      return { title, desc, flavor };
    }

    _weaponizedDesc_(descByWeapon, player) {
      // Optional helper: build a sentence from per-weapon lines the player has enabled.
      // This keeps per-weapon copy in BALANCE.UPGRADES.defs without changing any logic.
      const have = new Set(player.weapons.map(w => w.id));
      const parts = [];
      if (have.has("performance") && descByWeapon.performance) parts.push(descByWeapon.performance);
      if (have.has("creator") && descByWeapon.creator) parts.push(descByWeapon.creator);
      if (have.has("advocate") && descByWeapon.advocate) parts.push(descByWeapon.advocate);
      return parts.join(" ");
    }

    describeAutomate(hasPerf,hasCreator,hasAdv){
      const parts=[];
      if(hasPerf) parts.push("Performance: faster firing + faster bolts.");
      if(hasCreator) parts.push("Creator: fields appear more often.");
      if(hasAdv) parts.push("Advocate: orbitals spin faster.");
      return parts.join(" ");
    }
    describeReach(hasPerf,hasCreator,hasAdv){
      const parts=[];
      if(hasPerf) parts.push("Performance: shots travel farther.");
      if(hasCreator) parts.push("Creator: larger sparkle fields.");
      if(hasAdv) parts.push("Advocate: bigger star + wider orbit.");
      return parts.join(" ");
    }
    describeRecruit(hasPerf,hasCreator,hasAdv){
      const parts=[];
      if(hasPerf) parts.push("Performance: +1 projectile (sequential).");
      if(hasAdv) parts.push("Advocate: +1 orbital (even spacing).");
      if(hasCreator) parts.push("Creator: +1 extra field per cast.");
      return parts.join(" ");
    }

    applyUpgrade(id) {
      const p=this.player;
      if(!p) return;

      if(id==="payouts"){
        p.stats.dmgMult *= numOr(CFG.upgrades.mult.payouts_dmgMult, 1.0);
        for(const o of this.orbitals) o.dmg = CFG.weapons.advocate.dmg * p.stats.dmgMult;
      }
      else if(id==="automate"){
        if(p.weapons.some(w=>w.id==="performance")){
          p.stats.perfFire *= numOr(CFG.upgrades.mult.automate.perfFire, 1.0);
          p.stats.perfShotSpeed *= numOr(CFG.upgrades.mult.automate.perfShotSpeed, 1.0);
        }
        if(p.weapons.some(w=>w.id==="creator")){
          const m = numOr(CFG.upgrades.mult.automate.creatorFreq, 1.0);
          p.stats.creatorFreq *= m;
          p.stats.creatorPulseFreq *= m;
        }
        if(p.weapons.some(w=>w.id==="advocate")){
          p.stats.advocateSpin *= numOr(CFG.upgrades.mult.automate.advocateSpin, 1.0);
        }
      }
      else if(id==="reach"){
        if(p.weapons.some(w=>w.id==="performance")){
          p.stats.perfRange *= numOr(CFG.upgrades.mult.reach.perfRange, 1.0);
        }
        if(p.weapons.some(w=>w.id==="creator")){
          p.stats.creatorRadius *= numOr(CFG.upgrades.mult.reach.creatorRadius, 1.0);
        }
        if(p.weapons.some(w=>w.id==="advocate")){
          p.stats.advocateSize *= numOr(CFG.upgrades.mult.reach.advocateSize, 1.0);
          p.stats.advocateOrbitR *= numOr(CFG.upgrades.mult.reach.advocateOrbitR, 1.0);
        }
      }
      else if(id==="agility"){
        p.stats.speed *= numOr(CFG.upgrades.mult.agility_speed, 1.0);
      }
      else if(id==="tracking"){
        p.stats.tracking *= numOr(CFG.upgrades.mult.tracking_radius, 1.0);
      }
      else if(id==="recruit"){
        p.stats.recruit += 1;
        this.rebuildOrbitals();
      }

      this.state=State.PLAY;
      this.processPendingLevelRewards();
    }

    applyChestChoice(choice) {
      if (choice.kind === "weapon") {
        this.giveWeapon(choice.id);
      } else {
        this.applyUpgrade(choice.id);
        return;
      }
      this.state = State.PLAY;
    }

    spawnOffscreenBanner() {
      const pad=CFG.world.spawnPad;
      const halfW=CFG.logicalW/2, halfH=CFG.logicalH/2;
      const side=randi(0,3);
      let sx,sy;
      if(side===0){ sx=rand(-halfW-pad, halfW+pad); sy=-halfH-pad; }
      else if(side===1){ sx=halfW+pad; sy=rand(-halfH-pad, halfH+pad); }
      else if(side===2){ sx=rand(-halfW-pad, halfW+pad); sy=halfH+pad; }
      else { sx=-halfW-pad; sy=rand(-halfH-pad, halfH+pad); }
      const w=this.cam.s2w(sx+halfW, sy+halfH);

      const isMini = Math.random() < CFG.enemies.banner.miniChance;
      this.enemies.push(new BannerEnemy(w.x,w.y,isMini));
    }

    spawnBoss() {
      try {
        if (this.bossActive || !this.player) return false;
        const halfW=CFG.logicalW/2, halfH=CFG.logicalH/2;
        const a=rand(0,Math.PI*2);
        const sx=Math.cos(a)*(halfW+60);
        const sy=Math.sin(a)*(halfH+60);
        const w=this.cam.s2w(sx+halfW, sy+halfH);
        this.enemies.push(new BossEnemy(w.x,w.y));
        this.bossActive=true;
        this.music.onBossStart();
        return true;
      } catch (err) {
        console.error("Boss spawn failed", err);
        this.bossActive = false;
        return false;
      }
    }

    nearestEnemyWithin(range){
      const p=this.player;
      const r2 = range*range;
      let best=null, bd=1e18;
      for(const e of this.enemies){
        if(e.dead) continue;
        const d=dist2(p.x,p.y,e.x,e.y);
        if(d<bd && d<=r2){ bd=d; best=e; }
      }
      return best;
    }

    findRicochetTarget(fromEnemy, excludeSet, maxDist){
      const r2 = maxDist * maxDist;
      let best = null, bd = 1e18;
      for(const e of this.enemies){
        if(e.dead || e === fromEnemy) continue;
        if(excludeSet && excludeSet.has(e)) continue;
        const d = dist2(fromEnemy.x, fromEnemy.y, e.x, e.y);
        if(d < bd && d <= r2){ bd = d; best = e; }
      }
      return best;
    }

    getWeaponModifierIds(weaponId){
      const arr = this.player?.mods?.[weaponId];
      return Array.isArray(arr) ? arr.slice() : [];
    }

    getPerformanceComboKey(){
      const mods = this.getWeaponModifierIds("performance");
      if (mods.length < 2) return null;
      return mods.slice(0,2).sort().join("__");
    }

    getPerformanceModifierContext(){
      const mods = this.getWeaponModifierIds("performance");
      const singleId = mods.length === 1 ? mods[0] : null;
      const comboKey = mods.length >= 2 ? mods.slice(0,2).sort().join("__") : null;
      const single = singleId ? (CFG.performanceMods?.[singleId] || null) : null;
      const combo = comboKey ? (CFG.performanceCombos?.[comboKey] || null) : null;
      return { mods, singleId, comboKey, single, combo };
    }

    queueBullet(x, y, vx, vy, dmg, life, delay=0, opts={}){
      this._delayedShots.push({
        at: this.time + delay,
        x, y, vx, vy, dmg, life, opts
      });
    }

    firePerformanceWeaponVariant(target, shotDelayBase){
      const p = this.player;
      const base = CFG.weapons.performance;
      const ctx = this.getPerformanceModifierContext();
      const singleId = ctx.singleId;
      const comboKey = ctx.comboKey;
      const perfMod = ctx.single || {};
      const combo = ctx.combo || null;

      const dx = target.x - p.x, dy = target.y - p.y;
      const d = Math.hypot(dx,dy) || 1;
      const baseAngle = Math.atan2(dy, dx);
      const baseSpeed = base.speed * p.stats.perfShotSpeed;
      const recruitShots = 1 + p.stats.recruit;

      const queueSingle = (delay, ang, dmgMult=1, lifeMult=1, opts={}) => {
        const perfScale = 1 + Math.max(0, p.stats.dmgMult - 1) * 0.9;
        this.queueBullet(
          p.x, p.y,
          Math.cos(ang) * baseSpeed,
          Math.sin(ang) * baseSpeed,
          base.dmg * p.stats.dmgMult * dmgMult,
          base.life * p.stats.perfRange * lifeMult,
          delay,
          {
            color: "#2f6fff",
            glow: "rgba(47,111,255,0.26)",
            renderScale: perfScale,
            trailScale: 0.95 + Math.max(0, p.stats.dmgMult - 1) * 0.65,
            ...opts
          }
        );
      };

      // ----- Two-mod combo behaviors -----
      if (comboKey === "perf_pierce__perf_shotgun") {
        const pellets = combo.pellets || 4;
        const spreadRad = (combo.spreadDeg || 28) * Math.PI / 180;
        const lifeMult = combo.rangeMult || 0.82;
        const dmgMult = combo.damageMult || 0.62;
        const pierceCount = combo.pierceCount || 2;
        for(let volley=0; volley<recruitShots; volley++){
          const delay = volley * base.recruitShotDelaySec;
          for(let i=0; i<pellets; i++){
            const t = (pellets === 1) ? 0.5 : (i / (pellets - 1));
            const ang = baseAngle - spreadRad/2 + spreadRad * t;
            queueSingle(delay, ang, dmgMult, lifeMult, { pierce: pierceCount });
          }
        }
        return;
      }

      if (comboKey === "perf_burst__perf_shotgun") {
        const bursts = combo.bursts || 2;
        const pellets = (combo.pellets || 4) + (p.stats.perfModifierBoost|0);
        const spreadRad = (combo.spreadDeg || 32) * Math.PI / 180;
        const burstDelay = combo.burstDelaySec || 0.06;
        const dmgMult = combo.damageMult || 0.42;
        const lifeMult = combo.rangeMult || 0.80;
        for(let volley=0; volley<recruitShots; volley++){
          const volleyBase = volley * base.recruitShotDelaySec;
          for(let bIdx=0; bIdx<bursts; bIdx++){
            const delay = volleyBase + bIdx * burstDelay;
            for(let i=0; i<pellets; i++){
              const t = (pellets === 1) ? 0.5 : (i / (pellets - 1));
              const ang = baseAngle - spreadRad/2 + spreadRad * t;
              queueSingle(delay, ang, dmgMult, lifeMult);
            }
          }
        }
        return;
      }

      if (comboKey === "perf_ricochet__perf_shotgun") {
        const pellets = (combo.pellets || 4) + (p.stats.perfModifierBoost|0);
        const spreadRad = (combo.spreadDeg || 38) * Math.PI / 180;
        const dmgMult = combo.damageMult || 0.36;
        const lifeMult = combo.rangeMult || 0.78;
        const ricochetCount = combo.ricochetCount || 1;
        const searchRadius = combo.searchRadius || 80;
        const ricochetDamageMult = combo.ricochetDamageMult || 0.9;
        for(let volley=0; volley<recruitShots; volley++){
          const delay = volley * base.recruitShotDelaySec;
          for(let i=0; i<pellets; i++){
            const t = (pellets === 1) ? 0.5 : (i / (pellets - 1));
            const ang = baseAngle - spreadRad/2 + spreadRad * t;
            queueSingle(delay, ang, dmgMult, lifeMult, {
              ricochet: ricochetCount,
              ricochetSearchRadius: searchRadius,
              ricochetDamageMult
            });
          }
        }
        return;
      }

      if (comboKey === "perf_burst__perf_pierce") {
        const shots = (combo.burstShots || 3) + (p.stats.perfModifierBoost|0);
        const burstDelay = combo.burstDelaySec || 0.05;
        const dmgMult = combo.damageMult || 0.88;
        const pierceCount = combo.pierceCount || 2;
        for(let volley=0; volley<recruitShots; volley++){
          const volleyBaseDelay = volley * (shots * burstDelay + base.recruitShotDelaySec);
          for(let s=0; s<shots; s++){
            queueSingle(volleyBaseDelay + s*burstDelay, baseAngle, dmgMult, 1, { pierce: pierceCount });
          }
        }
        return;
      }

      if (comboKey === "perf_pierce__perf_ricochet") {
        const dmgMult = combo.directDamageMult || 0.85;
        const pierceCount = (combo.pierceCount || 2) + (p.stats.perfModifierBoost|0);
        const ricochetCount = (combo.ricochetCount || 1) + (p.stats.perfModifierBoost|0);
        const searchRadius = combo.searchRadius || 90;
        const ricochetDamageMult = combo.ricochetDamageMult || 0.92;
        for(let volley=0; volley<recruitShots; volley++){
          const delay = volley * base.recruitShotDelaySec;
          queueSingle(delay, baseAngle, dmgMult, 1, {
            pierce: pierceCount,
            ricochet: ricochetCount,
            ricochetSearchRadius: searchRadius,
            ricochetDamageMult,
            splitOnFirstHit: true,
          });
        }
        return;
      }

      if (comboKey === "perf_burst__perf_ricochet") {
        const shots = (combo.burstShots || 3) + (p.stats.perfModifierBoost|0);
        const burstDelay = combo.burstDelaySec || 0.05;
        const dmgMult = combo.damageMult || 0.68;
        const ricochetCount = combo.ricochetCount || 1;
        const searchRadius = combo.searchRadius || 85;
        const ricochetDamageMult = combo.ricochetDamageMult || 0.95;
        for(let volley=0; volley<recruitShots; volley++){
          const volleyBaseDelay = volley * (shots * burstDelay + base.recruitShotDelaySec);
          for(let s=0; s<shots; s++){
            queueSingle(volleyBaseDelay + s*burstDelay, baseAngle, dmgMult, 1, {
              ricochet: ricochetCount,
              ricochetSearchRadius: searchRadius,
              ricochetDamageMult,
            });
          }
        }
        return;
      }

      // ----- Single-mod behaviors -----
      if(singleId === "perf_shotgun"){
        const pellets = perfMod.pellets || 5;
        const spreadDeg = perfMod.spreadDeg || 36;
        const spreadRad = spreadDeg * Math.PI / 180;
        const lifeMult = (perfMod.rangeMult || 0.78);
        const dmgMult = (perfMod.damageMult || 0.38);
        for(let volley=0; volley<recruitShots; volley++){
          const delay = volley * base.recruitShotDelaySec;
          for(let i=0; i<pellets; i++){
            const t = (pellets === 1) ? 0.5 : (i / (pellets - 1));
            const ang = baseAngle - spreadRad/2 + spreadRad * t;
            queueSingle(delay, ang, dmgMult, lifeMult);
          }
        }
        return;
      }

      if(singleId === "perf_pierce"){
        const pierceCount = perfMod.pierceCount || 2;
        const dmgMult = perfMod.damageMult || 1.0;
        for(let volley=0; volley<recruitShots; volley++){
          const delay = volley * base.recruitShotDelaySec;
          queueSingle(delay, baseAngle, dmgMult, 1, { pierce: pierceCount });
        }
        return;
      }

      if(singleId === "perf_burst"){
        const shots = perfMod.shots || 3;
        const burstDelay = perfMod.burstDelaySec || 0.05;
        const dmgMult = perfMod.damageMult || 0.72;
        for(let volley=0; volley<recruitShots; volley++){
          const volleyBaseDelay = volley * (shots * burstDelay + base.recruitShotDelaySec);
          for(let s=0; s<shots; s++){
            queueSingle(volleyBaseDelay + s*burstDelay, baseAngle, dmgMult, 1);
          }
        }
        return;
      }

      if(singleId === "perf_ricochet"){
        const ricochet = perfMod.bounceCount || 1;
        const dmgMult = perfMod.damageMult || 0.95;
        const searchRadius = perfMod.searchRadius || 110;
        const ricochetDamageMult = perfMod.ricochetDamageMult || dmgMult;
        for(let volley=0; volley<recruitShots; volley++){
          const delay = volley * base.recruitShotDelaySec;
          queueSingle(delay, baseAngle, dmgMult, 1, {
            ricochet,
            ricochetSearchRadius: searchRadius,
            ricochetDamageMult,
          });
        }
        return;
      }

      // ----- Base behavior -----
      for(let volley=0; volley<recruitShots; volley++){
        const delay = volley * base.recruitShotDelaySec;
        queueSingle(delay, baseAngle, 1, 1);
      }
    }

    getCreatorStrategyDef() {
      const strategyId = this.player?.creatorBuild?.strategy || null;
      const defs = CFG.creatorMods?.strategies || {};
      if (!strategyId) return null;
      return Object.values(defs).find(d => d.id === strategyId) || null;
    }

    getCreatorBehaviorDef() {
      const behaviorId = this.player?.creatorBuild?.behavior || null;
      const defs = CFG.creatorMods?.behaviors || {};
      if (!behaviorId) return null;
      return Object.values(defs).find(d => d.id === behaviorId) || null;
    }

    getCreatorSpawnProfile() {
      const base = CFG.creatorMods?.base || {};
      const strategy = this.getCreatorStrategyDef() || {};
      const behavior = this.getCreatorBehaviorDef() || null;
      const strategyKey = strategy.id === "creator_micro" ? "micro" : "macro";
      const p = this.player || {};
      const bonuses = p.creatorTrackBonuses || { viralChainChanceMult:1.0, viralPotentialChildrenBonus:0, loyalPulseIntervalMult:1.0, spicyBurnDpsMult:1.0 };

      const profile = {
        mode: "fields",
        fieldsPerCast: (strategy.fieldsPerCast ?? base.fieldsPerCast ?? 1),
        radiusMult: (strategy.radiusMult ?? base.radiusMult ?? 1),
        lifeMult: (strategy.lifeMult ?? base.lifeMult ?? 1),
        dmgMult: (strategy.dmgMult ?? base.dmgMult ?? 1),
        cooldownMult: (strategy.cooldownMult ?? base.cooldownMult ?? 1),
        nearEnemyRadius: (strategy.nearEnemyRadius ?? base.nearEnemyRadius ?? 28),
        nearPlayerRadius: (strategy.nearPlayerRadius ?? base.nearPlayerRadius ?? 72),
        pulseInterval: numOr(base.pulseInterval, 1.0) * numOr(strategy.pulseIntervalMult, 1.0),
        pulseFlashSec: numOr(base.pulseFlashSec, 0.18),

        overlapBonusPerExtra: numOr(CFG.creatorMods?.overlapBonusPerExtra, 0.50),

        burnDps: 0,
        burnSec: 0,

        moveTowardPlayerSpeed: 0,

        viralEmitInterval: 0,
        viralEmitCount: 0,
        viralChildRadiusMult: 0.8,
        viralChildLifeMult: 0.8,
        viralChildDmgMult: 0.8,
        viralChildChainChance: 0,
        viralChildMaxDepth: 1,
        viralPotentialChildren: 0,
        viralMaxChildrenPerField: 0,
        viralAbsoluteFieldCap: 0,
        viralChildDistanceMult: 1.0,
        viralRippleAngleJitter: 0,
        viralRippleDriftSpeed: 0,
        viralLinkLife: 0.15,
        viralChildSeekEnemySpeed: 0,
        viralChildSeekEnemyRadius: 120,
        viralOnKill: false,
      };

      if (!behavior) return profile;

      const cfg = behavior[strategyKey] || {};
      profile.pulseInterval *= numOr(cfg.pulseIntervalMult, 1.0);

      if (behavior.id === "creator_viral") {
        profile.viralOnKill = true;
        profile.viralChildRadiusMult = numOr(cfg.childRadiusMult, profile.viralChildRadiusMult);
        profile.viralChildLifeMult = numOr(cfg.childLifeMult, profile.viralChildLifeMult);
        profile.viralChildDmgMult = numOr(cfg.childDmgMult, profile.viralChildDmgMult);
        profile.viralChildChainChance = numOr(cfg.childChainChance, profile.viralChildChainChance) * numOr(bonuses.viralChainChanceMult, 1.0);
        profile.viralChildMaxDepth = Math.max(1, numOr(cfg.childMaxDepth, profile.viralChildMaxDepth));
        profile.viralPotentialChildren = Math.max(0, numOr(cfg.potentialChildren, profile.viralPotentialChildren) + Math.max(0, numOr(bonuses.viralPotentialChildrenBonus, 0)));
        profile.viralMaxChildrenPerField = Math.max(0, numOr(cfg.maxChildrenPerField, profile.viralMaxChildrenPerField));
        profile.viralAbsoluteFieldCap = Math.max(0, numOr(cfg.absoluteFieldCap, profile.viralAbsoluteFieldCap));
        profile.viralChildDistanceMult = numOr(cfg.childDistanceMult, profile.viralChildDistanceMult);
        profile.viralRippleAngleJitter = numOr(cfg.rippleAngleJitter, profile.viralRippleAngleJitter);
        profile.viralRippleDriftSpeed = numOr(cfg.rippleDriftSpeed, profile.viralRippleDriftSpeed);
        profile.viralLinkLife = numOr(cfg.linkLife, profile.viralLinkLife);
        profile.viralChildSeekEnemySpeed = numOr(cfg.childSeekEnemySpeed, profile.viralChildSeekEnemySpeed);
        profile.viralChildSeekEnemyRadius = numOr(cfg.childSeekEnemyRadius, profile.viralChildSeekEnemyRadius);
        profile.viralEmitInterval = 0;
        profile.viralEmitCount = 0;
        profile.viralOnKillSpawnCount = Math.max(1, strategyKey === "macro" ? numOr(cfg.rippleCount, 2) : 1);
      } else if (behavior.id === "creator_loyal") {
        profile.pulseInterval *= numOr(bonuses.loyalPulseIntervalMult, 1.0);
        if (strategyKey === "macro" && cfg.mode === "aura") {
          profile.mode = "aura";
          profile.fieldsPerCast = 1;
          profile.radiusMult *= numOr(cfg.auraRadiusMult, 1.0);
          profile.dmgMult *= numOr(cfg.auraDmgMult, 1.0);
          profile.lifeMult = 999;
          profile.cooldownMult = 1.0;
        } else {
          profile.moveTowardPlayerSpeed = numOr(cfg.moveTowardPlayerSpeed, 72);
          profile.lifeMult *= numOr(cfg.lifeMult, 1.0);
          profile.radiusMult *= numOr(cfg.radiusMult, 1.0);
        }
      } else if (behavior.id === "creator_spicy") {
        profile.burnDps = numOr(cfg.burnDps, 0) * numOr(bonuses.spicyBurnDpsMult, 1.0);
        profile.burnSec = numOr(cfg.burnSec, 0);
      }

      return profile;
    }

    countCreatorFields() {
      let n = 0;
      for (const f of this.fields) if (f && f.kind === "creator" && f.life > 0) n++;
      return n;
    }

    addFieldBurst(x, y, color="viral") {
      this.fieldBursts.push({ x, y, color, life: color === "viral" ? 0.42 : 0.26, maxLife: color === "viral" ? 0.42 : 0.26 });
    }

    getRandomLiveEnemy() {
      const live = this.enemies.filter(e => e && !e.dead);
      if (!live.length) return null;
      return live[randi(0, live.length - 1)];
    }

    getNearestLiveEnemyNear(x, y, maxDist=120) {
      const maxD2 = maxDist * maxDist;
      let best = null;
      let bestD2 = maxD2;
      for (const e of this.enemies) {
        if (!e || e.dead) continue;
        const d2 = dist2(x, y, e.x, e.y);
        if (d2 <= bestD2) {
          bestD2 = d2;
          best = e;
        }
      }
      return best;
    }

    rollCreatorSpawnPoint(profile) {
      const p = this.player;
      const weights = CFG.creatorMods?.spawnWeights || { nearEnemy:0.5, nearPlayer:0.3, random:0.2 };
      const nearEnemyW = numOr(weights.nearEnemy, 0.5);
      const nearPlayerW = numOr(weights.nearPlayer, 0.3);
      const randomW = numOr(weights.random, 0.2);
      let r = Math.random() * Math.max(0.0001, nearEnemyW + nearPlayerW + randomW);

      if (r < nearEnemyW) {
        const target = this.getRandomLiveEnemy();
        if (target) {
          const a = rand(0, Math.PI * 2);
          const d = rand(0, profile.nearEnemyRadius);
          return { x: target.x + Math.cos(a) * d, y: target.y + Math.sin(a) * d };
        }
      }
      r -= nearEnemyW;

      if (r < nearPlayerW) {
        const a = rand(0, Math.PI * 2);
        const d = rand(0, profile.nearPlayerRadius);
        return { x: p.x + Math.cos(a) * d, y: p.y + Math.sin(a) * d };
      }

      return this.cam.s2w(rand(0, CFG.logicalW), rand(0, CFG.logicalH));
    }

    makeCreatorFieldOptions(profile, extra={}) {
      return {
        kind: "creator",
        followPlayer: !!extra.followPlayer,
        moveTowardPlayerSpeed: numOr(extra.moveTowardPlayerSpeed, profile.moveTowardPlayerSpeed),
        burnDps: numOr(extra.burnDps, profile.burnDps),
        burnSec: numOr(extra.burnSec, profile.burnSec),
        pulseInterval: numOr(extra.pulseInterval, profile.pulseInterval),
        pulseFlashSec: numOr(extra.pulseFlashSec, profile.pulseFlashSec),
        chainChance: numOr(extra.chainChance, profile.viralChildChainChance),
        chainDepth: numOr(extra.chainDepth, 0),
        maxChainDepth: numOr(extra.maxChainDepth, profile.viralChildMaxDepth),

        viralEmitInterval: numOr(extra.viralEmitInterval, profile.viralEmitInterval),
        viralEmitCount: numOr(extra.viralEmitCount, profile.viralEmitCount),
        viralChildOpts: extra.viralChildOpts || null,
        potentialChildren: numOr(extra.potentialChildren, profile.viralPotentialChildren),
        spawnedChildren: numOr(extra.spawnedChildren, 0),
        maxChildrenPerField: numOr(extra.maxChildrenPerField, profile.viralMaxChildrenPerField),
        absoluteFieldCap: numOr(extra.absoluteFieldCap, profile.viralAbsoluteFieldCap),
        childDistanceMult: numOr(extra.childDistanceMult, profile.viralChildDistanceMult),
        rippleAngleJitter: numOr(extra.rippleAngleJitter, profile.viralRippleAngleJitter),
        rippleDriftSpeed: numOr(extra.rippleDriftSpeed, profile.viralRippleDriftSpeed),
        linkFromX: (extra.linkFromX ?? null),
        linkFromY: (extra.linkFromY ?? null),
        linkLife: numOr(extra.linkLife, 0),
        linkLifeMax: numOr(extra.linkLifeMax, numOr(extra.linkLife, 0)),
        driftVx: numOr(extra.driftVx, 0),
        driftVy: numOr(extra.driftVy, 0),
        seekEnemySpeed: numOr(extra.seekEnemySpeed, profile.viralChildSeekEnemySpeed),
        seekEnemyRadius: numOr(extra.seekEnemyRadius, profile.viralChildSeekEnemyRadius),
        isViral: !!extra.isViral || !!profile.viralOnKill,
      };
    }

    spawnCreatorChildField(x, y, childOpts={}) {
      const p = this.player;
      const profile = this.getCreatorSpawnProfile();
      if (profile.viralAbsoluteFieldCap > 0 && this.countCreatorFields() >= profile.viralAbsoluteFieldCap) return false;
      const radius = CFG.weapons.creator.radius * p.stats.creatorRadius * numOr(childOpts.radiusMult, profile.viralChildRadiusMult);
      const life = CFG.weapons.creator.life * numOr(childOpts.lifeMult, profile.viralChildLifeMult);
      const dmg = CFG.weapons.creator.dmg * p.stats.dmgMult * numOr(childOpts.dmgMult, profile.viralChildDmgMult);
      const opts = this.makeCreatorFieldOptions(profile, {
        burnDps: profile.burnDps,
        burnSec: profile.burnSec,
        pulseInterval: numOr(childOpts.pulseInterval, profile.pulseInterval),
        pulseFlashSec: numOr(childOpts.pulseFlashSec, profile.pulseFlashSec),
        chainChance: profile.viralChildChainChance,
        chainDepth: numOr(childOpts.chainDepth, 0),
        maxChainDepth: profile.viralChildMaxDepth,
        potentialChildren: numOr(childOpts.potentialChildren, profile.viralPotentialChildren),
        spawnedChildren: numOr(childOpts.spawnedChildren, 0),
        maxChildrenPerField: numOr(childOpts.maxChildrenPerField, profile.viralMaxChildrenPerField),
        absoluteFieldCap: numOr(childOpts.absoluteFieldCap, profile.viralAbsoluteFieldCap),
        childDistanceMult: numOr(childOpts.childDistanceMult, profile.viralChildDistanceMult),
        rippleAngleJitter: numOr(childOpts.rippleAngleJitter, profile.viralRippleAngleJitter),
        rippleDriftSpeed: numOr(childOpts.rippleDriftSpeed, profile.viralRippleDriftSpeed),
        linkFromX: childOpts.linkFromX,
        linkFromY: childOpts.linkFromY,
        linkLife: numOr(childOpts.linkLife, profile.viralLinkLife),
        linkLifeMax: numOr(childOpts.linkLifeMax, profile.viralLinkLife),
        driftVx: numOr(childOpts.driftVx, 0),
        driftVy: numOr(childOpts.driftVy, 0),
        seekEnemySpeed: numOr(childOpts.seekEnemySpeed, profile.viralChildSeekEnemySpeed),
        seekEnemyRadius: numOr(childOpts.seekEnemyRadius, profile.viralChildSeekEnemyRadius),
        isViral: true,
      });
      this.fields.push(new SparkleField(x, y, radius, dmg, life, opts));
      if (opts.linkLife > 0 && opts.linkFromX !== null && opts.linkFromY !== null) {
        this.addFieldBurst(x, y, "viral");
      }
      return true;
    }

    spawnCreatorCast(profile) {
      const p = this.player;
      const casts = Math.max(1, Math.floor((profile.fieldsPerCast || 1) + p.stats.recruit));
      const baseLife = CFG.weapons.creator.life * profile.lifeMult;
      const baseDmg = CFG.weapons.creator.dmg * p.stats.dmgMult * profile.dmgMult;
      const baseRadius = CFG.weapons.creator.radius * p.stats.creatorRadius * profile.radiusMult;

      if (profile.mode === "aura") {
        const existing = this.fields.find(f => f.kind === "creator" && f.followPlayer);
        if (existing) {
          existing.r = baseRadius;
          existing.dmg = baseDmg;
          existing.burnDps = profile.burnDps;
          existing.burnSec = profile.burnSec;
          existing.life = Math.max(existing.life, 999);
          existing.pulseInterval = (profile.pulseInterval || 1) / Math.max(0.0001, p.stats.creatorPulseFreq || 1);
          existing.pulseFlashSec = profile.pulseFlashSec;
          return;
        }
        const opts = this.makeCreatorFieldOptions(profile, { followPlayer:true, pulseInterval:(profile.pulseInterval || 1) / Math.max(0.0001, p.stats.creatorPulseFreq || 1), pulseFlashSec:profile.pulseFlashSec });
        this.fields.push(new SparkleField(p.x, p.y, baseRadius, baseDmg, 999, opts));
        return;
      }

      for (let i=0; i<casts; i++) {
        const pos = this.rollCreatorSpawnPoint(profile);
        const opts = this.makeCreatorFieldOptions(profile, {
          viralEmitInterval: profile.viralEmitInterval,
          viralEmitCount: profile.viralEmitCount,
          potentialChildren: profile.viralPotentialChildren,
          spawnedChildren: 0,
          maxChildrenPerField: profile.viralMaxChildrenPerField,
          absoluteFieldCap: profile.viralAbsoluteFieldCap,
          childDistanceMult: profile.viralChildDistanceMult,
          rippleAngleJitter: profile.viralRippleAngleJitter,
          rippleDriftSpeed: profile.viralRippleDriftSpeed,
          isViral: !!profile.viralOnKill,
          pulseInterval: (profile.pulseInterval || 1) / Math.max(0.0001, p.stats.creatorPulseFreq || 1),
          pulseFlashSec: profile.pulseFlashSec,
          viralChildOpts: {
            radiusMult: profile.viralChildRadiusMult,
            lifeMult: profile.viralChildLifeMult,
            dmgMult: profile.viralChildDmgMult,
            chainDepth: 1,
            potentialChildren: Math.max(0, profile.viralPotentialChildren - 1),
            spawnedChildren: 0,
            maxChildrenPerField: profile.viralMaxChildrenPerField,
            absoluteFieldCap: profile.viralAbsoluteFieldCap,
            childDistanceMult: profile.viralChildDistanceMult,
            rippleAngleJitter: profile.viralRippleAngleJitter,
            rippleDriftSpeed: profile.viralRippleDriftSpeed,
            pulseInterval: (profile.pulseInterval || 1) / Math.max(0.0001, p.stats.creatorPulseFreq || 1),
            pulseFlashSec: profile.pulseFlashSec,
            isViral: true,
          },
        });
        this.fields.push(new SparkleField(pos.x, pos.y, baseRadius, baseDmg, baseLife, opts));
      }
    }

    rollAndSpawnPowerup(enemy) {
      if (!CFG.powerups?.enabled || !enemy || enemy.noDrops || enemy.isWall) return;
      let dropChance = CFG.powerups.normalDropChance ?? 0;
      if (enemy instanceof BossEnemy) dropChance = CFG.powerups.bossDropChance ?? dropChance;
      else if (enemy.isElite || enemy.isMini) dropChance = CFG.powerups.eliteDropChance ?? dropChance;
      if (Math.random() > dropChance) return;
      const kind = this.choosePowerupKind();
      if (!kind) return;
      this.powerups.push(new Powerup(enemy.x + rand(-4,4), enemy.y + rand(-4,4), kind));
    }

    choosePowerupKind() {
      const defs = CFG.powerups || {};
      const kinds = ['heal','magnet','shield','barrage'];
      let total = 0;
      const weights = [];
      for (const k of kinds) {
        const w = Math.max(0, Number(defs[k]?.dropWeight) || 0);
        weights.push(w); total += w;
      }
      if (total <= 0) return null;
      let r = Math.random() * total;
      for (let i=0;i<kinds.length;i++) {
        r -= weights[i];
        if (r <= 0) return kinds[i];
      }
      return kinds[kinds.length-1];
    }

    applyPowerup(kind) {
      const p = this.player; if (!p) return;
      if (kind === 'heal') {
        p.budget = clamp(p.budget + (CFG.powerups.heal?.healAmount ?? 25), 0, p.maxBudget);
      } else if (kind === 'magnet') {
        p.magnetTimer = Math.max(p.magnetTimer, CFG.powerups.magnet?.durationSec ?? 8);
        if (CFG.powerups.magnet?.pullAllCoinsOnPickup) {
          for (const c of this.coins) if (c && !c.dead) c.vac = true;
        }
      } else if (kind === 'shield') {
        p.shieldHits = Math.max(p.shieldHits, Number(CFG.powerups.shield?.blocks) || 1);
      } else if (kind === 'barrage') {
        this.firePowerupBarrage();
      }
      this.sfx.powerup();
    }

    getPlayerAimFacing() {
      const p = this.player;
      if (!p) return { x: 1, y: 0 };
      let fx = Number.isFinite(p.moveX) ? p.moveX : 0;
      let fy = Number.isFinite(p.moveY) ? p.moveY : 0;
      if (Math.hypot(fx, fy) < 0.001) {
        fx = Number.isFinite(p.facingX) ? p.facingX : 0;
        fy = Number.isFinite(p.facingY) ? p.facingY : 0;
      }
      if (Math.hypot(fx, fy) < 0.001) return { x: 1, y: 0 };
      const m = Math.hypot(fx, fy) || 1;
      return { x: fx / m, y: fy / m };
    }

    spawnBarrageWave(cfg) {
      const p = this.player; if (!p) return;
      const facing = this.getPlayerAimFacing();
      const shots = Math.max(1, Number(cfg.shotsPerWave) || 7);
      const spread = (Number(cfg.spreadDeg) || 45) * Math.PI / 180;
      const speed = Number(cfg.speed) || 340;
      const life = Number(cfg.lifeSec) || 0.9;
      const dmg = Number(cfg.damage) || 20;
      const baseAng = Math.atan2(facing.y, facing.x);
      const originX = p.x + Math.cos(baseAng) * (p.r + 5);
      const originY = p.y + Math.sin(baseAng) * (p.r + 5);
      const opts = {
        r: 5,
        renderScale: Number(cfg.renderScale) || 1.35,
        trailScale: Number(cfg.trailScale) || 1.35,
        color: 'rgba(255,214,74,0.98)',
        glow: 'rgba(255,230,150,0.36)'
      };
      for (let i=0; i<shots; i++) {
        const t = shots === 1 ? 0.5 : (i / (shots - 1));
        const ang = baseAng + (t - 0.5) * spread;
        const vx = Math.cos(ang) * speed;
        const vy = Math.sin(ang) * speed;
        this.bullets.push(new Bullet(originX, originY, vx, vy, dmg, life, opts));
      }
    }

    firePowerupBarrage() {
      const p = this.player; if (!p) return;
      const cfg = CFG.powerups.barrage || {};
      const waves = Math.max(1, Number(cfg.waves) || 1);
      const interval = Number(cfg.waveIntervalSec) || 0.12;
      for (let w=0; w<waves; w++) {
        this._delayedShots.push({
          at: this.time + w * interval,
          kind: 'barrageWave',
          cfg,
        });
      }
    }

    updateWeapons(dt) {
      const p=this.player;
      for (let i=this.enemyProjectiles.length-1;i>=0;i--){
        const ep=this.enemyProjectiles[i];
        if (dist2(ep.x, ep.y, p.x, p.y) <= (ep.r + p.r)*(ep.r + p.r)) {
          const took = p.applyDamage(ep.dmg);
          if (took) this.sfx.hit(); else this.sfx.shieldBlock();
          this.enemyProjectiles.splice(i,1);
        }
      }
      const t=this.time;

      for(const w of p.weapons){
        if(w.id==="performance"){
          const ctx = this.getPerformanceModifierContext();
          let rangeMult = 1.0;
          let cdMult = 1.0;

          if (ctx.combo) {
            if (typeof ctx.combo.rangeMult === "number") rangeMult = ctx.combo.rangeMult;
            if (typeof ctx.combo.cooldownMult === "number") cdMult = ctx.combo.cooldownMult;
          } else if (ctx.singleId === "perf_shotgun" && ctx.single) {
            rangeMult = ctx.single.rangeMult || 0.78;
          } else if (ctx.singleId === "perf_burst" && ctx.single) {
            cdMult = ctx.single.cooldownMult || 1.30;
          }

          const range = CFG.weapons.performance.range * p.stats.perfRange * rangeMult;
          w.cd -= dt * p.stats.perfFire;
          const cdBase = CFG.weapons.performance.baseCd;
          const cd = cdBase * cdMult;

          if(w.cd<=0){
            const target = this.nearestEnemyWithin(range);
            if(target){
              w.cd += cd;
              this.firePerformanceWeaponVariant(target);
            } else {
              w.cd = 0;
            }
          }
        } else if(w.id==="creator"){
          const profile = this.getCreatorSpawnProfile();
          w.cd -= dt * p.stats.creatorFreq;
          const cd = CFG.weapons.creator.baseCd * profile.cooldownMult;
          if(w.cd<=0){
            w.cd += cd;
            this.spawnCreatorCast(profile);
          }
        }
      }
    }

    updateDelayedShots() {
      const t=this.time;
      for(let i=this._delayedShots.length-1;i>=0;i--){
        const s=this._delayedShots[i];
        if(t >= s.at){
          if (s.kind === 'barrageWave') {
            this.spawnBarrageWave(s.cfg || {});
          } else {
            this.bullets.push(new Bullet(s.x,s.y,s.vx,s.vy,s.dmg,s.life, s.opts || {}));
          }
          this._delayedShots.splice(i,1);
        }
      }
    }

    handleCollisions(dt) {
      for(let i=this.bullets.length-1;i>=0;i--){
        const b=this.bullets[i];
        for(const e of this.enemies){
          if(e.dead) continue;
          if(b.hitSet && b.hitSet.has(e)) continue;

          let hit=false;
          if(e instanceof BannerEnemy || e instanceof GardenWallEnemy){
            const rx=e.x-e.w/2, ry=e.y-e.h/2;
            const cx=clamp(b.x, rx, rx+e.w), cy=clamp(b.y, ry, ry+e.h);
            hit = dist2(b.x,b.y,cx,cy) <= (b.r*b.r);
          } else {
            const rr=(e.r||10);
            hit = dist2(b.x,b.y,e.x,e.y) <= (rr+b.r)*(rr+b.r);
          }

          if(hit){
            e.take(b.dmg);
            if(b.hitSet) b.hitSet.add(e);

            let consumed = true;

            if (b.splitOnFirstHit && !b.splitDone) {
              b.splitDone = true;
              if (b.ricochet > 0) {
                const next = this.findRicochetTarget(e, b.hitSet, b.ricochetSearchRadius || 110);
                if (next) {
                  const sp = Math.hypot(b.vx, b.vy) || CFG.weapons.performance.speed;
                  const dx = next.x - e.x, dy = next.y - e.y;
                  const d = Math.hypot(dx, dy) || 1;
                  const branch = new Bullet(
                    e.x, e.y,
                    (dx/d) * sp,
                    (dy/d) * sp,
                    b.dmg * (typeof b.ricochetDamageMult === "number" ? b.ricochetDamageMult : 1.0),
                    b.life,
                    {
                      pierce: 0,
                      ricochet: Math.max(0, b.ricochet - 1),
                      ricochetSearchRadius: b.ricochetSearchRadius || 110,
                      ricochetDamageMult: b.ricochetDamageMult,
                      renderScale: b.renderScale,
                      trailScale: b.trailScale,
                      color: b.color,
                      glow: b.glow,
                    }
                  );
                  if (b.hitSet) branch.hitSet = new Set(b.hitSet);
                  branch.hitSet.add(e);
                  this.bullets.push(branch);
                }
              }
            }

            if (b.pierce > 0) {
              b.pierce -= 1;
              consumed = false;
            } else if (b.ricochet > 0) {
              const next = this.findRicochetTarget(e, b.hitSet, b.ricochetSearchRadius || 110);
              if (next) {
                const sp = Math.hypot(b.vx, b.vy) || CFG.weapons.performance.speed;
                const dx = next.x - e.x, dy = next.y - e.y;
                const d = Math.hypot(dx, dy) || 1;
                b.x = e.x;
                b.y = e.y;
                b.vx = (dx/d) * sp;
                b.vy = (dy/d) * sp;
                b.ricochet -= 1;
                b.dmg *= (typeof b.ricochetDamageMult === "number" ? b.ricochetDamageMult : 1.0);
                consumed = false;
              }
            }

            if(consumed){
              b.life=-1;
            }
            break;
          }
        }
      }

      for(const f of this.fields){
        if(f.life<=0) continue;
        if(!f.didPulse) continue;

        let overlapExtra = 0;
        for (const of2 of this.fields) {
          if (!of2 || of2 === f || of2.life <= 0) continue;
          const rr = f.r + of2.r;
          if (dist2(f.x,f.y,of2.x,of2.y) <= rr*rr*0.45) overlapExtra++;
        }
        const pulseMult = 1 + overlapExtra * numOr(this.getCreatorSpawnProfile()?.overlapBonusPerExtra, 0.50);

        for(const e of this.enemies){
          if(e.dead) continue;
          const rr=(e.r||10);
          if(dist2(f.x,f.y,e.x,e.y) <= (f.r+rr)*(f.r+rr)){
            e.take(f.dmg * pulseMult);
            if (f.burnDps > 0 && f.burnSec > 0) e.applyBurn(f.burnDps, f.burnSec);
          }
        }
      }

      const p=this.player;
      const t=this.time;
      p.advocateHitCooldowns = p.advocateHitCooldowns || {};
      p.advocateRadarHitCooldowns = p.advocateRadarHitCooldowns || {};
      p.advocateRadarTouching = p.advocateRadarTouching || {};
      const spin = CFG.weapons.advocate.spin * p.stats.advocateSpin;
      const shapeId = p.advocateBuild?.shape || null;
      const effectId = p.advocateBuild?.effect || null;
      const shapeCfg = CFG.advocateMods?.shapes?.[shapeId] || {};
      const effectCfg = CFG.advocateMods?.effects?.[effectId] || {};
      p.advocateHitCooldowns = p.advocateHitCooldowns || {};
      p.advocateTrails = p.advocateTrails || [];

      this.emitAdvocateTrails(t, spin, effectId, shapeCfg);

      for(const orb of this.orbitals){
        if (shapeId === "partner_discovery") {
          const seg = orb.segment(p,t,spin);
          const baseDps = (Number(shapeCfg.dpsPerSecond)||22) * p.stats.dmgMult;
          const contactHit = (Number(shapeCfg.contactHitDamage)||0) * p.stats.dmgMult;
          const contactCd = Number(shapeCfg.contactHitCooldown) || 0.30;
          for(let i=0;i<this.enemies.length;i++){
            const e = this.enemies[i];
            if(!e || e.dead) continue;
            const rr=(e.r||10);
            const key = `${orb.id}_${i}`;
            const touching = pointSegDist2(e.x,e.y,seg.x1,seg.y1,seg.x2,seg.y2) <= (seg.width+rr)*(seg.width+rr);
            if (touching) {
              if (!p.advocateRadarTouching[key] && (p.advocateRadarHitCooldowns[key] || 0) <= 0) {
                if (contactHit > 0) e.take(contactHit);
                p.advocateRadarHitCooldowns[key] = contactCd;
              }
              e.take(baseDps * dt);
              p.advocateRadarTouching[key] = true;
            } else {
              p.advocateRadarTouching[key] = false;
            }
          }
        } else {
          const pos=orb.pos(p,t,spin);
          for(const e of this.enemies){
            if(e.dead) continue;
            const rr=(e.r||10);
            const size = CFG.weapons.advocate.size * p.stats.advocateSize * (Number(shapeCfg.orbitSizeMult)||1);
            const hr=(size/2)+1;
            if(dist2(pos.x,pos.y,e.x,e.y) <= (hr+rr)*(hr+rr)){
              const key = `${orb.id}_${this.enemies.indexOf(e)}`;
              p.advocateHitCooldowns[key] = p.advocateHitCooldowns[key] || 0;
              if (p.advocateHitCooldowns[key] <= 0) {
                e.take(orb.dmg);
                p.advocateHitCooldowns[key] = Number(shapeCfg.hitCooldown) || 0.08;
              }
            }
          }
        }
      }
      for (const k of Object.keys(p.advocateHitCooldowns||{})) p.advocateHitCooldowns[k] = Math.max(0, p.advocateHitCooldowns[k]-dt);
      for (const k of Object.keys(p.advocateRadarHitCooldowns||{})) p.advocateRadarHitCooldowns[k] = Math.max(0, p.advocateRadarHitCooldowns[k]-dt);
      this.processAdvocateTrailEffects(dt, effectId, effectCfg, shapeCfg);
      this.updateAdvocateTrails(dt);
    }


    processAdvocateTrailEffects(dt, effectId, effectCfg, shapeCfg) {
      if (!this.player || !effectId) return;
      const trails = this.player.advocateTrails || [];
      if (!trails.length) return;

      const mult = Number(shapeCfg.effectPowerMult) || 1;
      const fieldDps = (Number(effectCfg.fieldDps) || 0) * mult;

      for (const enemy of this.enemies) {
        if (!enemy || enemy.dead) continue;
        const rr = (enemy.r || Math.max(enemy.w || 18, enemy.h || 18) * 0.45 || 10);

        let touching = false;
        for (const tr of trails) {
          if (!tr || tr.effectId !== effectId) continue;
          if (tr.kind === "segment") {
            const halfW = Math.max(4, Number(tr.width) || 8) * 0.5;
            if (pointSegDist2(enemy.x, enemy.y, tr.x1, tr.y1, tr.x2, tr.y2) <= (rr + halfW) * (rr + halfW)) {
              touching = true;
              break;
            }
          } else {
            const rad = Math.max(4, Number(tr.radius) || 6);
            if (dist2(enemy.x, enemy.y, tr.x, tr.y) <= (rr + rad) * (rr + rad)) {
              touching = true;
              break;
            }
          }
        }
        if (!touching) continue;

        if (fieldDps > 0) enemy.take(fieldDps * dt);

        if (effectId === "cool_rewards") {
          enemy.slowTimer = Math.max(enemy.slowTimer || 0, Math.max(dt * 1.1, Number(effectCfg.slowLingerSec) || 0));
          enemy.slowMult = Math.min(enemy.slowMult || 1, Number(effectCfg.slowMult) || 0.6);
        } else if (effectId === "fuel_tank") {
          enemy.applyBurn((Number(effectCfg.burnDps) || 4) * mult, Math.max(dt * 1.1, Number(effectCfg.burnLingerSec) || 0));
        } else if (effectId === "referral_surge") {
          enemy.vulnTimer = Math.max(enemy.vulnTimer || 0, Math.max(dt * 1.1, Number(effectCfg.vulnLingerSec) || 0));
          enemy.vulnMult = Math.max(enemy.vulnMult || 1, Number(effectCfg.vulnMult) || 1.2);

          const arcInterval = Math.max(0.05, Number(effectCfg.arcInterval) || 0.35);
          if ((enemy._surgeArcCd || 0) <= 0) {
            const range = Number(effectCfg.arcRange) || 70;
            let left = Number(effectCfg.maxArcs) || 2;
            if (left > 0) {
              for (const other of this.enemies) {
                if (left <= 0) break;
                if (!other || other === enemy || other.dead) continue;
                if (dist2(enemy.x, enemy.y, other.x, other.y) <= range * range) {
                  other.take((Number(effectCfg.arcDamage) || 4) * mult);
                  this.surgeArcs = this.surgeArcs || [];
                  this.surgeArcs.push({ x1: enemy.x, y1: enemy.y, x2: other.x, y2: other.y, life: 0.09, maxLife: 0.09 });
                  left--;
                }
              }
            }
            enemy._surgeArcCd = arcInterval;
          }
        }
      }
    }

    spawnAdvocateTrail(x, y, effectId, shapeCfg, radiusOverride = null) {
      if (!effectId || !this.player) return;
      const shapeId = this.player.advocateBuild?.shape || "referral_engine";
      const baseLife = Number((shapeId==="partner_discovery" ? CFG.advocateMods?.visuals?.radarTrailLife : CFG.advocateMods?.visuals?.closeTrailLife)) || 0.4;
      const widthMult = Number(shapeCfg.trailWidthMult)||1;
      const baseRadius = shapeId === "partner_discovery"
        ? (CFG.weapons.advocate.size * this.player.stats.advocateSize * 0.5)
        : (CFG.weapons.advocate.size * this.player.stats.advocateSize * 0.38);
      const radius = Math.max(4, Number(radiusOverride) || (baseRadius * widthMult));
      this.player.advocateTrails = this.player.advocateTrails || [];
      this.player.advocateTrails.push({ kind:"point", x, y, life: baseLife, maxLife: baseLife, effectId, widthMult, radius });
    }

    spawnAdvocateTrailSegment(x1, y1, x2, y2, effectId, width) {
      if (!effectId || !this.player) return;
      const baseLife = Number(CFG.advocateMods?.visuals?.radarTrailLife) || 0.45;
      this.player.advocateTrails = this.player.advocateTrails || [];
      this.player.advocateTrails.push({ kind:"segment", x1, y1, x2, y2, width: Math.max(6, width || 8), life: baseLife, maxLife: baseLife, effectId });
    }

    emitAdvocateTrails(t, spin, effectId, shapeCfg) {
      if (!this.player || !effectId) return;
      this.player.advocateTimers = this.player.advocateTimers || { trail: 0 };
      if (this.player.advocateTimers.trail > 0) return;
      this.player.advocateTimers.trail = Number(CFG.advocateMods?.visuals?.trailSpawnInterval) || 0.07;
      this.player.advocateTrailState = this.player.advocateTrailState || {};

      const spacingBase = Math.max(4, Number(CFG.advocateMods?.visuals?.trailPointSpacing) || 12);

      for (const orb of this.orbitals) {
        if (!orb) continue;
        const stateKey = String(orb.id || Math.random());
        const prev = this.player.advocateTrailState[stateKey] || null;

        if ((this.player.advocateBuild?.shape || null) === "partner_discovery") {
          const seg = orb.segment(this.player, t, spin);
          const inset = Number(CFG.advocateMods?.visuals?.radarTrailInset) || 0;
          const dx = seg.x2 - seg.x1, dy = seg.y2 - seg.y1;
          const len = Math.hypot(dx, dy) || 1;
          const ux = dx / len, uy = dy / len;
          const cur = {
            x1: seg.x1 + ux * inset,
            y1: seg.y1 + uy * inset,
            x2: seg.x2,
            y2: seg.y2,
            width: Math.max(9, Number(seg.width) * 2.15)
          };

          if (prev && Number.isFinite(prev.x1) && Number.isFinite(prev.y1) && Number.isFinite(prev.x2) && Number.isFinite(prev.y2)) {
            const moveA = Math.hypot(cur.x1 - prev.x1, cur.y1 - prev.y1);
            const moveB = Math.hypot(cur.x2 - prev.x2, cur.y2 - prev.y2);
            const steps = Math.max(1, Math.ceil(Math.max(moveA, moveB) / Math.max(4, spacingBase * 0.6)));
            for (let i = 1; i <= steps; i++) {
              const u = i / steps;
              this.spawnAdvocateTrailSegment(
                prev.x1 + (cur.x1 - prev.x1) * u,
                prev.y1 + (cur.y1 - prev.y1) * u,
                prev.x2 + (cur.x2 - prev.x2) * u,
                prev.y2 + (cur.y2 - prev.y2) * u,
                effectId,
                cur.width
              );
            }
          } else {
            this.spawnAdvocateTrailSegment(cur.x1, cur.y1, cur.x2, cur.y2, effectId, cur.width);
          }
          this.player.advocateTrailState[stateKey] = cur;
        } else {
          const pos = orb.pos(this.player, t, spin);
          const radius = Math.max(4, CFG.weapons.advocate.size * this.player.stats.advocateSize * 0.38 * (Number(shapeCfg.trailWidthMult) || 1));
          if (prev && Number.isFinite(prev.x) && Number.isFinite(prev.y)) {
            const move = Math.hypot(pos.x - prev.x, pos.y - prev.y);
            const steps = Math.max(1, Math.ceil(move / Math.max(4, radius * 0.9)));
            for (let i = 1; i <= steps; i++) {
              const u = i / steps;
              this.spawnAdvocateTrail(
                prev.x + (pos.x - prev.x) * u,
                prev.y + (pos.y - prev.y) * u,
                effectId,
                shapeCfg,
                radius
              );
            }
          } else {
            this.spawnAdvocateTrail(pos.x, pos.y, effectId, shapeCfg, radius);
          }
          this.player.advocateTrailState[stateKey] = { x: pos.x, y: pos.y, radius };
        }
      }
    }

    updateAdvocateTrails(dt) {
      if (!this.player) return;
      this.player.advocateTimers = this.player.advocateTimers || { trail: 0 };
      this.player.advocateTimers.trail = Math.max(0, (this.player.advocateTimers.trail||0) - dt);
      this.player.advocateTrails = (this.player.advocateTrails || []).filter(tr => (tr.life -= dt) > 0);
    }

    setPaused(on) {
      this.paused = !!on;
      this.sfx.setPausedMuted(this.paused);
      this.music.setPaused(this.paused);
    }

    // Top-right controls (Play + Mode + Sound) in a single row.
    // Keeping everything in one row avoids overlap/click issues seen with bottom-anchored buttons.
    playRectTop_(){ return { x: CFG.logicalW-10-58, y: 10, w: 58, h: 18 }; }
    soundRect(){
      const p = this.playRectTop_();
      return { x: p.x-6-18, y: 10, w: 18, h: 18 };
    }
    modeRect(){
      const s = this.soundRect();
      return { x: s.x-6-96, y: 10, w: 96, h: 18 }; }

    updateTopRightButtons() {
      const m=this.surf.mouseToLogical(this.input);

      if(this.input.mouse.clicked){
        this.ensureAudioRunning();
        const s=this.soundRect();
        if(m.x>=s.x&&m.x<=s.x+s.w&&m.y>=s.y&&m.y<=s.y+s.h){
          const newOn = !this.sfx.userEnabled;
          this.sfx.setEnabled(newOn);
          this.music.setEnabled(newOn);
          this.sfx.ui();
          if (this.state === State.PAUSE) this.setPaused(true);
          return true;
        }

        const r=this.modeRect();
        if(m.x>=r.x&&m.x<=r.x+r.w&&m.y>=r.y&&m.y<=r.y+r.h){
          this.toggleTheme();
          this.sfx.ui();
          return true;
        }
      }
      return false;
    }

    ensureAudioRunning() {
      if (!this.sfx?.userEnabled) return;
      this.sfx.ensure();
      if (this.sfx.ctx && this.sfx.ctx.state === "suspended") this.sfx.ctx.resume().catch(()=>{});
      if (this.music) {
        this.music.ensure();
        if (!this.music.enabled) this.music.start();
        else if (this.music.ctx && this.music.ctx.state === "suspended") this.music.ctx.resume().catch(()=>{});
      }
      if (this.state === State.PAUSE) this.setPaused(true);
    }

    update(dt) {
      this.updateAudioMix();
      if (this.input.pressedOnce(" ", this._edge)) {
        if (this.state === State.PLAY) { this.state = State.PAUSE; this.setPaused(true); }
        else if (this.state === State.PAUSE) { this.state = State.PLAY; this.setPaused(false); }
      }

      if(this.state===State.TITLE) return this.updateTitle(dt);
      if(this.state===State.MENU) return this.updateMenu(dt);
      if(this.state===State.DEAD) return this.updateDead(dt);
      if(this.state===State.LEVEL) return this.updateLevel(dt);
      if(this.state===State.MOD) return this.updateMod(dt);
      if(this.state===State.CHEST) return this.updateChest(dt);
      if(this.state===State.PAUSE) return this.updatePause(dt);
      return this.updatePlay(dt);
    }

    updateTitle(dt) {
      this.updateTopRightButtons();
      this.titleStartPulse += dt;
      this.titleGlitchTimer += dt;
      this._updateTitleAds(dt);

      const m=this.surf.mouseToLogical(this.input);
      const b=this.titleStartRect();
      const hover=m.x>=b.x&&m.x<=b.x+b.w&&m.y>=b.y&&m.y<=b.y+b.h;
      if ((this.input.mouse.clicked && hover) || this.input.pressedOnce("enter", this._edge)) {
        this.state=State.MENU;
        this.sfx.ui();
      }
    }

    updateMenu(dt) {
      this.updateTopRightButtons();

      const m=this.surf.mouseToLogical(this.input);
      if(this.input.mouse.clicked){
        const cards=this.menuCards();
        for(let i=0;i<cards.length;i++){
          const r=cards[i];
          if(m.x>=r.x&&m.x<=r.x+r.w&&m.y>=r.y&&m.y<=r.y+r.h){
            this.selectedHero=i;
            this.sfx.ui();
            return;
          }
        }

        const b=this.menuPlayRect();
        if(m.x>=b.x&&m.x<=b.x+b.w&&m.y>=b.y&&m.y<=b.y+b.h){
          const hero=HEROES[this.selectedHero];
          if(!hero.locked){
            this.startRun(hero);
            this.sfx.ui();
          }
        }
      }
    }

    updatePause(dt) { this.updateTopRightButtons(); }

    updateLevel(dt) {
      this.updateTopRightButtons();
      this.overlayAnim = Math.min(1, this.overlayAnim + dt*7);

      const m=this.surf.mouseToLogical(this.input);
      if(this.input.mouse.clicked){
        const rects=this.choiceRects(this.upgradeChoices.length, 86);
        for(let i=0;i<rects.length;i++){
          const r=rects[i];
          if(m.x>=r.x&&m.x<=r.x+r.w&&m.y>=r.y&&m.y<=r.y+r.h){
            const choice = this.upgradeChoices[i];
            if (choice.kind === "weapon_upgrade" || choice.kind === "advocate_stat_choice") this.applyWeaponUpgrade(choice);
            else if (choice.kind === "modifier") {
              this._modWeaponId = choice.weaponId || "performance";
              this.applyModifier(choice);
            }
            else if (choice.kind === "creator_behavior") this.applyModifier(choice);
            else if (choice.kind === "advocate_effect") this.applyModifier(choice);
            else if (choice.kind === "modifier_offer") {
              this._pendingModifierTrackAdvance = choice.advanceTrackOnPick ? choice.weaponId : null;
              this.openModifierPick(choice.weaponId);
            }
            else if (choice.kind === "creator_strategy_offer") this.openModifierPick("creator", "strategy");
            else if (choice.kind === "creator_behavior_offer") this.openModifierPick("creator", "behavior");
            else if (choice.kind === "advocate_shape_offer") this.openModifierPick("advocate", "shape");
            else if (choice.kind === "advocate_effect_offer") this.openModifierPick("advocate", "effect");
            else this.applyUpgrade(choice.id);
            this.sfx.ui();
            return;
          }
        }
      }
    }

    updateChest(dt) {
      this.updateTopRightButtons();
      this.overlayAnim = Math.min(1, this.overlayAnim + dt*7);

      const m=this.surf.mouseToLogical(this.input);
      if(this.input.mouse.clicked){
        const rects=this.choiceRects(this.chestChoices.length, 86);
        for(let i=0;i<rects.length;i++){
          const r=rects[i];
          if(m.x>=r.x&&m.x<=r.x+r.w&&m.y>=r.y&&m.y<=r.y+r.h){
