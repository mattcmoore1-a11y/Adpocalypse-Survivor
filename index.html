            this.applyChestChoice(this.chestChoices[i]);
            this.sfx.ui();
            return;
          }
        }
      }
    }

    updateDead(dt) {
      this.updateTopRightButtons();
      if(this.input.mouse.clicked) this.state=State.MENU;
    }

    updatePlay(dt) {
      this.updateTopRightButtons();
      this.time += dt;
      this.phaseTime += dt;

      const currentBossAt = Number.isFinite(this.nextBossAt) ? this.nextBossAt : Infinity;
      if(!this.bossActive && !this.phaseBossSpawned && !this.lull && this.phaseTime >= currentBossAt - CFG.bossPacing.lullLeadSec) {
        this.lull = true;
        this.lullUntil = this.phaseTime - CFG.bossPacing.lullLeadSec + CFG.bossPacing.lullGapSec + (currentBossAt - CFG.bossPacing.lullGapSec);
        this.music.onLullStart();
      }
      if(this.lull && this.phaseTime >= this.lullUntil) this.lull=false;

      if(!this.bossActive && !this.phaseBossSpawned && this.phaseTime >= currentBossAt) {
        this.spawnPhaseBoss();
      }

      this.updateLowPopulationSurges(dt);

      this.player.invuln = !!this.dev.invulnerable;
      this.player.update(dt, this.input);
      this.handlePlayerGardenInteractions(dt);
      this.cam.update(dt, this.player.x, this.player.y);

      const spawnPerSec = CFG.enemies.basePerSec + (this.time/60)*CFG.enemies.rampPerMin;
      if(!this.lull) this.spawnAcc += dt * spawnPerSec;
      while(this.spawnAcc>=1 && this.enemies.length < CFG.enemies.softCap){
        this.spawnAcc -= 1;
        this.spawnAmbientEnemy();
      }
      this.spawnScheduledElites();

      let bossStillAlive=false;
      for(let i=this.enemies.length-1;i>=0;i--){
        const e=this.enemies[i];
        e.updateStatus(dt);
        e.update(dt, this);
        if (e && !e.dead && !e.isWall) {
          for (const wall of this.gardenWalls) {
            if (!wall || wall.dead) continue;
            this.resolveEntityWallCollision(e, wall);
          }
        }

        if (e instanceof BossEnemy && !e.dead) bossStillAlive=true;

        if(e.dead && !e._dropped){
          e._dropped=true;
          this.sfx.death();

          const creatorProfile = this.getCreatorSpawnProfile();
          if (creatorProfile.viralOnKill && !(e instanceof BossEnemy)) {
            let overlapped = null;
            for (const f of this.fields) {
              if (!f || f.kind !== "creator") continue;
              if (dist2(f.x,f.y,e.x,e.y) <= (f.r + (e.r||10))*(f.r + (e.r||10))) {
                overlapped = f; break;
              }
            }
            if (overlapped) {
              const depth = numOr(overlapped.chainDepth, 0);
              const maxDepth = numOr(overlapped.maxChainDepth, 0);
              const canSpawn = numOr(overlapped.potentialChildren, 0) > 0 &&
                numOr(overlapped.spawnedChildren, 0) < numOr(overlapped.maxChildrenPerField, 0) &&
                (!numOr(overlapped.absoluteFieldCap, 0) || this.countCreatorFields() < numOr(overlapped.absoluteFieldCap, 0));
              if (canSpawn && depth < maxDepth && Math.random() <= numOr(overlapped.chainChance, 0)) {
                const spawnCount = Math.max(1, Math.floor(numOr(this.getCreatorSpawnProfile()?.viralOnKillSpawnCount, 1)));
                let spawnedAny = false;
                for (let si = 0; si < spawnCount; si++) {
                  if (numOr(overlapped.spawnedChildren, 0) >= numOr(overlapped.maxChildrenPerField, 0)) break;
                  if (numOr(overlapped.absoluteFieldCap, 0) > 0 && this.countCreatorFields() >= numOr(overlapped.absoluteFieldCap, 0)) break;
                  const childOk = this.spawnCreatorChildField(
                    e.x,
                    e.y,
                    {
                      chainDepth: depth + 1,
                      potentialChildren: Math.max(0, numOr(overlapped.potentialChildren, 0) - 1),
                      spawnedChildren: 0,
                      maxChildrenPerField: numOr(overlapped.maxChildrenPerField, 0),
                      absoluteFieldCap: numOr(overlapped.absoluteFieldCap, 0),
                      childDistanceMult: numOr(overlapped.childDistanceMult, 1.0),
                      rippleAngleJitter: numOr(overlapped.rippleAngleJitter, 0),
                      rippleDriftSpeed: numOr(overlapped.rippleDriftSpeed, 0),
                      driftVx: 0,
                      driftVy: 0,
                      seekEnemySpeed: numOr(overlapped.seekEnemySpeed, numOr(this.getCreatorSpawnProfile()?.viralChildSeekEnemySpeed, 0)),
                      seekEnemyRadius: numOr(overlapped.seekEnemyRadius, numOr(this.getCreatorSpawnProfile()?.viralChildSeekEnemyRadius, 120)),
                      linkFromX: overlapped.x,
                      linkFromY: overlapped.y,
                      linkLife: Math.max(0.22, numOr(overlapped.linkLifeMax, 0.22)),
                      linkLifeMax: Math.max(0.22, numOr(overlapped.linkLifeMax, 0.22)),
                      isViral: true,
                    }
                  );
                  if (childOk) {
                    overlapped.spawnedChildren = numOr(overlapped.spawnedChildren, 0) + 1;
                    spawnedAny = true;
                  }
                }
                if (spawnedAny) {
                  this.addFieldBurst(e.x, e.y, "viral");
                }
              }
            }
          }

          this.rollAndSpawnPowerup(e);

          if(e.noDrops) {
          } else if(e instanceof BossEnemy) {
            this.addScore(CFG.enemies.boss.scoreOnKill);
            this.chests.push(new Chest(e.x, e.y));
          } else {
            this.addScore(10);
            if (e instanceof BannerEnemy && e.isMini) {
              this.coins.push(new Coin(e.x, e.y, CFG.enemies.banner.miniBigCoinXp, true));
            } else {
              this.coins.push(new Coin(e.x, e.y, CFG.xp.coinXp, false));
            }
          }
        }

        if(e.dead && e.deathT > 0.38){
          this.enemies.splice(i,1);
        }
      }

      if(this.bossActive && !bossStillAlive){
        for (const gp of this.gardenPatches) if (gp.boss) gp.life = 0;
        for (const wall of this.bossGardenWalls) if (wall && !wall.dead) { wall.dead = true; wall.deathT = 1; }
        this.bossGardenWalls = [];
        this.gardenWalls = this.gardenWalls.filter(w => w && !w.garden?.boss && !w.dead);
        this.dooBossGroups = [];
        this.bossActive=false;
        const phases = CFG.enemies.phases || [];
        const hasNextPhase = this.phaseIndex < phases.length - 1;
        if (hasNextPhase) {
          this.advancePhase();
        } else {
          this.phaseBossSpawned = true;
          this.nextBossAt = Infinity;
        }

        this.lull=true;
        this.lullUntil=this.phaseTime+CFG.bossPacing.postBossLullSec;
        this.music.onLullStart();
      }

      for(let i=this.chests.length-1;i>=0;i--){
        const c=this.chests[i];
        c.update(dt, this);
        if(c.dead) this.chests.splice(i,1);
      }
      for(let i=this.powerups.length-1;i>=0;i--){
        const pu=this.powerups[i];
        pu.update(dt, this);
        if(pu.dead) this.powerups.splice(i,1);
      }

      this.updateWeapons(dt);
      this.updateDelayedShots();

      for(let i=this.bullets.length-1;i>=0;i--){
        const b=this.bullets[i];
        b.update(dt);
        if(b.life<=0) this.bullets.splice(i,1);
      }
      for(let i=this.enemyProjectiles.length-1;i>=0;i--){
        const p=this.enemyProjectiles[i];
        p.update(dt, this);
        if(p.life<=0) this.enemyProjectiles.splice(i,1);
      }
      for(let i=this.enemyMarkers.length-1;i>=0;i--){
        const m=this.enemyMarkers[i];
        m.update(dt, this);
        if(m.dead) this.enemyMarkers.splice(i,1);
      }
      for(let i=this.fields.length-1;i>=0;i--){
        const f=this.fields[i];
        f.update(dt, this);
        if(f.life<=0) this.fields.splice(i,1);
      }
      for(let i=this.fieldBursts.length-1;i>=0;i--){
        const b=this.fieldBursts[i];
        b.life -= dt;
        if(b.life<=0) this.fieldBursts.splice(i,1);
      }
      for(let i=this.popupTexts.length-1;i>=0;i--){
        const p=this.popupTexts[i];
        p.life -= dt;
        p.y += p.vy * dt;
        if(p.life<=0) this.popupTexts.splice(i,1);
      }
      for(let i=this.gardenPatches.length-1;i>=0;i--){
        const gp=this.gardenPatches[i];
        gp.update(dt);
        if(gp.life<=0) this.gardenPatches.splice(i,1);
      }
      const seenGardens = new Set();
      for(const wall of this.gardenWalls){
        if(!wall || wall.dead || !wall.garden || seenGardens.has(wall.garden)) continue;
        seenGardens.add(wall.garden);
        if (wall.garden.shrinkSpeed > 0) wall.garden.halfSize = Math.max(72, wall.garden.halfSize - wall.garden.shrinkSpeed * dt);
        if (!wall.garden.boss && wall.garden.life > 0) wall.garden.life = Math.max(0, wall.garden.life - dt);
      }
      for (const wall of this.gardenWalls) {
        if (wall && !wall.dead && wall.garden && !wall.garden.boss && wall.garden.life <= 0) { wall.dead = true; wall.deathT = 1; }
      }
      this.gardenWalls = this.gardenWalls.filter(w => w && (!w.dead || w.deathT <= 0.38));
      this.bossGardenWalls = this.bossGardenWalls.filter(w => w && (!w.dead || w.deathT <= 0.38));
      for(let i=this.surgeArcs.length-1;i>=0;i--){
        const a=this.surgeArcs[i];
        a.life -= dt;
        if(a.life<=0) this.surgeArcs.splice(i,1);
      }
      for(let i=this.coins.length-1;i>=0;i--){
        const c=this.coins[i];
        c.update(dt,this);
        if(c.dead) this.coins.splice(i,1);
      }

      this.handleCollisions(dt);

      if(this.music){
        const maxBudget = Math.max(1, this.player?.maxBudget || 100);
        const healthPct = clamp((this.player?.budget ?? maxBudget) / maxBudget, 0, 1);
        let bpm = CFG.music.defaultBpm;
        if (healthPct < 0.5) {
          const missingFromHalf = (0.5 - healthPct) / 0.5;
          bpm = lerp(CFG.music.defaultBpm, CFG.music.maxBpm, clamp(missingFromHalf, 0, 1));
        }
        this.music.setTargetBpm(bpm);
      }
      this.music.update(dt);

      if(this.player.budget<=0) this.state=State.DEAD;
    }

    draw() {
      const g=this.surf.g;
      this.surf.clear(this.theme.base);

      if(this.state===State.TITLE){
        this.drawTitleScreen(g);
        this.surf.present();
        return;
      }

      if(this.state===State.MENU){
        this.drawMenu(g);
        this.surf.present();
        return;
      }

      this.drawPlay(g);

      if(this.state===State.LEVEL) this.drawChoiceOverlay(g, "LEVEL UP", "Pick one upgrade", this.upgradeChoices);
      if(this.state===State.MOD) this.drawChoiceOverlay(g, "MODIFIER", "Pick one modifier", this.modChoices);
      if(this.state===State.CHEST) this.drawChoiceOverlay(g, "TREASURE CHEST", "Pick one weapon", this.chestChoices);
      if(this.state===State.PAUSE) this.drawPauseOverlay(g);
      if(this.state===State.DEAD)  this.drawDeadOverlay(g);

      this.surf.present();
    }

    drawBackground(g) {
      const tile=CFG.world.tile;
      const w=CFG.logicalW, h=CFG.logicalH;
      const topLeft=this.cam.s2w(0,0);
      const sx=Math.floor(topLeft.x/tile)*tile;
      const sy=Math.floor(topLeft.y/tile)*tile;

      g.fillStyle=this.theme.base;
      g.fillRect(0,0,w,h);

      for(let y=sy;y<topLeft.y+h+tile;y+=tile){
        for(let x=sx;x<topLeft.x+w+tile;x+=tile){
          const s=this.cam.w2s(x,y);
          const xx=s.x|0, yy=s.y|0;

          const hx=((Math.floor(x/tile)*73856093) ^ (Math.floor(y/tile)*19349663))>>>0;
          const v=hx%13;
          if(v===0){ g.fillStyle=this.theme.nodeB; g.fillRect(xx,yy,2,2); }
          else if(v===1){ g.fillStyle=this.theme.nodeP; g.fillRect(xx+10,yy+3,1,1); }
          else if(v===2){ g.fillStyle=this.theme.nodeK; g.fillRect(xx+3,yy+10,1,1); }

          g.fillStyle=this.theme.grid;
          g.fillRect(xx,yy,tile,1);
          g.fillRect(xx,yy,1,tile);
        }
      }
    }

    drawPlay(g) {
      this.drawBackground(g);

      window.__adpocFieldSample = this.fields;
      for(const gp of this.gardenPatches) gp.draw(g,this.cam,this.theme);
      for(const f of this.fields) f.draw(g,this.cam,this.theme);
      for(const marker of this.enemyMarkers) marker.draw(g,this.cam);
      for(const burst of this.fieldBursts){
        const s=this.cam.w2s(burst.x, burst.y);
        const t=burst.maxLife>0 ? (burst.life / burst.maxLife) : 0;
        const col = burst.color === "viral" ? `rgba(120,255,150,${0.28 + 0.58*t})` : burst.color === "warn" ? `rgba(255,90,90,${0.18 + 0.52*t})` : `rgba(255,255,255,${0.14 + 0.32*t})`;
        const r = burst.radius ? burst.radius * (1.18 - 0.18*t) : ((1 - t) * 22 + 8);
        g.strokeStyle = col;
        g.lineWidth = burst.color === "viral" ? 3 : 2;
        g.beginPath(); g.arc(s.x, s.y, r, 0, Math.PI*2); g.stroke();
        g.fillStyle = burst.color === "viral" ? `rgba(90,255,125,${0.22 + 0.36*t})` : `rgba(255,255,255,${0.10 + 0.18*t})`;
        g.beginPath(); g.arc(s.x, s.y, Math.max(3, r*0.42), 0, Math.PI*2); g.fill();
      }
      for(const p of this.popupTexts){
        const s=this.cam.w2s(p.x, p.y);
        const t=p.maxLife>0 ? (p.life/p.maxLife) : 0;
        const alpha = Math.max(0, Math.min(1, 0.18 + 0.82*t));
        const outline = this.theme.mode===ThemeMode.DARK ? `rgba(8,12,20,${alpha})` : `rgba(248,251,255,${alpha})`;
        const fill = this.theme.mode===ThemeMode.DARK ? `rgba(255,244,180,${alpha})` : `rgba(133,21,46,${alpha})`;
        const tx = (s.x - (p.text.length * 3))|0;
        const ty = (s.y)|0;
        this.drawPixelText(g, p.text, tx-1, ty, 1, outline);
        this.drawPixelText(g, p.text, tx+1, ty, 1, outline);
        this.drawPixelText(g, p.text, tx, ty-1, 1, outline);
        this.drawPixelText(g, p.text, tx, ty+1, 1, outline);
        this.drawPixelText(g, p.text, tx, ty, 1, fill);
      }
      for(const b of this.bullets) b.draw(g,this.cam);
      for(const ep of this.enemyProjectiles) ep.draw(g,this.cam);

      for(const e of this.enemies){
        if(e instanceof BossEnemy) e.draw(g,this.cam,this.theme);
        else e.draw(g,this.cam);
      }

      for (const group of (this.dooBossGroups || [])) {
        const bosses = (group?.bosses || []).filter(b=>b && !b.dead);
        if (bosses.length < 2) continue;
        const a = bosses[0], b = bosses[1];
        const s1=this.cam.w2s(a.x,a.y), s2=this.cam.w2s(b.x,b.y);
        let alpha = 0, width = Number(a.tetherWidth||8);
        if (group.tetherState === 'warnIn') alpha = 0.18 + 0.30*Math.sin(group.tetherTimer*30);
        else if (group.tetherState === 'active') alpha = 0.55;
        else if (group.tetherState === 'warnOut') alpha = 0.10 + 0.24*Math.sin(group.tetherTimer*34);
        if (alpha > 0) {
          g.save();
          g.strokeStyle = `rgba(255,70,70,${alpha})`; g.lineWidth = width+2; g.beginPath(); g.moveTo(s1.x,s1.y); g.lineTo(s2.x,s2.y); g.stroke();
          g.strokeStyle = `rgba(255,245,180,${alpha*0.8})`; g.lineWidth = Math.max(2, width*0.38); g.beginPath(); g.moveTo(s1.x,s1.y); g.lineTo(s2.x,s2.y); g.stroke();
          g.restore();
        }
      }

      for(const c of this.coins) c.draw(g,this.cam);
      for(const pu of this.powerups) pu.draw(g,this.cam,this.theme);
      for(const ch of this.chests) ch.draw(g,this.cam,this.theme);

      for(const tr of (this.player?.advocateTrails || [])) {
        const a = Math.max(0, tr.life / tr.maxLife);
        let fill = "rgba(120,180,255,"+ (0.28*a) +")";
        if (tr.effectId === "fuel_tank") fill = "rgba(255,120,0,"+(0.30*a)+")";
        else if (tr.effectId === "referral_surge") fill = "rgba(255,232,90,"+(0.30*a)+")";
        if (tr.kind === "segment") {
          const s1=this.cam.w2s(tr.x1,tr.y1), s2=this.cam.w2s(tr.x2,tr.y2);
          g.save();
          g.strokeStyle = fill;
          g.lineWidth = Math.max(4, Number(tr.width) || 8);
          g.lineCap = "butt";
          g.beginPath(); g.moveTo(s1.x,s1.y); g.lineTo(s2.x,s2.y); g.stroke();
          if (tr.effectId === "referral_surge") {
            g.strokeStyle = "rgba(255,255,210,"+(0.22*a)+")";
            g.lineWidth = Math.max(1, (Number(tr.width) || 8) * 0.28);
            g.beginPath(); g.moveTo(s1.x,s1.y); g.lineTo(s2.x,s2.y); g.stroke();
          }
          g.restore();
        } else {
          const s=this.cam.w2s(tr.x,tr.y);
          const rr = Math.max(3, Math.round(tr.radius || (8 * (tr.widthMult||1))));
          g.fillStyle = fill;
          g.beginPath(); g.arc(s.x,s.y,rr,0,Math.PI*2); g.fill();
        }
      }

      for (const arc of (this.surgeArcs || [])) {
        const s1=this.cam.w2s(arc.x1,arc.y1), s2=this.cam.w2s(arc.x2,arc.y2);
        const a = Math.max(0, arc.life / arc.maxLife);
        const mx = (s1.x + s2.x) * 0.5 + rand(-5,5);
        const my = (s1.y + s2.y) * 0.5 + rand(-5,5);
        g.save();
        g.strokeStyle = "rgba(255,235,90," + (0.85*a) + ")";
        g.lineWidth = 2.2;
        g.beginPath(); g.moveTo(s1.x,s1.y); g.lineTo(mx,my); g.lineTo(s2.x,s2.y); g.stroke();
        g.strokeStyle = "rgba(255,255,255," + (0.55*a) + ")";
        g.lineWidth = 1.0;
        g.beginPath(); g.moveTo(s1.x,s1.y); g.lineTo(mx,my); g.lineTo(s2.x,s2.y); g.stroke();
        g.restore();
      }

      this.player.draw(g,this.cam,this.theme);

      for(const o of this.orbitals) o.draw(g,this.cam,this.player,this.time,this.theme);

      this.drawHUD(g);
      this.drawTopRightControls(g);
    }

    drawHUD(g) {
      const p=this.player;

      const x=12,y=12,w=200,h=10;
      const t=p.budget/p.maxBudget;
      g.fillStyle=this.theme.hudTrack;
      g.fillRect(x-2,y-2,w+4,h+4);
      g.fillStyle="rgba(0,0,0,0.30)";
      g.fillRect(x,y,w,h);
      g.fillStyle="#e5484d";
      g.fillRect(x,y,Math.floor(w*t),h);

      g.font=CFG.ui.small;
      g.fillStyle=this.theme.text;
      g.fillText(`Budget: ${Math.ceil(p.budget)}/${p.maxBudget}`, x, y+22);
      const activeBoss = this.enemies.find(e => !e.dead && (e instanceof BossEnemy || e.enemyTypeId === "phase2_boss" || e.enemyTypeId === "phase3_boss" || e.enemyTypeId === "boss1"));
      const activeDooOpoly = this.enemies.find(e => !e.dead && e.enemyTypeId === "phase3_boss" && e.sharedBoss && e.sharedBoss.maxHp);
      if (activeDooOpoly?.sharedBoss) {
        const sb = activeDooOpoly.sharedBoss;
        const title = sb.titleText || activeDooOpoly.titleText || "Boss: Doo-Opoly";
        const labelX = x;
        const labelY = y + 36;
        const bw2 = 170, bh2 = 10;
        const titleW = Math.ceil(g.measureText(title).width);
        const bx2 = labelX + titleW + 10;
        const by2 = labelY - 8;
        const bt = clamp((sb.hp || 0) / Math.max(1, sb.maxHp || 1), 0, 1);
        g.fillStyle = this.theme.text2;
        g.fillText(title, labelX, labelY);
        g.fillStyle = this.theme.hudTrack;
        g.fillRect(bx2 - 2, by2 - 2, bw2 + 4, bh2 + 4);
        g.fillStyle = "rgba(0,0,0,0.45)";
        g.fillRect(bx2, by2, bw2, bh2);
        g.fillStyle = "#d92d2d";
        g.fillRect(bx2, by2, Math.floor(bw2 * bt), bh2);
        g.strokeStyle = "rgba(255,255,255,0.18)";
        g.lineWidth = 1;
        g.strokeRect(bx2 + 0.5, by2 + 0.5, bw2 - 1, bh2 - 1);
      } else if (activeBoss?.titleText) {
        g.fillStyle=this.theme.text2;
        g.fillText(activeBoss.titleText, x, y+36);
      }

      const mm=Math.floor(this.time/60);
      const ss=Math.floor(this.time%60).toString().padStart(2,"0");
      g.fillStyle=this.theme.text2;
      g.fillText(`Time: ${mm}:${ss}`, CFG.logicalW-122, 40);
      g.fillText(`Score: ${this.score}`, CFG.logicalW-122, 54);

      const bx=12, by=CFG.logicalH-18, bw=320, bh=6;
      const xt=this.xp/this.xpNeed;
      g.fillStyle=this.theme.hudTrack;
      g.fillRect(bx,by,bw,bh);
      g.fillStyle=this.theme.xpFill;
      g.fillRect(bx,by,Math.floor(bw*xt),bh);

      g.fillStyle=this.theme.text2;
      g.fillText("Space: Pause", CFG.logicalW-122, CFG.logicalH-12);
    }

    drawTopRightControls(g) {
      const s=this.soundRect();
      const m=this.modeRect();

      g.fillStyle=this.theme.panel;
      g.fillRect(s.x, s.y, s.w, s.h);
      g.fillStyle=this.theme.border;
      g.fillRect(s.x, s.y, s.w, 1); g.fillRect(s.x, s.y+s.h-1, s.w, 1);
      g.fillRect(s.x, s.y, 1, s.h); g.fillRect(s.x+s.w-1, s.y, 1, s.h);

      g.fillStyle=this.theme.panel;
      g.fillRect(m.x, m.y, m.w, m.h);
      g.fillStyle=this.theme.border;
      g.fillRect(m.x, m.y, m.w, 1); g.fillRect(m.x, m.y+m.h-1, m.w, 1);
      g.fillRect(m.x, m.y, 1, m.h); g.fillRect(m.x+m.w-1, m.y, 1, m.h);

      const mutedNow = !this.sfx.enabled;
      this.drawAudioIcon(g, s.x, s.y, !mutedNow);

      g.font = CFG.ui.small;
      g.fillStyle = this.theme.text;
      const label = (this.themeMode===ThemeMode.DARK) ? "Dark Mode" : "Light Mode";
      g.fillText(label, m.x+10, m.y+13);
    }

    drawAudioIcon(g, x, y, isAudible) {

      g.fillRect(x+3,y+7,3,4);
      g.fillRect(x+6,y+6,2,6);

        g.fillRect(x+3,y+14,2,2);
        g.fillRect(x+5,y+12,2,2);
        g.fillRect(x+7,y+10,2,2);
        g.fillRect(x+9,y+8, 2,2);
        g.fillRect(x+11,y+6,2,2);

    drawTitleScreen(g) {
      this.drawBackground(g);
      g.fillStyle=(this.themeMode===ThemeMode.DARK) ? "rgba(0,0,0,0.48)" : "rgba(255,255,255,0.42)";
      g.fillRect(0,0,CFG.logicalW,CFG.logicalH);

      this._drawTitleAds(g);

      const isDark = this.themeMode===ThemeMode.DARK;
      const title = "Adpocalypse Survivor";
      const subtitle = "There are too many ads -- and they're trying to drain your budget! Choose a hero and fight back with the power of partnerships.";
      const glitch = this._titleGlitch();
      const titleMain = isDark ? "rgba(255,255,255,0.98)" : "rgba(8,12,18,0.96)";
      const titleWarm = isDark ? "rgba(247,115,0,0.38)" : "rgba(247,115,0,0.44)";
      const titleCool = isDark ? "rgba(41,141,218,0.55)" : "rgba(41,141,218,0.48)";
      const infoPanel = isDark ? "rgba(8,12,18,0.64)" : "rgba(255,255,255,0.72)";
      const infoBorder = isDark ? "rgba(255,255,255,0.14)" : "rgba(0,0,0,0.12)";
      const subColor = isDark ? "rgba(255,255,255,0.84)" : "rgba(8,12,18,0.82)";
      const bulletColor = isDark ? "rgba(255,255,255,0.78)" : "rgba(8,12,18,0.78)";

      const titleScale = 4;
      const titleW = this.pixelTextWidth(title, titleScale);
      const tx = Math.floor((CFG.logicalW - titleW) / 2);
      const ty = Math.floor(CFG.logicalH * 0.30);

      const panelX = 34;
      const panelY = Math.floor(CFG.logicalH * 0.46);
      const panelW = CFG.logicalW - 68;
      const panelH = 88;
      g.fillStyle = infoPanel;
      g.fillRect(panelX, panelY, panelW, panelH);
      g.fillStyle = infoBorder;
      g.fillRect(panelX, panelY, panelW, 1); g.fillRect(panelX, panelY+panelH-1, panelW, 1);
      g.fillRect(panelX, panelY, 1, panelH); g.fillRect(panelX+panelW-1, panelY, 1, panelH);

      this.drawPixelText(g, title, tx + glitch.shadowX, ty + glitch.shadowY, titleScale, titleWarm);
      this.drawPixelText(g, title, tx + glitch.blueX, ty + glitch.blueY, titleScale, titleCool);
      this.drawPixelText(g, title, tx, ty, titleScale, titleMain);

      const subtitleScale = 1;
      const lines = this.wrapPixelText(subtitle, panelW - 24, subtitleScale);
      let sy = panelY + 12;
      for (const line of lines) {
        const lw = this.pixelTextWidth(line, subtitleScale);
        const lx = Math.floor((CFG.logicalW - lw) / 2);
        this.drawPixelText(g, line, lx, sy, subtitleScale, subColor);
        sy += 12;
      }

      const bullets = [
        "- Defeat ads, collect coins, and upgrade your partnerships",
        "- Move with WASD/arrow keys",
        "- Press space to pause"
      ];
      let by = sy + 8;
      for (const line of bullets) {
        this.drawPixelText(g, line, panelX + 12, by, 1, bulletColor);
        by += 12;
      }

      const b=this.titleStartRect();
      const m=this.surf.mouseToLogical(this.input);
      const hover=m.x>=b.x&&m.x<=b.x+b.w&&m.y>=b.y&&m.y<=b.y+b.h;
      const pulse = 0.5 + 0.5*Math.sin(this.titleStartPulse*3.0);
      g.fillStyle = hover ? this.theme.btnH : (isDark ? `rgba(41,141,218,${0.24 + pulse*0.18})` : `rgba(41,141,218,${0.22 + pulse*0.12})`);
      g.fillRect(b.x,b.y,b.w,b.h);
      g.fillStyle = this.theme.border;
      g.fillRect(b.x,b.y,b.w,1); g.fillRect(b.x,b.y+b.h-1,b.w,1);
      g.fillRect(b.x,b.y,1,b.h); g.fillRect(b.x+b.w-1,b.y,1,b.h);
      const startLabel = "Start";
      const sw = this.pixelTextWidth(startLabel, 2);
      this.drawPixelText(g, startLabel, Math.floor(b.x + (b.w-sw)/2), b.y + 8, 2, titleMain);

      this.drawTopRightControls(g);
    }

    drawMenu(g) {
      this.drawBackground(g);
      g.fillStyle=(this.themeMode===ThemeMode.DARK) ? "rgba(0,0,0,0.55)" : "rgba(255,255,255,0.55)";
      g.fillRect(0,0,CFG.logicalW,CFG.logicalH);

      g.font=CFG.ui.title;
      g.fillStyle=this.theme.text;
      g.fillText("CHOOSE YOUR HERO", 18, 34);

      // Slightly smaller instruction text to preserve space for the top-right Play button.
      g.font=CFG.ui.tiny;
      g.fillStyle=this.theme.text2;
      g.fillText("Pick a hero and click start to begin.", 18, 52);

      const m=this.surf.mouseToLogical(this.input);
      g.font=CFG.ui.font;

      const cards=this.menuCards();
      for(let i=0;i<HEROES.length;i++){
        const hero=HEROES[i];
        const r=cards[i];
        const sel=i===this.selectedHero;
        const hover=m.x>=r.x&&m.x<=r.x+r.w&&m.y>=r.y&&m.y<=r.y+r.h;
        const locked=!!hero.locked;

        g.fillStyle = locked ? "rgba(255,255,255,0.03)"
          : sel ? (hover ? this.theme.btnH : this.theme.btn)
          : (hover ? "rgba(255,255,255,0.10)" : this.theme.panel);
        g.fillRect(r.x,r.y,r.w,r.h);

        g.fillStyle=this.theme.border;
        g.fillRect(r.x,r.y,r.w,1); g.fillRect(r.x,r.y+r.h-1,r.w,1);
        g.fillRect(r.x,r.y,1,r.h); g.fillRect(r.x+r.w-1,r.y,1,r.h);

        g.fillStyle = locked ? this.theme.text2 : this.theme.text;
        g.fillText(hero.name + (locked ? " (Locked)" : ""), r.x+10, r.y+20);

        g.fillStyle = this.theme.text2;
        g.fillText(hero.subtitle, r.x+10, r.y+38);
        g.fillText(`Budget: ${hero.maxBudget}`, r.x+10, r.y+56);
      }

      const b=this.menuPlayRect();
      const bh=m.x>=b.x&&m.x<=b.x+b.w&&m.y>=b.y&&m.y<=b.y+b.h;
      const hero=HEROES[this.selectedHero];
      const locked=!!hero.locked;

      g.fillStyle = locked ? this.theme.panel : (bh ? this.theme.btnH : this.theme.btn);
      g.fillRect(b.x,b.y,b.w,b.h);
      g.fillStyle=this.theme.border;
      g.fillRect(b.x,b.y,b.w,1); g.fillRect(b.x,b.y+b.h-1,b.w,1);
      g.fillRect(b.x,b.y,1,b.h); g.fillRect(b.x+b.w-1,b.y,1,b.h);
      // Label (centered)
      g.fillStyle = locked ? this.theme.text2 : this.theme.text;
      const label = locked ? "LOCKED" : "START";
      const tw = g.measureText(label).width;
      g.fillText(label, (b.x + (b.w - tw)/2)|0, b.y+13);

      this.drawTopRightControls(g);
    }

    drawChoiceOverlay(g, title, subtitle, choices) {
      const bg = (this.themeMode===ThemeMode.DARK) ? "rgba(0,0,0,0.60)" : "rgba(255,255,255,0.70)";
      g.fillStyle=bg;
      g.fillRect(0,0,CFG.logicalW,CFG.logicalH);

      const k = this.overlayAnim;
      const ease = 1 - Math.pow(1-k, 3);
      const scale = 0.92 + 0.08*ease;
      const alpha = 0.5 + 0.5*ease;

      g.save();
      g.globalAlpha = alpha;
      g.translate(CFG.logicalW/2, CFG.logicalH/2);
      g.scale(scale, scale);
      g.translate(-CFG.logicalW/2, -CFG.logicalH/2);

      g.font=CFG.ui.title;
      g.fillStyle="#ffd24a";
      g.fillText(title, 18, 52);

      g.font=CFG.ui.font;
      g.fillStyle=this.theme.text2;
      g.fillText(subtitle, 18, 72);

      const rects=this.choiceRects(choices.length, 86);
      const m=this.surf.mouseToLogical(this.input);

      for(let i=0;i<rects.length;i++){
        const u=choices[i];
        const r=rects[i];
        const hover=m.x>=r.x&&m.x<=r.x+r.w&&m.y>=r.y&&m.y<=r.y+r.h;

        g.fillStyle = hover ? this.theme.btnH : this.theme.panel;
        g.fillRect(r.x,r.y,r.w,r.h);

        g.fillStyle=this.theme.border;
        g.fillRect(r.x,r.y,r.w,1); g.fillRect(r.x,r.y+r.h-1,r.w,1);
        g.fillRect(r.x,r.y,1,r.h); g.fillRect(r.x+r.w-1,r.y,1,r.h);

        const isCard = (u.kind === "upgrade" || u.kind === "modifier" || u.kind === "weapon_upgrade" || u.kind === "advocate_stat_choice" || u.kind === "advocate_shape_offer" || u.kind === "advocate_effect_offer" || u.kind === "creator_strategy_offer" || u.kind === "creator_behavior_offer");
        const titleFont = isCard ? CFG.ui.upTitle : CFG.ui.font;
        const descFont = isCard ? CFG.ui.upDesc : CFG.ui.small;
        const flavorFont = isCard ? CFG.ui.upFlavor : CFG.ui.tiny;
        const descLineH = isCard ? CFG.ui.upDescLineH : 12;
        const flavorLineH = isCard ? CFG.ui.upFlavorLineH : 11;

        // Title (top)
        g.fillStyle=this.theme.text;
        g.font=titleFont;
        g.fillText(u.name, r.x+10, r.y+20);

        // Description (middle)
        g.fillStyle=this.theme.text2;
        g.font=descFont;
        this.drawWrappedText(g, u.desc || "", r.x+10, r.y+38, r.w-20, descLineH);

        // Flavor (bottom)
        if (u.flavor) {
          g.fillStyle=this.theme.text2;
          g.font=flavorFont;
          const flines = this.wrapLines(g, u.flavor, r.w-20);
          const fy = (r.y + r.h - 10) - (flines.length - 1) * flavorLineH;
          for (let i=0;i<flines.length;i++) g.fillText(flines[i], r.x+10, fy + i*flavorLineH);
        }
      }

      g.restore();
      this.drawTopRightControls(g);
    }

    drawWrappedText(g, text, x, y, maxW, lineH) {
      const words=text.split(" ");
      let line="";
      for(let i=0;i<words.length;i++){
        const test=line?line+" "+words[i]:words[i];
        if(g.measureText(test).width>maxW && line){
          g.fillText(line,x,y);
          line=words[i];
          y+=lineH;
        } else line=test;
      }
      if(line) g.fillText(line,x,y);
    }


    wrapLines(g, text, maxW) {
      const words = String(text||"").split(" ");
      const lines = [];
      let line = "";
      for (let i=0;i<words.length;i++){
        const test = line ? line + " " + words[i] : words[i];
        if (g.measureText(test).width > maxW && line) {
          lines.push(line);
          line = words[i];
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    titleStartRect(){
      const w=112, h=28;
      return { x: Math.floor((CFG.logicalW-w)/2), y: Math.floor(CFG.logicalH*0.80), w, h };
    }

    _buildTitleAds(){
      const labels = ["BUY NOW", "LIMITED OFFER", "CLICK HERE", "SPONSORED", "WE SEE YOU", "CONVERT", "AUTO-PLAY"];
      this.titleAds = [];
      const count = 16;
      for(let i=0;i<count;i++){
        const side = i % 4;
        const w = 44 + (i % 3) * 10;
        const h = 14 + (i % 2) * 6;
        let x=0,y=0, vx=0, vy=0;
        if(side===0){ x = rand(-60, 8); y = rand(0, CFG.logicalH-h); vx = rand(3, 8); vy = rand(-1.5,1.5); }
        else if(side===1){ x = rand(CFG.logicalW-8, CFG.logicalW+60); y = rand(0, CFG.logicalH-h); vx = -rand(3, 8); vy = rand(-1.5,1.5); }
        else if(side===2){ x = rand(0, CFG.logicalW-w); y = rand(-40, 8); vx = rand(-1.5,1.5); vy = rand(3, 7); }
        else { x = rand(0, CFG.logicalW-w); y = rand(CFG.logicalH-8, CFG.logicalH+40); vx = rand(-1.5,1.5); vy = -rand(3, 7); }
        this.titleAds.push({
          x,y,w,h,vx,vy,label:labels[i%labels.length],t:rand(0,Math.PI*2),side
        });
      }
    }

    _updateTitleAds(dt){
      const safeX1 = 90, safeX2 = CFG.logicalW - 90;
      const safeY1 = 56, safeY2 = CFG.logicalH - 56;
      for(const ad of this.titleAds){
        ad.t += dt;
        ad.x += ad.vx * dt;
        ad.y += ad.vy * dt;
        ad.x += Math.sin(ad.t*1.7) * 3 * dt;
        ad.y += Math.cos(ad.t*1.3) * 3 * dt;
        const overlapsSafe = !(ad.x + ad.w < safeX1 || ad.x > safeX2 || ad.y + ad.h < safeY1 || ad.y > safeY2);
        if (overlapsSafe) {
          if (ad.side===0 || ad.side===1) ad.vx *= -1;
          else ad.vy *= -1;
          ad.x += ad.vx * dt * 6;
          ad.y += ad.vy * dt * 6;
        }
        if (ad.x < -80 || ad.x > CFG.logicalW + 80 || ad.y < -50 || ad.y > CFG.logicalH + 50) {
          if(ad.side===0){ ad.x = rand(-60, 4); ad.y = rand(0, CFG.logicalH-ad.h); }
          else if(ad.side===1){ ad.x = rand(CFG.logicalW-4, CFG.logicalW+60); ad.y = rand(0, CFG.logicalH-ad.h); }
          else if(ad.side===2){ ad.x = rand(0, CFG.logicalW-ad.w); ad.y = rand(-40, 4); }
          else { ad.x = rand(0, CFG.logicalW-ad.w); ad.y = rand(CFG.logicalH-4, CFG.logicalH+40); }
        }
      }
    }

    _drawTitleAds(g){
      const isDark = this.themeMode===ThemeMode.DARK;
      for(const ad of this.titleAds){
        const alpha = 0.18 + 0.08 * (0.5 + 0.5*Math.sin(ad.t*2.1));
        if (isDark) {
          g.fillStyle = `rgba(255,255,255,${alpha})`;
          g.fillRect(ad.x|0, ad.y|0, ad.w|0, ad.h|0);
          g.fillStyle = `rgba(0,0,0,${Math.min(0.55, alpha+0.14)})`;
          g.fillRect((ad.x+2)|0, (ad.y+2)|0, Math.max(10,(ad.w-4)|0), Math.max(6,(ad.h-4)|0));
          g.fillStyle = `rgba(255,255,255,${Math.min(0.72, alpha+0.22)})`;
          g.fillRect((ad.x+2)|0, (ad.y+2)|0, Math.max(8,Math.floor(ad.w*0.18)), 2);
          this.drawPixelText(g, ad.label, (ad.x+5)|0, (ad.y+6)|0, 1, `rgba(255,255,255,${Math.min(0.88, alpha+0.30)})`);
        } else {
          g.fillStyle = `rgba(8,12,18,${Math.min(0.20, alpha+0.02)})`;
          g.fillRect(ad.x|0, ad.y|0, ad.w|0, ad.h|0);
          g.fillStyle = `rgba(255,255,255,${Math.min(0.74, alpha+0.28)})`;
          g.fillRect((ad.x+2)|0, (ad.y+2)|0, Math.max(10,(ad.w-4)|0), Math.max(6,(ad.h-4)|0));
          g.fillStyle = `rgba(247,115,0,${Math.min(0.36, alpha+0.08)})`;
          g.fillRect((ad.x+2)|0, (ad.y+2)|0, Math.max(8,Math.floor(ad.w*0.18)), 2);
          this.drawPixelText(g, ad.label, (ad.x+5)|0, (ad.y+6)|0, 1, `rgba(8,12,18,${Math.min(0.72, alpha+0.26)})`);
        }
      }
    }

    _titleGlitch(){
      const kick = Math.random() < 0.08;
      return {
        shadowX: kick ? randi(-1,1) : 1,
        shadowY: 1,
        blueX: kick ? randi(-2,2) : -1,
        blueY: kick ? randi(-1,1) : 0,
      };
    }

    pixelTextWidth(text, scale=1){
      return [...String(text)].reduce((sum,ch)=> sum + ((ch === ' ') ? 4 : 6) * scale, 0);
    }

    wrapPixelText(text, maxW, scale=1){
      const words = String(text).split(/\s+/);
      const lines = [];
      let line = "";
      for(const word of words){
        const test = line ? line + " " + word : word;
        if (this.pixelTextWidth(test, scale) > maxW && line) {
          lines.push(line);
          line = word;
        } else line = test;
      }
      if(line) lines.push(line);
      return lines;
    }

    drawPixelText(g, text, x, y, scale=1, color="#f8fbff"){
      let cx = x|0;
      for(const ch of String(text)){
        if(ch === ' '){ cx += 4*scale; continue; }
        this.drawPixelChar(g, ch, cx, y, scale, color);
        cx += 6*scale;
      }
    }

    drawPixelChar(g, ch, x, y, scale=1, color="#f8fbff"){
      const glyphs = this.constructor.PIXEL_FONT || (this.constructor.PIXEL_FONT = {
        'A':['01110','10001','10001','11111','10001','10001','10001'],
        'B':['11110','10001','11110','10001','10001','10001','11110'],
        'C':['01111','10000','10000','10000','10000','10000','01111'],
        'D':['11110','10001','10001','10001','10001','10001','11110'],
        'E':['11111','10000','11110','10000','10000','10000','11111'],
        'F':['11111','10000','11110','10000','10000','10000','10000'],
        'G':['01111','10000','10000','10111','10001','10001','01111'],
        'H':['10001','10001','11111','10001','10001','10001','10001'],
        'I':['11111','00100','00100','00100','00100','00100','11111'],
        'J':['00111','00010','00010','00010','00010','10010','01100'],
        'K':['10001','10010','11100','10010','10010','10001','10001'],
        'L':['10000','10000','10000','10000','10000','10000','11111'],
        'M':['10001','11011','10101','10101','10001','10001','10001'],
        'N':['10001','11001','10101','10011','10001','10001','10001'],
        'O':['01110','10001','10001','10001','10001','10001','01110'],
        'P':['11110','10001','10001','11110','10000','10000','10000'],
        'Q':['01110','10001','10001','10001','10101','10010','01101'],
        'R':['11110','10001','10001','11110','10010','10001','10001'],
        'S':['01111','10000','10000','01110','00001','00001','11110'],
        'T':['11111','00100','00100','00100','00100','00100','00100'],
        'U':['10001','10001','10001','10001','10001','10001','01110'],
        'V':['10001','10001','10001','10001','10001','01010','00100'],
        'W':['10001','10001','10001','10101','10101','10101','01010'],
        'X':['10001','10001','01010','00100','01010','10001','10001'],
        'Y':['10001','10001','01010','00100','00100','00100','00100'],
        'Z':['11111','00001','00010','00100','01000','10000','11111'],
        '0':['01110','10001','10011','10101','11001','10001','01110'],
        '1':['00100','01100','00100','00100','00100','00100','01110'],
        '2':['01110','10001','00001','00010','00100','01000','11111'],
        '3':['11110','00001','00001','01110','00001','00001','11110'],
        '4':['00010','00110','01010','10010','11111','00010','00010'],
        '5':['11111','10000','10000','11110','00001','00001','11110'],
        '6':['01110','10000','10000','11110','10001','10001','01110'],
        '7':['11111','00001','00010','00100','01000','01000','01000'],
        '8':['01110','10001','10001','01110','10001','10001','01110'],
        '9':['01110','10001','10001','01111','00001','00001','01110'],
        '!':['00100','00100','00100','00100','00100','00000','00100'],
        '.':['00000','00000','00000','00000','00000','00000','00100'],
        ',':['00000','00000','00000','00000','00000','00100','01000'],
        '\\':['10000','01000','00100','00010','00001','00000','00000'],
        '/':['00001','00010','00100','01000','10000','00000','00000'],
        '-':['00000','00000','00000','11111','00000','00000','00000'],
        ':':['00000','00100','00000','00000','00100','00000','00000'],
        "'":['00100','00100','00000','00000','00000','00000','00000'],
        '?':['01110','10001','00001','00010','00100','00000','00100'],
      });
      const key = String(ch).toUpperCase();
      const glyph = glyphs[key] || glyphs['?'];
      g.fillStyle = color;
      for(let row=0; row<glyph.length; row++){
        const line = glyph[row];
        for(let col=0; col<line.length; col++){
          if(line[col] === '1') g.fillRect(x + col*scale, y + row*scale, scale, scale);
        }
      }
    }

    choiceRects(count, h){
      const pad=18;
      const gap=12;
      const y = 120;
      if (count <= 1) {
        const w = CFG.logicalW - pad*2;
        return [{ x: pad, y, w, h }];
      }
      const avail = CFG.logicalW - pad*2 - gap*(count-1);
      const w = Math.floor(avail / count);
      return Array.from({length:count}, (_,i)=>({ x: pad + i*(w+gap), y, w, h }));
    }

    menuCards(){
      const x=18,y=70,w=CFG.logicalW-36,h=66,gap=8;
      return HEROES.map((_,i)=>({x,y:y+i*(h+gap),w,h}));
    }

    menuPlayRect(){
      return this.playRectTop_();
    }
    // ========= Dev helpers =========
        devTogglePanel(on) { this.dev.enabled = !!on; }
        devSetTimescale(v) { this.dev.timeScale = clamp(Number(v) || 1, 0.05, 20); }
        devSetInvuln(on) { this.dev.invulnerable = !!on; if (this.player) this.player.invuln = this.dev.invulnerable; }

        devSpawnBoss(which="boss") {
          if (!this.player) return false;
          try {
            if (this.state === State.MENU || this.state === State.DEAD) return false;
            if (this.bossActive) {
              this.enemies = this.enemies.filter(e => !(e instanceof BossEnemy));
              this.bossActive = false;
            }
            this.phaseBossSpawned = false;
            return this.spawnPhaseBoss();
          } catch (err) {
            console.error("Dev boss spawn failed", err);
            this.bossActive = false;
            return false;
          }
        }

        devSpawnDrop(which="coin_small") {
          if (!this.player) return;
          const p=this.player;
          if (which === "coin_small") this.coins.push(new Coin(p.x+rand(-6,6), p.y+rand(-6,6), BALANCE.XP.coinXp, false));
          else if (which === "coin_big") this.coins.push(new Coin(p.x+rand(-6,6), p.y+rand(-6,6), 3, true));
          else if (which === "chest") this.chests.push(new Chest(p.x+rand(-6,6), p.y+rand(-6,6)));
          else if (which === "powerup_heal") this.powerups.push(new Powerup(p.x+rand(-6,6), p.y+rand(-6,6), 'heal'));
          else if (which === "powerup_magnet") this.powerups.push(new Powerup(p.x+rand(-6,6), p.y+rand(-6,6), 'magnet'));
          else if (which === "powerup_shield") this.powerups.push(new Powerup(p.x+rand(-6,6), p.y+rand(-6,6), 'shield'));
          else if (which === "powerup_barrage") this.powerups.push(new Powerup(p.x+rand(-6,6), p.y+rand(-6,6), 'barrage'));
        }

        devForceLevelUp() {
          if (!this.player) return;
          this.addXp(this.xpNeed);
        }

        devClearEnemies() {
          this.enemies.length = 0;
          this.bullets.length = 0;
          this.fields.length = 0;
          this.fieldBursts.length = 0;
          this.powerups.length = 0;
          this._delayedShots.length = 0;
          this.bossActive = false;
          this.lull = false;
        }

        devJumpToNextBoss() {
          // Push time forward to just before next boss trigger (keeps schedule intact)
          if (!this.player) return;
          const targetPhaseTime = Math.max(0, this.nextBossAt - 0.2);
          if (this.phaseTime < targetPhaseTime) {
            this.time += (targetPhaseTime - this.phaseTime);
            this.phaseTime = targetPhaseTime;
          }
          this.lull = false;
        }

        devTestBossPhase(phaseNumber=1) {
          const phaseIdx = clamp((Number(phaseNumber) || 1) - 1, 0, (CFG.enemies?.phases?.length || 1) - 1);
          try {
            if (this.state === State.TITLE || this.state === State.MENU || this.state === State.DEAD || !this.player) {
              const hero = HEROES[this.selectedHero] || HEROES[0];
              this.startRun(hero);
            }
            this.state = State.PLAY;
            this.player.invuln = !!this.dev.invulnerable;
            this.player.budget = this.player.maxBudget;
            this.player.iFrame = 0;
            this.player.x = 0; this.player.y = 0; this.player.vx = 0; this.player.vy = 0;
            this.cam.x = this.player.x; this.cam.y = this.player.y;

            this.enemies.length = 0;
            this.bullets.length = 0;
            this.enemyProjectiles.length = 0;
            this.enemyMarkers.length = 0;
            this.fields.length = 0;
            this.fieldBursts.length = 0;
            this.popupTexts.length = 0;
            this.gardenPatches.length = 0;
            this.gardenWalls.length = 0;
            this.bossGardenWalls.length = 0;
            this.surgeArcs.length = 0;
            this.dooBossGroups.length = 0;
            this._delayedShots.length = 0;

            this.phaseIndex = phaseIdx;
            this.resetPhaseRuntime();
            this.phaseTime = this.nextBossAt;
            this.phaseBossSpawned = false;
            this.bossActive = false;
            this.lull = false;
            this.lullUntil = 0;
            return this.spawnPhaseBoss();
          } catch (err) {
            console.error('Dev boss test failed', err);
            return false;
          }
        }




  }

  
    // ========= Boot =========
  const canvas=document.getElementById("game");
  const gameWrap=document.getElementById("gameWrap");
  const surface=new Surface(canvas, gameWrap);
  const input=new Input();
  const game=new Game(surface,input);

  // ========= Dev panel wiring =========
  const devPanelEl = document.getElementById("devPanel");
  const devBuildEl = document.getElementById("devBuild");
  const devLevelEl = document.getElementById("devLevel");
  const tsRangeEl = document.getElementById("devTimescale");
  const tsLabelEl = document.getElementById("devTimescaleLabel");
  const invulnEl = document.getElementById("devInvuln");
  const bossSelEl = document.getElementById("devBossSelect");
  const dropSelEl = document.getElementById("devDropSelect");

  function setDevPanelVisible_(on) {
    const visible = !!on;
    devPanelEl.classList.toggle("hidden", !visible);
    game.devTogglePanel(visible);
    // Recompute scale because available width changes
    surface.resize();
  }

  // F1 toggles dev panel
  window.addEventListener("keydown", (e) => {
    if (e.key === "F1") {
      e.preventDefault();
      setDevPanelVisible_(devPanelEl.classList.contains("hidden"));
    }
  });

  // Control bindings
  devBuildEl.textContent = game.buildVersion;

  tsRangeEl.addEventListener("input", () => {
    const v = Number(tsRangeEl.value);
    game.devSetTimescale(v);
    tsLabelEl.textContent = v.toFixed(2).replace(/\.00$/,"") + "×";
  });

  invulnEl.addEventListener("change", () => game.devSetInvuln(invulnEl.checked));

  document.getElementById("devSpawnBossBtn").addEventListener("click", () => game.devSpawnBoss(bossSelEl.value));
  document.getElementById("devSpawnDropBtn").addEventListener("click", () => game.devSpawnDrop(dropSelEl.value));
  document.getElementById("devForceLevelUpBtn").addEventListener("click", () => game.devForceLevelUp());
  document.getElementById("devClearEnemiesBtn").addEventListener("click", () => game.devClearEnemies());
  document.getElementById("devJumpBossBtn").addEventListener("click", () => game.devJumpToNextBoss());
  document.getElementById("devTestBoss1Btn").addEventListener("click", () => game.devTestBossPhase(1));
  document.getElementById("devTestBoss2Btn").addEventListener("click", () => game.devTestBossPhase(2));
  document.getElementById("devTestBoss3Btn").addEventListener("click", () => game.devTestBossPhase(3));

  function updateDevPanelReadouts_() {
    if (devPanelEl.classList.contains("hidden")) return;
    devLevelEl.textContent = game.player ? String(game.level) : "—";
    // Keep inputs in sync if changed elsewhere
    invulnEl.checked = !!game.dev.invulnerable;
  }

  document.documentElement.style.colorScheme = (game.themeMode===ThemeMode.DARK) ? "dark" : "light";

  let last=performance.now();
  function loop(t){
    const dt=clamp((t-last)/1000, 0, 0.05);
    last=t;

    const dtScaled = dt * (game.dev?.timeScale || 1.0);
    game.update(dtScaled);
    updateDevPanelReadouts_();
    game.draw();
    input.beginFrame();

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

})();
</script>
